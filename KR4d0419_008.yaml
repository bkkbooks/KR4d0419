body:
  text: 莊靖集巻八金李俊民撰序無名老人天游集序元陽子一日㩦無名老人天游集見囑曰守一自簪冠以来岀入𤣥門中皆老人引度也不敢忘其徳今將平日遺稿命工刋行使傳於後庶不負平昔諄諄之意願題其端且為老人光華老人姓陶農家子平水襄陵人父珍母賈氏初母夢青童金盤中獻一大果如𤓰半黄半紅言上仙賜汝無名果也因而娠十三月而生皇統壬戌十一月十三日也性沉静寡欲舉動與羣兒異正隆年間全家避役陜州靈寶縣時年方壯有勇力喜談道雖不讀書便解義補縣弓箭手縣令許子靜與語竒之時贈以詩不以常人待也大定壬辰八月十三日隨舟陽馬祖師過闗服勤三年祖師曰此非干汝修行事汝自修行去於是浩然長往隨方乞化與若志趙公為侣每歸二人背坐相倚不言不笑人莫能測凡七年忽覺體中屈者伸窒者通神與氣非故吾也游戯人世三十餘年行步如風一日讀太上西昇經豁然有省謂同行曰我今還鄉去也年前有韶州岳家㳂王氏請住庵我巳許諾不可食言巳而王氏果至迎歸所指處到庵索湯沐浴畢振衣入静位留辭世頌儼然而逝春秋八十有六葬於永寧縣西時正大丁亥三月初七日也無名之號以其夢歟集中詩頌一百八十三長短句九十一信手拈得如萬斛泉源不擇地而出皆仙家日用事也七言有造化逺離生死外機闗超過有無中古木開花春寂寂寒潭浸月夜澄澄但言造化都歸妄畢竟陰陽總屬私千里暮霞烹絳雪半林明月搗𤣥霜汞死鉛乾天地静龍吟虎嘯鬼神藏有作有為俱妄想無名無字是真常願君早悟𤣥中趣學我優游物外修五言有對客談黄巻呼童烹紫芝性似山猿獨心如野鶴孤頥神春寂寂調息夜綿綿俯仰長春景遨遊不夜鄉若此等句頭頭見道無一字閑非烟火食人所能道也中間舛錯講師祁定之校正觀者無憾焉辛丑年七月望日序大方集序淨然子者濟南人姓郎名志清幼而頴悟舉止作髙尚事年十二灑落有塵外想求出家父母肯之十四遇一道者見而竒之曰是兒有仙分安得在此語以真理釋然有所得自後稍加精進一日忽見重陽真人繪像駭然曰此乃前者所遇之師也㝠契相投豈偶然哉於是絶嗜慾屏紛華刻意於道學弱冠僑居澶淵三十一還濟上主者諉以玉霄觀圓客大師咈然不受遂之益都從者雲集師不恱乃渡河逃名於南陽山中去圭角混光塵舎者與之爭席矣逍遥雲水間其對景述懐託物見情片言隻字沾丐者多簡而古峻而潔邃而深無一㸃俗氣盖𤣥門之星斗歟庚寅嵗冬復歸澶淵返寂於通真觀年五十一師所畜馬哀鳴廐下弟子劉志源見而嘆曰師已仙矣尚留何為不如淮南之雞犬乎言訖乃仰而吁俯而黙眼光落地不復芻豆矣聞者異之𦵏於先師靈兆之側襄事後志源等鳩集生前遺稿刋之於木元湯子紇石烈守一索余序之前後作者贊述詳矣言之則贅姑道其大畧云辛丑嵗七月朔日序錦堂賦詩序士大夫詠情性冩物狀不託之詩則託之畫故詩中有畫畫中有詩得之心應之口可以奪造化寓髙興也侯之别墅葺一室曰錦堂時時班春往来於此合親友而燕之因命畫史以春水夏雲秋月冬松繪之於壁盖取陶靖節之句也四時之景叢於目前滌煩慮暢幽懐超然與造物者㳺坐上之興溢矣侯乃語客曰今夕之賔樂乎但恨對景無言敢請逐題而賦之客曰古人之詩今人之畫二者盡矣言之則贅然景與時遇人與景㑹不嫌冷淡可停杯而待侯乃口占而首唱之時壬寅十一月望日序傳孟氏家傳孟駕之髙祖唐牧字堯臣雲中人也幼業儒術擢進士第仕遼為太子洗馬牛令公見而異之以女妻焉生子彦甫字仲山金運革命廕補品子後以明法中選知西北路招討司事時有疑獄獄成當棄市公拒不受命雖怒而迫之莫能奪也後三日得實免死者百餘人招討公執手而謂之曰子之隂徳如此其能無報乎可勉之徙宣徳州司候登州軍事判官享年八十而終二子曰龜曰鶴龜早世鶴字夀父幼聰敏好學手不釋巻同進士第出身主汾州西河簿宰宣寧縣進階儒林郎致仕六子曰仁曰義曰禮曰智曰信曰楫女曰㽔曰賔太師張公之甥也仁更名澤民字安宅性敦厚愽雅不喜撿局與人交豁如也事王父母孝居喪過哀友愛同氣鄉黨稱焉父亡母病與妻張氏奉侍温凊頃刻不離命醫視藥必親嘗之以人肉治羸割左臂肉雜羮中而進之母自是善飲食勿藥孝感然也郡守知之欲聞於朝廷母恐孝子之傷生力勸止之年逾三十不就資廕折節讀書母罄囊金聚經史以成其志工屬文頗為進取計有聲於場屋學者從之如林崇慶元年秋魁大同府選辛巳登進士第調河南福昌簿以㢘能稱中外交辟不就世亂避地於陸渾南山以詩酒自適號雲巖老人有著述聞於世壬辰秋九月一日卒於槐林平伊陽令周文炳察判盧某備禮權厝焉累官朝列大夫妻清河縣君二子曰琦曰璘女月娥歸白登郭文振琦字伯玉㳺學齊魯間貞祐之亂莫知所從璘易名攀鱗字駕之因夢故也自束髪從父訓不經他師指授十三薦名於京師庚寅擢進士第任陜州州判辟舉靈臺令入補省掾壬辰京師失守隨回軍渡北僑居河津癸巳抵平陽行臺胡公異禮待之每事諮議焉内省委管司印造經籍事巳亥朝廷以近来文風不振分三科諸路選試精業儒人監試劉中以贍於才學皆優其等充本府議事官權宜之職也妻韓氏濮王之後繼母韓氏之姪女也二子曰史噲曰桂哥皆幼孟氏姬姓魯公族孟孫之後保姓受氏於今不絶其間賁之勇舎之約軻之儒光映百世凜然如生裔孫攀鱗駕之亡其世系自髙祖而下得其傳焉又懼其湮没以前後事畧託所友而紀之意者欲文之碑而誌於墓歟或録其實於太史世其家歟狀其行於太常議其諡歟將施於蒸彛鼎如古之所謂銘者自成其名歟審如是其志逺且大矣其自敘者備矣尚何言哉然有美而不聞於世友之過也故不敢不書以俟来者譜李氏家譜按大唐天潢玉牒顓帝之後生大業大業生媧媧娶有喬氏之女感月光貫昴而生咎繇咎繇生伯翳伯翳之後世為士師至里成避桀之亂遯居伊侯之墟食李實乃改為李氏此言咎繇之後以理獄為功遂姓理氏其後子孫或改里氏至伊侯之墟避難遂改里為李也成生利正當商湯之時利正生昌祖昌祖仕陳為大夫因居若縣昌祖生明明為陳相𦵏瀬鄉之北立廟因有相城明生慶賔慶賔生靈飛一名䖍㑹所言陳國乃古之陳國非周時所封胡公滿之國也自李成至䖍㑹五世相承年代相類當此之時太皥之後已為陳國及周封舜後當是此陳既滅乃封胡公而王其地也靈飛之妻真妙玉女感日精之夢而生老君此一說也又按本記云老君生而能言指李木曰此我姓也隋内史舎人薜道衡老君祠庭碑云感日載誕莫測受氣之由指李為姓未詳吹律之本是也又樓觀光師傳云老君因聖母攀李木而生謂曰此汝姓也三家之說經傳備載今並明之以彰聖人之宗緒矣至紂王時居岐山之陽西伯命為守藏史武王克商召為柱下史其子名宗仕魏為將軍有功封於段干宗之子注注之子宫宫之逺孫假假仕漢孝文帝假之子解解為膠西王卭太傅因家於齊風俗通云李伯陽之後出隴西趙郡頓丘渤海中山襄城江夏梓潼范陽廣漢梁國南陽十二望唐髙祖淵二十二子其韓王元嘉守澤州武氏盜國宗室潛謀恢復事露皆被害妃房𤣥齡女妃亡四子於碧落聖佛谷追薦母氏黄公譔善篆磨崖碑存焉其後裔孫因家於澤或隠或仕宋初李植字彦材熙寧間中武舉科隨范文正公西征官至右侍禁墓誌云𦵏於澤州晉城縣五門鄉從先塋也三子持搆授髙祖李憲之忘其所出生曾祖猷猷生祖行可行可二子長之邵次之才之邵一子曰楫楫子六人長儀闕應進士舉恩榜二子亡有女在北弟馬興男閏郎在餘亡之才三子長植次構次俊民字用章植三子曰挺曰撝曰振挺男世英渭南馬鋪監没於王事撝謙甫進士第一科孟津機察男世寧監福昌酒構洛陽茹店商酒監男鉄塊女蓬仙在北俊民男揚伊闕商酒監揚一子道兒甲戍兵火值甲午二十餘年間皆物故矣獨閏郎在楫之孫也二子皆幼為李氏之𦙍癸卯年四月初一日丁未譜記睡鶴記人之情有所甚好有所甚好而不得則必見似之者而喜非徒好之盖感而有所得焉濠梁之魚得之樂山隂之鵞得之書支道林之鷹與馬得之神俊不有所得夫何好焉鶴鳴之好鶴亦猶是也鶴也者物之生於天而異者也其性潔而介其聲亮而清潔而介則寡所合亮而清則寡所和獨以孤髙自處飛鳴於霄漢之上豈求其異也哉盖天之所賦者異也夫才髙則無親勢孤則失衆鶴奚恤焉若或矯情自凂下同於頻頻之黨變常而喪其真非鶴之徳也非鶴鳴之所好也叔世道衰天物暴天思其所好而不得逮丙申嵗於新居之側有蹲石曰睡鶴昔人取其似而名之鶴鳴見其似而喜之事與心㑹豈偶然哉三復觀之其骨聳而竒其背瘠而僂其頸宛其喙箝若無意飛鳴者雖沉潛靜黙有飄然物外之想疑其孤髙之過為衆所棄而自晦歟抑衛人之軒不足乗歟烏程之樹不足棲歟將遺世逺舉羽化而仙此特其化身歟不然何為不飛不鳴日㳺於睡鄉者乎謂其果不能鳴則陳倉之雞胡為而鳴耶謂其果不能飛則零陵之燕胡為而飛耶吁是時也以飛鳴而望於鶴不可望於石尤不可姑以其似而又有所得故感而為之記云劉濟之忍齋記彭城劉君巨川治别室之西偏訂曰忍齋卜日會諸同志落之鶴鳴怪而問焉劉君曰凡有血氣者皆有爭心在人則尤甚焉人情甚不美小有不恊至於按劒相怒沒齒而恨不解是何耶血氣之所役也忍之之意非敢望於人盖將以自警耳孔子語門弟子曰小不忍則亂大謀成王命君陳亦曰必有忍其乃有濟聖賢以忍之一字諄諄而告人者於血氣方剛之時而戒之也昔之人有能之者如張公藝之忍於家朱將軍之忍於敵耳餘為功名而忍王謝為性命而忍元載以鼎餗之譏忍於笑翁恩以狥曲之辱忍於醉師徳之忍於唾懐祖之忍於罵是皆不以一忿而動其氣其得聖賢之心乎吾名吾齋亦猶是也鶴鳴喟而嘆曰異哉未有無事而忍者若子之言所以自處者得之恐非所以處人者得之於己失之於人可乎夫情深則怨匿理到則心服與其匿怨孰若服心我以情怒彼以理屈則門外負荆者踵接矣莫不釋然開怡然暢廓然通無一毫芥蔕於胸臆初以自警卒能警於人過此以往足之所履皆君子之忍齋也獨戚戚於一室之内何其自狹也劉君於是矍然而起拱手而謝曰厚矣子之托吾境也請刋其說於石以廣其傳嵗寒堂記節婦樂氏澤郡南闗宣銳巷樂㺹女也幼亡父母依於外族外王父李榮鞠養之年十五適本闗劉璋泰和五年乙丑夫亡二十一嵗守志長子禎五嵗次禮十七日也從吉外氏豪俠欲奪而嫁之堅誓不許苦節自勵事王母舅姑小心敬順盡為婦之道闕黨同焉而不違於禮婉焉而不失其正舅姑闕以治家嚴恪潔勤躬操井臼無一日而少懈上下畏愛焉主中饋助祭祀怵惕之義表儀宗門值貞祐亂離往往骨肉不收樂氏俯育二子流散他方遑遑涕慕抱終身之戚丙戌復歸寧故里子禎娶東林隠君子母俊卿之孫女生二女長適秦茂才次許嫁本州趙次官姪男餘慶禮娶楊氏生三男一女長犍兒定婚樂家社王氏次伴犍婚東蜀村李氏次堅童女許嫁下町張氏夫之兄益弟儀偉俁仁妹適梁氏偉娶徐氏二男一女長福妻谷下栗氏次祐妻本州王氏女嫁闕氏祐二男長丑兒次顯兒中外族姻無不周恤者禎字君祥參謀本州宣差所事嶷嶷特立篤於孝友念無以報劬勞之徳因所友而榜其堂曰嵗寒堂冀母氏之名節有光於後噫幼而孤長而寡老而其福厚厯憂患五十餘年始終不易凜凜有松柏之操名其稱矣當是時也不能安其室如七子之母者十常八九有不登是堂而愧者乎癸卯三月辛巳書復繼之以詩家貧子幼如月魄煩惱林中世途惡荒墳木拱淚不乾野店天寒孤莫託歸来扶杖雪滿梳山頭化石猶望夫萱堂忘憂忘亦得孝哉一雙反哺烏重修悟真觀記髙平縣南二仙廟者在張莊李門之間唐曰真澤宋曰沖恵沖淑真人為居民祈報之所無禱不應一方之休戚係焉大金真祐甲戌嵗國家以征賦不給道士李處静徳方納粟於官勅賜二仙廟作悟真觀俾其徒司見真主之額之後有慊於心為其名位之乖也其意若曰以廟為觀則是無廟矣以觀為廟則是無觀矣不亦誣於神違於人乎惴惴然不安積有日矣於是市廟東之隙地為三清殿為道院蠲庖湢表壇埒外力所施田以資工役其修齋行道拜章啟𤣥步虚華夏儀鸞而引鳳者於此焉觀之西曰廟棟宇宏麗像容粹穆䆳以重門翼之兩廡旁列諸靈之位其時和嵗豐民無疾厲龡豳擊鼓婆娑而樂其神者於此焉各事其事互不相雜名與位判然矣識者韙之按禮云凡祭有其廢之莫敢舉也有其舉之莫敢廢也盖禮所重者祭或舉或廢不可得而私即廟而觀既觀而廟是未嘗敢舉亦未嘗敢廢豈私也哉兩得而不兩失神人俱恱無遺恨矣此重修之意也徳方請以其事書之於石余用其意而筆之徳方陵川人年二十出家明昌三年壬子禮本州神霄宫郭大寧為師泰和丙寅奉祠部牒披戴登壇為大法師後七年貞祐改元賜紫號達妙充澤州管内威儀偶值喪亂晦迹不出大朝丁酉嵗遣使馬珍考試天下隨路僧道等共止取一千人徳方乃中澤潞二州選第一是嵗八月於燕京受戒回請以白鶴王志道知神霄宫事郡長段公從之俾遂其髙懐乃於宫西别院為鶴鳴堂三間日與方外友彈琴話道焚香煮茗誦周易黄庭老子書究諸家窮理盡性之說與悟真相去五十里時時往来適游衍之興不以傲為髙不以誕為異簡而和婉而通行必合於義動不悖於禮其肯誣於神違於人慊於心亂名改作者乎重修浮山女媧廟記澤之為郡在太行之頂其四面亂山環列東向望之突然而起孤髙峻絶不與衆峰相連者曰浮山也山之腹有巖穴中有二像廟而祭之傳者以為翁婆神居民之為嗣續計者往往禱於是焉按圖經翁婆神在郡東南二十五里浮山北坡上宋元祐六年建計屋八間共二十二椽周圍七十五步又紹聖三年丙子李旦亦言此廟自元祐六年及觀至和二年郭寶碑已重修矣圖經所云元祐六年建亦重建也究其原莫知所從来或曰女媧廟並無所據按淮南子云女媧氏鍊五色石以補蒼天斷鰲足以立四極殺黑龍以濟冀州積蘆灰以止滛水蒼天補四極正滛水涸冀州平此皆有功烈於民者也民追而祀之其以此耶傳者通謂之浮山神大定二十六年郭道珙等增舊制而新之盖五載工始畢值貞祐甲戍兵火復毁逮大朝庚子本郡次官趙唐以其男山兒幼亡不能忘情因謁是廟慨然有起廢之心遂命耆老張珏輩庀工計費又令總領景用與提控許堅督其役斧斤者瓦甓者版築者不召而從不鳩而集富者輸其財貧者竭其力不日而告成自是公得男女三人又從而起敬焉辛丑嵗三月十八日㑹郡人而落之索余紀其事將刻之石姑以前人所聞而書之噫人而無後為不孝之大然人生於天地之間果由人乎哉或得之於卜如成季者生而有文在其手曰友或得之於夢如唐叔者生而有文在其手曰虞周之翰皆嵩嶽之神魯之儒乃尼山之秀是山也果能以英靈之氣賦予於人者乎求而得之者有之不求而得者神何與焉天地萬物父母也物莫靈於人天地之委蛻也豈私於人哉夫臧孫逹之有後也以徳其所求者異於人辛丑年三月十五日記陽城縣重修聖王廟記按圖經陽城盖漢之濩澤縣也屬河東郡今縣西三十里故城是也晉𨽻平陽郡後魏文成興安二年癸巳自故城移於今治隋屬長平郡唐武徳元年於此置澤州𤣥宗天寶元年改為陽城縣又云殷湯廟在縣西南七十五里析城山上宋熙寧九年河東路旱委通判王伾親詣析城山祈禱即獲休應十年五月某日牒封析城山神為誠應侯政和六年三月二十九日析城山殷湯廟可特賜廣淵之廟為額誠應侯可特封嘉潤公宣和七年重修廟記云本路漕司給係省錢命官增飾廟像及廣其庭壇髙其垣墉列東西二廡齋厨廐庫客次靡不畢備華榱彩桷上下相煥以稱前代帝王之居而致崇極之意以其餘材完嘉潤公祠合二廟凡二百有餘楹大金革命廟止存九間共六十椽大朝壬寅年春因野火所延存者亦廢民間往往即行宫而祭之本縣行宫在郭内東西街北右去城門五十餘步左距縣衙一里强至大金壬闕年厯一百二十八年而毁邑人王元武全王昇張義王闕王漢等雖在擾攘之際相與鳩工復起正殿三間元帥延陵珍補盖西廡嵗有水旱疾疫禱無不應民之戴商厥惟舊哉噫神依於人廟食百世亦豈有昇沉時耶抑成壊之數幽顯莫能逃耶何天禍未悔如此之酷耶僕重過是邑王元等託友人燕子和求識其始末故書以示之時壬寅十月庚戍朔重修佛堂記吳道子畫酆都宫畏罪者衆韓吏部題木居士求福者多世之人莫不知罪之為可畏福之為可求然信賞有所不能勸必罰有所不能懲而覩道子之畫吏部之題竦然有動於心不待賞而勸不待罰而懲何耶豈正率者難從幻化者易感歟兵興以来俗狃於惡以强陵弱以衆暴寡以勇苦怯怙終自若當是時也未有不嗜殺人者夫佛教自殺者不復得人身況於他人乎宣差察之鎮是邦也因謁㕔事後之佛祠閔其為風雨所壞遂命工起廢缺者補之汚者墁之壁繪像飾為之一新乃與其妻孫氏時時敬禮倍堅回向益勵齋嚴其見於臨事寛而不苛仁而不虐皆如来慈悲之心下之人亦復歸依見善則樂而為之見不善則憚而不為不陵弱不暴寡不苦怯皆如来慈悲之化夫以易感之化易難從之俗亦救時之一助也若夫化流天下使人有士君子之行如周家太平之時其待木鐸之政乎重建修真觀聖堂記按圖經修真觀在東門内街南宋大觀戊子陳遷孟新堂之故基也值大金貞祐甲戍兵火而毁煨燼之餘瓦礫堆積二十八年間無一人刮目者女冠張守㣲與弟徳忠因逃難四方俱獲生還欣然有起廢之念乃求訪本觀遺跡道士李君浄厯厯而告之曰此殿堂也此道院也此客舎也此堵而環也此圃而蔬也此井而飲也既得其詳於是首建聖堂三間為修敬之地復夷荒壤刜惡草出墻根而築之仍為後圖是堂也經始於辛丑十月甲子次年三月丙戌工畢始終其事者郡侯段公暨夫人衛氏守㣲晉城縣髙都管樂南中社人㓜婦趙氏夫亡正大甲申五月捨俗出家禮太原榆次縣專井村玉真菴洞妙散人楊守𤣥為師師乃長春真人門下寧神子所引度者也傳授有源故其信道也篤守志也確肅而莊强而敏新故而潔汚蕭爽峻逸雖在城市有林下風異時天上定歸王母之家今日人間獲覩飛瓊之室弟徳忠及妻王禮善益加歸向皆生無上道心男留住女梅兒慶仙宜哥滿惜告成之後伏願免離五苦延納百祥中外存亡同證妙果壬寅年五月初一日記之堂上以警来者題登科記後承安五年庚申四月十二日經義榜李俊民字用章年二十五澤州晉城郭伯英字伯誠年三十潞州上黨劉從謙字光甫年二十五解州安邑張孺卿字介甫年二十七大興府左廵院王知進字崇禮年三十一東平府平隂孫璵字子玉年二十七大名府夏津彭恱字子升年二十三真定府録事司舒穆嚕世勣字景畧年二十八咸平卓齊特千戸所李適字適之年二十九大定府長興晁李中字寶臣年四十一通州三河朱煥字文伯年四十四開封府警巡院伯徳維字公理年四十一中都哈勒琿千户所趙楠字庭幹年二十四澤州髙平王元字善之年三十三解州司候司糜元振字彦升年二十八磁州司候司祁午字子善年四十一解州聞喜潘希孟字仲明年二十八磁州司候司孔天昭字天安年三十大興府左巡院王毅字知剛年二十八大興府左巡院侯尚字世卿年三十太原府平晉髙應字大中年三十二磁州邯鄲趙銖字敬之年二十五大興府左巡院晉蕃字天佐年二十五奉聖州礬山鈕赫希奭字仲傑年三十五博索路𤓰爾佳下郝鈞字國器年三十五大名府舘陶鮑元字善長年四十四潞州長子康鼎字晉卿年二十五傅州髙唐閻詠字子秀年三十七兖州磁陽鄧浩字君猷年二十六平陽府録事司宋克俊字英叔年二十七河中府録事司趙宇字八定年二十八澤州陵川劉磻字溪叟年七十四濟南府章丘杜實才字克彦年四十四南京巡院余閱承安庚申登科記三十三人革命後獨與髙平趙楠庭幹二人在一日邂逅於鄉邑哽咽道舊壬寅嵗五月初吉庭幹復挈家之燕京感慨忍淚書五十六字寄之試將小録問同年風采依稀墮目前三十一人今鬼録與君雖在各華顛君還㩦幼去燕然我向荒山學種田千里暮鴻行斷處碧雲容易作愁天癸卯春大陽資聖寺記晉城縣漢之髙都縣也屬上黨郡晉因之後魏改屬建興郡明帝移建興於髙都城孝莊帝復改建興郡為髙都郡縣屬焉北齊置長平髙都二郡後周又以長平安平二郡併入為髙都郡隋開皇初郡廢為澤州十八年改髙都縣為丹川縣因縣北丹水為名屬長平郡唐武徳元年移於源漳水北三年析丹川於古髙都城置晉城縣屬建州六年州廢縣屬盖州六年省丹川縣盖州入晉城貞觀元年盖州廢為澤州縣亦屬焉宋及大金因之不改本縣境内寺院二十一區大金貞祐甲戌至甲午存者十之三四資聖寺在縣北四十里大陽社北齊文宣天保四年癸酉梁元帝承聖二年也號永建寺至武成河清二年癸未建石塔二級後唐明宗長興四年癸巳立尊勝幢宋真宗天禧四年唐申改賜資聖寺周圍二百六十三步屋宇二十八間共一百二十椽與碧落治平院澤州浴室院皆法眷也本寺素乏常住且過者稀貞祐兵火後居民蕩析鄉井荆棘寺幾於廢里人王簡等亦流落四方艱苦萬狀黙有所禱異日平安到家當捨所有以荅佛力既歸乃以所居之正堂五間與本寺修香積位其殿宇寮舎缺者完之弊者新之靡不用心焉且語耆老曰本社宋阿李生前為無後將本户下地土一頃五十餘畆施與本寺充常住見今荒閒有無借衆力開耕給贍本寺為修飾潤色之費仍與住持僧添鉢不負我輩報恩之願衆忻然諾之命本寺僧行廣主其事行廣俗姓李本社人純慤謹愿可託故令專之自齊文宣天保四年至今癸卯七百五十一年其間升沉興廢者屢矣虐熖之酷未有甚於此時者頼有其人家風不墜不幸中之幸者也劉巨川濟之欲傳於乆逺求碑以實之故書癸夘年四月初六日壬子記澤州圖記禹貢冀州厥土惟白壤厥賦惟上上錯厥田惟中中九州之中為第五周禮職方氏掌天下之地圖河内曰冀州漢地理志曰河東河内得魏地觜觿參之分野其地帝尭夏禹所都之域詩唐國風此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有尭之遺風焉三晉屬韓周赧王五十三年秦武安君白起代韓抜野王上黨路絶上黨守馮亭以上黨歸趙趙使平原君受地五十五年秦攻上黨拔之上黨民走趙趙軍於長平以按據上黨民秦因伐趙四十萬人降白起秦并兼四海分天下為郡縣漢興因之先王之迹既逺地名又多隨時改易不同漢地理志河東郡秦置濩澤端氏二縣𨽻焉上黨郡秦置髙都泫氏二縣𨽻焉河内郡髙帝元年為殷國二年更名沁水𨽻焉按澤州圗經屬禹貢冀州之域後魏置建興長平安平三郡明帝移建興郡於髙都城孝莊帝復改建興郡為髙都郡後周又以長平安平二郡併入改為髙平郡隋初廢郡為澤州按晉城圗經本漢髙都縣也屬上黨郡晉因之後魏改屬建興郡至孝莊帝改屬髙都郡北齊置長平髙都二郡後周併為髙平郡隋開皇初郡廢十八年改丹川縣因縣北丹水為名屬長平郡唐武徳初移於源漳水北三年析丹川於古髙都城置晉城縣屬建州六年州廢縣屬盖州是年省丹川縣盖州入晉城貞觀元年州廢屬澤州按陽城縣本漢濩澤縣屬河東郡今縣西三十里故城是也晉屬平陽郡後魏興安二年自故城移於今後隋屬長平郡唐武徳元年於此置澤州八年移州端氏縣天寶元年改為陽城縣按端氏本漢縣屬河東郡史記趙成侯十六年與韓魏分晉封晉君以端氏今縣是其地也其故城在縣西北三十里郡漢治也晉屬平陽郡後魏置安平郡縣𨽻焉真君七年省太和八年復置隋開皇三年郡廢十八年自故城移於今治屬長平郡唐武徳八年移澤州於此治貞觀元年又徙州治晉城按髙平縣漢泫氏縣屬上黨郡後魏於古髙平城置唐志云漢泫氏縣地因以名之屬長平郡隋因之又併泫氏入焉唐武徳初於縣置盖州貞觀初州廢按陵川縣在漢屬泫氏縣地隋開皇十六年以户口滋息山川修阻遂割長平郡二縣户析置為中縣至唐武徳元年改長平郡為盖州縣亦屬焉六年移盖州於晉城縣貞觀元年改盖州為澤州縣屬澤州按沁水縣漢縣屬河内郡晉因之元魏為永安縣後於此置廣寧郡後齊郡廢改縣曰永寧隋開皇十八年復改為沁水縣屬長平郡唐屬澤州五代後因而不改皇統三年程先生左輔國碑云澤之為州盖以境内有濩澤名焉州之治晉城盖以其地故晉封名焉夫晉者尭所居之墟舜所耕耘之地二帝遺風至今猶存自開皇三年為州迄今五百六十一載盖開皇三年癸卯至皇統三年癸亥也宋張商英題桃固嶺云大舜耕耘地斯民聚落居昔人皆以舜澤名之舜耕於厯山鄭𤣥曰在河東漁於雷澤鄭𤣥曰雷夏兖州澤今屬濟隂圖經引墨子云舜漁於濩澤墨子本云漁于雷澤不同舜澤取舜耕處名之也厯山河東之境近之必有辯者州四至東至衛州界二百里以孤松樹為界自界至衛州一百六十里西至絳州界一百九十里以烏嶺堠為界自界至絳州一百四十五里南至懐州界四十五里以土堠為界自界至懐州六十五里北至潞州界一百里以山口村為界自界至潞州六十五里東南至懐州界七十五里以枯冢為界自界至懐州六十里西南至孟州界六十里分水嶺為界自界至孟州一百二十里東北至相州界二百里以城嶺為界自界至相州一百六十里西北至晉州界一百六十里以長城嶺為界自界至晉州一百七十里至南京四百六十二里河南府二百二十五里係大定年前里堠也隋開皇三年至天興甲午六百五十二年厯唐五代宋金易十二姓或興或廢有如傳舎金國自大安之變元兵入中原北風所向無不摧滅者貞祐甲戍二月初一日丙申郡城失守虐熖燎空雉堞毁圯室廬掃地市井成墟千里蕭條閴其無人後二十年大兵渡河甲午正月初十日己酉蔡州城䧟金運遂絶大朝始張官署吏乙未遣使詣諸路料民本州司縣共得九百七十三户司候司六十八户晉城二百五十五髙平二百九十陵州六十五陽城一百四十八端氏一百一十七沁水三十至壬寅續括漏籍通前實在一千八百一十三户以鄉觀鄉以國觀國以天下觀天下其可知也噫生斯世者何不幸邪百六之數莫能逃邪死者巳矣生者倒縣何時而已邪上天之禍如此其酷尚未悔邪泫然記之庶幾父母瘡痍之民者生怵惕之心莊靖集巻八
