body:
  text: 莊靖集卷五金李俊民撰七言絶句和籌堂送别韻山城望斷首重回猶勸春風馬上杯有似衛軒當日鶴羽毛養就却歸來白髮相逢得幾回離亭苦勸送行杯元龍不識求田意徒使青山笑往來和河上送行韻沁南幕客盡詩豪斧月斤雲得句髙吏部文章笑東野若為自比倚松蒿有芝蘭元肯伴蓬蒿之句寄别馬蹄踏破亂山青送客風回酒半醒歸路莫將雲外指大都一十五長亭蟻戰圖聲勢何勞鬬似牛看看一雨到山頭大家不肯勤王去只待槐宫壞即休膠膠擾擾戰爭多嵗月循環得幾何樹下老人觀物化夢魂應不到南柯畫鶴兩翅如輪骨已仙昂昂只合在林泉且休相逐乘軒去自有人謀二頃田二頃田應為鶴謀海棠露輕風嫋嫋泛崇光長恨司花不與香春睡一聲鶯喚起却教老眼見啼粧張氏肯堂張文定公後百年蘭玉水邊村萬軸牙籖席上珍同隊魚中見頭角一朝富貴異於人孟浩然圖却因明主放還山破帽騎驢骨相寒詩句眼前吟不盡北風吹雪滿長安蹇驢却指舊山歸可笑先生五字詩仕為不求明主棄此行安得怨王維上陶固嶺匆匆出郭曉風寒一片雲收爽氣山上盡坡陀試回首人家住在翠微間野菊風露叢中取次芳愁邊過却幾重陽秋光到處多無主不是間花不肯香席次不到西山二十春風光别後一畨新再三點檢尊前客白髮相看有幾人驢為人盜去磨嫌居士謀生拙碑恨詩人下道看好在隔花臨水處為誰信轡逐金鞍長街愁殺鄭昌圖便是徒行魯大夫縱復東家借還許不知泥滑敢騎無杜詩束家蹇驢許我借泥滑不敢騎朝天淵明歸來圖一旦倉惶馬後牛衣冠從此折腰羞先生不是歸來早束帶人前幾督郵席上戲李巽之薰風原上麥連雲簫鼓家家樂社神半醉尊前喧語笑老夫愁獨淚沾巾和史邦直橋上韻規模杜預見成功橫截長流跨彩虹亭長莫邀來往客須防中有奪牛公韓伯林奪牛公過龍門流水潺潺潄石根又還懷古過龍門行人但禮龕中像誰識當年禹作䀶夜夢月下與數仙子酌酒仍各賦詩天風一掃暮雲開收拾羣仙共酒杯但指今宵是新月不知曾照古人來七夕雲漢雙星聚散頻一年一度事還新民間送巧渾間事不見長生殿裡人姪謙甫任長安回歸去連昌憶舊遊長安回望使人愁只誇楊氏錦繡谷曾上李家花蕚樓枝連葉附本同氣骨親肉踈今幾家但留濟叔易一卷與送蔣兄麻兩車母師聖醉歸夜溺伊河抱橋柱而死日日貪杯醉不醒待將風味學劉伶可憐王子龕前水夜半寒光落酒星和張文玘來詩有匠手今逢老作家之句因用韻和景物秋來件件佳江山都助與詩家我憐五鬼俱難送先為文窮結柳車白髮詩人喜誕誇詞源傾倒少陵家問君讀後書多少得滿當年惠子車書生幢下布衣多盡是嘲風詠月家若使烏臺不彈後看看欲載十牛車山谷文章六經來汗漫十牛車數間茆舍老生涯籬落相依四五家不見近來門外轍故人應駕角輪車和籌堂送迎偶得懷抱秋來強自寬相逢賴有舊青山郊原雨後堪圖畫勾引詩人興不間出門天地望中寬馬首濃迎著色山詩句滿前無可道恨今不復見間間畫手從來説范寬何如著眼看真山天公不欲山無主分付籌堂好處間詩愁誰道酒能寬得句多於飯顆山莫使移文誚長往工夫那取片時間和平太行路韻六丁驅役鬼神奔一夜開山掌樣平多少往來車馬客尚憂行路澀難行鑿開險阻若天成暫使時間眼界平却羡長安西去路青山不管送人行千年古道跨山城可笑人心自不平容易莫將天險壞須防間客此間行自古太行天下險縱令禹鑿不能平尋常著腳無安處何況羊腸路上行和君瑞月下聞砧夜涼枕上夢頻驚有底秋天不肯明老眼近來間淚少那禁月下搗衣聲和籌堂述懷長恨周人詠黍離不期親到閔周時一朝小雅廢將盡何處如今更有詩白頭相見話存亡可惜漫漫夜轉長煩惱盡無安腳處出門十步九羊腸訪德老月下與君瑞邦直從籌堂擕酒訪德老既而有詩見示因用韻和夜投破戒逺公家醉墨成章點不加堪笑穎師無手假聽琴人似聽琵琶一朝不飲奈愁何月下敲門載酒過佳句曉風楊柳岸醉時吟了醒時哦老杜醉歸圖花下騎驢不踏泥花間醉後復何之殷勤驥子扶歸去明日重來别有詩按王內翰注宗武生日宗武小名驥子曾有詩驥子好男兒又曰驥子最憐渠保漢公廟倉惶劉氏未能安跋扈將軍力拔山若使楚人如郤子肯教義士不生還按左傳丑父令齊侯如華泉取飲齊頃公與晉戰為晉所敗退而奔走丑父為御晉帥追之將及丑父請君潛服而去自著君之飾坐於車上而待晉師晉師獲丑父知非頃公而欲殺之丑父嘆曰自今以後若有身代君者皆當如我今受戮晉大夫郤獻子義之歎曰臣不難死而免其君殺之不祥也宜赦其罪以成其節丑父遂免死而還齊臣逢丑父也戲呈節使王子告喚取佳人舞繡筵醉中往往愛逃禪我無紅袖堪娛夜翠被薰香獨自眠戲北臺孫講師仲逺何處間田不可耕山頭烽火水邉營道人髙卧雲千頃留取南臺與鶴鳴香梅鄧妓之小字匠手有詩邊仲寧索和因用其韻便敢承當入格梅為經詩老品題來如何偏得東君意占了百花頭上開近將風度學官梅底事何郎興未來休道司花無妬忌又從昨夜一枝開被誰説破夢中梅應有羅浮倒挂來秪為怕愁貪睡後返魂才向北枝開歌拍從誇大小梅典刑難入箇中來洗粧不使風塵涴冷眼詩人莫倦開為憐種性透塵香收拾間愁共一觴向道坐間能賦客莫教容易見心腸不知誰使姓名香珍重詩人幾詠觴也學西湖林處士為花著莫惱枯腸一枝瀟灑隴頭香分付新愁竹葉觴紙帳不須尋短夢天涯倦客巳無腸自是尋常不肯香與花同夀百年觴黃昏樓上誰家笛吹斷愁人寸寸腸悼蜀劒閣誰知纍卵危厭厭賔主醉無時蜀人不識忠臣淚剛道嘉王是酒悲元夜與泰禪洛陽觀燈行歌聲裏落梅風爍爍華燈萬盞紅何似吾師方寸地一輪明月小參中厯陽侯范亞父韓生去世冠軍廢獨望楚強心亦勞謾向鴻門撞玉斗豈知鹿死在金刀酈食其多少中原逐鹿人獨憑片舌下齊城淮陰不喜書生事能免他年獵犬烹四皓奕棋圗坐看咸陽王氣收豈無人傑自安劉都緣鴻鵠心猶在一局間棋不到頭鴻鵠髙飛一舉千里羽翼已就橫絶四海魏徵立朝讜議盡良規誰使君王死後疑一旦鑾輿渡遼水即時扶起墓前碑王季文南邁怏怏不得意書此以緩之大家都待倚欄干摘索幽花草棘間方便春風無不到忍教雪裏一枝寒代别呼延路鈐森森戈戟亂如麻剛把毛錐傍史家彈鋏去年門下客白頭今日又天涯襄陽守史嵩梅花堂小酌與河南府馬師共往來不絶鄭崇門清濁那分北海尊今夜梅花堂上月與人作箇好黃昏過濟源幾年不到竹梅間天際歸來兩鬢斑一片白雲風掃盡雙明喜見舊青山壬寅九日和君玉來韻山城與客醉陶然日日相陪費萬錢馬上行人幾時去一杯我欲助離筵書生紙裏亦枵然欲去街頭恰百錢寄語西風莫相笑一杯便是菊花筵和假正卿韻出入格悠然相對酒杯間忽有新詩落坐間喚起東籬無限興黃花須待與君看百計尋間不得間功夫那取片時間誰知九日龍山客却被秋光冷眼看秋日有感節氣先凋一葉桐人間何處不秋風梁園勝事隨流水滿目愁雲鎖故宫賈佐之以進士充軍被撻便從寧越立威名可信王尼長作兵著甚不談軍旅事碧油幢下盡書生孤村舍南舍北地多荒三兩闕士盡歸箕斂手未應醫得眼前瘡解嘲尊前共醉潑醅香下馬誰家白面郎見説千金能買笑老夫那得一錢囊王德華默軒春秋豈敢措一字賔主不須談兩都萬事盡皆皮裏著為君終日鼓嚨胡對棋到頭不可託安危那用搜尋局上機縱出吳宫陳圗外陰山未免嫁明妃送苗世顯歸上黨故人千里寄書來長恨天涯喚不回行路難行澀如棘歸裝莫待北風催時河北防秋跋魯直帖雞毛不擇三錢筆蠆尾揮成一幅書莫使觀江神會得因風奪去錦囊虛許道真醉吟圖斷蓬蹤迹寄天涯老去情鍾戀物華回首錦江春寂寞一杯愁裏賦梨花道真號錦江漁隱探官版圖填寫百官志楮劵類排千字文堪笑吾儒多伎倆一時鬻爵僣吾君跋馮應之許司諫豉羊帖還思寫論付官奴想見臨池興有餘莫把家雞等間厭恐教人笑換羊書王庭秀悠然軒小軒開後快雙明峭拔南山立翠屏好是晚來新雨過白雲堆裏露尖青同申元帥逰司馬山千年古廟映崇岡寂寂空庭草樹荒見説旱時求得雨一池由有老龍藏留别主人把酒再三留送客風髙勢未休更聽愁眉歌一曲尊前腸斷小溫柔寒食戲書驀見花間弄藥回同心髻綰緑雲堆多情更有墻東月送得秋千影過來戲楊成之客路風霜頗倦遊出門又是一畨愁行人立馬無情甚扶上征鞍不自由李晉王墳雄名凜凜振沙陀為國功深奈老何多少三垂岡上恨伶人都進百年歌遊沁園多少庭臺墮劫灰勝遊蹤迹幾殘碑風流人物今誰在水緑山青似舊時申元帥四隱圗嚴子陵羊裘隱迹喚難回曾犯當年帝座來京洛江湖樂天性釣魚臺不羡雲臺陶淵明迎門兒女笑牽衣回首人間萬事非自是田園有真樂督郵那解遣君歸孟浩然平生只有住山緣北闕歸來也自賢破帽蹇驢風雪裏新詩句句總堪傳李太白謫在人間凡幾年詩中豪傑酒中仙不因采石江頭月那得騎鯨去上天大顛圗二星斗文章世所傳狂瀾回在禹功前先生不踏潮陽路震旦花開幾大顛一夕投荒萬里行增光日月更誰能相逢盡説空門話多少人間有髮僧三害圗二慷慨平西氣不衰勇於三害欲除時流芳巳入忠臣傳何處人間更有詩挾矢操弓短後衣揚揚意氣似男兒欲憑一怒除民害可惜為人自不知平水八詠陶唐春色府西南三里有陶唐廟每至春月傾城出遊祭享松柏森森護帝宫至今和氣在河東詩人不盡當時事八景圗中見國風廣勝晴嵐府北七十里有寺曰廣勝霍山之陽寺下有海曰大郎等間過了萬千峰偃蹇相看意不濃洗出青山真面目秪疑海底有天龍平湖飛絮府西五里有泊曰平湖姑山之東汾水之西四面皆楊栁如幄三月上巳居民袚褉於此三月湖邊袚褉亭依依楊栁雨中青晚來風起花如雪春色都歸水上萍錦灘落花府西門外有汾水退灘南北二十餘里皆樹桃焉春風桃葉復桃根相妬封姨似少恩無限亂紅隨水去人間何處覔仙源汾水孤帆府西二三里有渡口古渡無人鳥迹多眼前厯厯舊山河片帆不是秋風客誰向中流發棹歌姑山晚照府西五十里有姑射山神人居焉物外神仙自一家等間不許占煙霞只今氷雪人何處惆悵山前日易斜晉橋梅月府西南二十五里有縣曰襄陵北門外有橋如虹左右皆梅圃嫩寒籬落似江村雪裏精神月下魂橋北橋南路分處行人立馬待黃昏西藍夜雨府北五十五里洪洞縣之西有寺曰西藍近汾水一二里繞寺多花竹有水杯池暮雲深鎖梵王家樓閣崢嶸閲嵗華香火半殘僧入定卧聽窗外落簷花錦堂四詠春水滿四澤一畨雨過緑生肥正是桃花欲浪時掠地風來吹不皺細看面面盡玻璃夏雲多竒峰初見雲從山裏出須臾雲結勢如山一聲霹靂催時雨雲不能間山自間秋月揚明輝誰為天公洗眸子試將把酒問姮娥清光一片巳如許斫却桂時應更多冬嶺秀孤松凜凜蒼髯晚節孤雪中傾蓋若旁無一經元亮盤桓後氣壓秦時五大夫沁園十二詠熙熙堂眼前草木強爭春往日繁華一聚塵山水中間賞心在不知誰是肯堂人翠蘭亭蓬艾叢深特地藏遊蜂何處覔幽芳楚人大假無分别不識離騷傳裏香暗香亭三兩橫斜鶴膝枝一朝須有返魂時試看今後黃昏月得似西湖七字詩七賢臺放迹山陽志尚同至今林下仰髙風欲將人物圗中看恐過生前李衛公李衛公焚七賢圗潄玉池古人觀水必觀瀾一滴涓流一滴寒放取黃陂千萬頃莫教龍口吐吞難江源亭有流杯羽觴到處不容停爭看中流落酒星彼此一時修褉事未應人物愧蘭亭屏俗庵子猷别墅世上無人可立談眼前只有此君堪當年借得誰家宅疑是今來屏俗庵清暉亭髙山森似劒鋩立流水平如羅帶舒人在水光山色裏笑渠潘閬倒騎驢富覽亭天於萬物豈私我領略風光天不嗔自古山陽景佳處盡都分付與間人桃園一時得意笑春風不見春風滿樹空老去惜花心尚在為君留眼看蒸紅意在亭緑水古今流不盡好山前後勢相連適來荷蕢者誰子應笑有心哉此賢涌珠泉淵底睡龍徒有頷沙中老蚌恐無胎疾雷驚裂蒼苔地迸出鮫人淚顆來碧落四景橫峰卧雲蟄龍起後願相從便有人間潤物功一片青山是歸處無心更逐渡溪風白雲無心逐風渡溪耳陰壑積雪漠漠山陰雪擁門何時天道變寒暄雖然不是回光地銷得陽和幾許恩寒泉潄玉瀝瀝山泉枕畔鳴六根先得一根清從來只向琴中聽不識徽絃意外聲枯松挂月門前老樹數難推獨有栽松道者知夜半風催山月上政當鶴睡覺來時周昉內人圖吹笙舊曲聞來似斂眉料應秪恨賞音遲梨園傳得新翻譜著意參差竹裏吹汲泉非關古井不波瀾秪恨銀瓶一掬慳欲助長流御溝水再教紅葉到人間倦繡心情猶在未收時却顧花間影漸移不道春來添幾線日長只與睡相宜搗衣一夕秋風鴈過聲鐵衣辛苦向邊城將軍不用和戎計雙杵休辭月下鳴剪爪袖裏纎纎只合存如何春筍不嫌髠金叉墜後無因見藏得開元一捻䀶彈琴休言三尺是枯桐大抵聲音與政通曾得王君意中事便從絃上和薰風學書數幅雲箋自卷舒試教落筆看何如休將彤管題間句正要班姬續漢書按樂倚風無力見溫柔初下喧天羯鼓樓猶向花隂理新曲君王不惜錦纏頭覽鏡不教朱粉汙天真長對菱花顧影頻但把蛾眉掃來淡尚嫌不似虢夫人莊靖集卷五
