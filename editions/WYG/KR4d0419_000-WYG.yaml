body:
  text: 莊靖集目録别集類四金巻一古賦四言古詩五言古詩七言古詩巻二五言律詩七言律詩巻三五言絶句六言絶句巻四七言絶句巻五七言絶句巻六七言絶句巻七樂府巻八序傳譜記巻九碑銘贊啟牓青詞巻十祭文疏表上梁文雜著臣等謹按莊靖集十巻金李俊民撰俊民字用章澤州人少通程氏之學承安五年以經義舉進士第一應奉翰林文字未幾棄官教授南遷後隠於嵩山自號鶴鳴道人元世祖以安車召見仍乞還山卒賜諡莊靖先生集凡詩七巻文三巻嘗為澤州守段正行所刋行長平李仲紳等為之序明正徳間郡人李瀚重付諸梓今板巳久佚所存祇抄本而巳俊民抗志遯荒不縻好爵出處之際能潔其身集中於入元後祇書甲子隠然自比陶潛故所作詩類多幽憂激烈之音繫念宗邦寄懐深逺不徒以清新竒傑為工文格沖澹和平具有髙致亦復似其為人雖博大不及元好問而生平志節約畧相等實可謂無愧所學者矣詩末間有注語序不言何人所加殆即俊民所自注歟乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀莊靖集原序夫水之有源也始焉濫觴其流不已𣲖而為川匯而為澤㑹而為江豬而為海波瀾呑吐乾溢如一乾坤涵浸古今不竭噫觀水者觀至于海觀止矣然後乃知其水之有源也若夫雨集而溝澮盈潦停而蹄涔漲朝滿夕除涸可立待是惡足以為水哉學之有本亦猶是也韻而為詩章聲而為樂府律而為詞賦廣而為騷雅其文愈𢎞其筆愈雄其篇愈鉅其詞益富葢有本者之如是其視落霞秋水畏日薰風一聨一詠雖膾炙人口然器小易盈敵大則怯是惡足以為學哉吾鄉李用章先生粤自弱冠以明經擢第為天下甲爾後仕官數竒積年不調先生雅志亦厭於乾役恬於學問自初筮仕距今四十餘年手不釋巻經傳子史百家之書無不硏究其學之有本可知矣故其作為文章句句有根源字字有來歴格老而意新辭經而㫖逺不涸不竭其汪洋之學海歟郡牧叚正卿公退之暇一日召諸士大夫謂之曰澤雖巖邑俗尚儒風今桑田更變桂樹凋零幸有狀元先生在是天之未䘮斯文於吾地也使其平昔著述秘而不揚我軰不厚顔乎遂裒集其文募工鋟木以夀其傳可謂賢於用心矣豈特此耳又能重賁大成之像復新立道之堂給田以贍學校蠲役以優鄊秀此一舉也衆美具焉自今以始吾道有所宗主可無慶乎故喜而道其實嵗次單閼三月哉生明長平李仲紳敬序好古樂道之士作為文章豈偶然哉蓋感物即事傷時懷舊陶寫藴奥之情涵泳無窮之意千態萬狀卒歸于堯舜禹湯周孔授受服行之實學者仰之若泰山北斗噫非極深造之妙者莫能至焉鶴鳴老人吾鄊之巨儒國朝之名士也經學傳家尤長於禮未及壯嵗擢進士第一時方顯用勇退居閒朝經暮史冥搜隠索四十有餘年其徳行文學庻幾乎古雖片言隻字亦必有㨿如太羮𤣥酒有典則而無浮華一時文士靡不推讓郡侯叚公鋭意文事時與士大夫會于錦堂乃鳩集先生近年著述得詩賦古文僅千餘篇合為十巻鏤板以傳僕忝預席末雖不能增日月之光詎可無言故引之王特升序夫文之為文其來尚矣與造化一氣俱生者也日月照臨星辰輝映天之文也山川流峙草木敷榮地之文也人得天地之秀而為萬物之靈有仁義禮智以根於心故觸物感情發而為言無非天下之至文也如風行水上自然而然固非有力者之所强能亦豈徒吟詠風景模寫物象而已哉將以經天緯地厚人倫羙教化貫乎道者也先生世家濩澤唐韓王元嘉之裔生而聰敏㓜而能文弱冠而魁天下蓋以學問精勤耽玩經史諸子百家無不硏究故其文章典贍華實相副字字有源流句句有根柢格律清新似坡仙句法竒傑似山谷集句圓熟脉絡貫穿半山老人之體也雄篇鉅章奔騰放逸昌黎公之亞也小詩高古涵蓄尤有理致而極工巧非得天地之秀其孰能與於此先生平昔著述多矣䘮亂以來蕩析殆盡此特晚年㳺戯之緒餘耳每一篇出士大夫爭傳寫之第以不見全集為恨耳錦堂主人崇儒重道待先生以忠厚迺與諸同道購求散落篇什募工鋟木用廣其傳使國人有所矜式門下劉公濟之君祥仲寛姚子昻左右其事未百日而工畢瀛乆䝉先生教載仍嘉錦堂之好事不揆荒蕪姑道其梗槩云爾余月初吉劉瀛序史稱唐文三變至韓昌黎而後稍稍可述誠確論也以其當世文世類皆流於一偏如白樂天之平易李長吉之放逸孟東野之酸寒賈浪仙之窮苦是豈不欲去其偏而就其全乎蓋以平日所賦之性所養之氣所守之學迂踈局促執之而不能變之耳唯韓昌黎則不然中正之學發為文章粹然一出於正其於觴詠之間給談笑助諧謔叙人情狀物態鈎𤣥提要㨿古論今左右逢原意各有寓為時人之宗師豈一偏之所能囿哉我鶴鳴先生今之昌黎公也其出處事業自有年譜徳行才學自有公論雄文傑句板行于世名儒鉅公又從而備序之尚何待僕之諜諜也然承先生之教㳺先生之門誦其詩閲其文者三十餘年矣覩兹偉事安敢黙然姑道其萬一亦涓塵禆益之意也故喜而書之癸夘年四月朢日門人史秉直謹序
