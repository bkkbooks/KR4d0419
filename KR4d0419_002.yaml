body:
  text: 莊靖集卷二金李俊民撰五言律詩答祁定之韻黃菊催秋暮青山勸客歸事隨時漸改人與物皆非爽氣收殘暑間雲送落暉平生會心侣别後往來稀遊太平泉稍有林泉興相陪杖屨遊百年人易老千種事堪愁是處花無主誰家酒可篘芳時好行樂春去不能留宿夾谷彥實菴挂名仙籍上晦迹茂林間門外丹河永牆頭明月山境隨心自遠人與話俱間應笑紅塵客區區謾往還河橋成橋成有日必有佳句寫河上逍遙之興贈子榮及督後楊成之預積他山木重新兩岸隄龍依天上卧虹傍水心低不假鞭秦石何勞立蜀犀落成應有日誰向柱先題又河廣思同濟天寒怕涉冬氷雖將自合船尚不宜從柱引來歸鶴淵藏未躍龍一編圮上叟千載願相逢又勢截長河浪橫陳百步梁經營方斷手過涉不褰裳漫惜千金瓠休誇一葦航西風簫鼓咽奠酒水仙堂癸巳冬至共愁天紀亂依舊日南時氣本自然應䇿令誰可推每懷添線女還意覆杯兒偃蹇無歸計天涯兩鬢絲又嵗以四時成氣自一陽始雖然廢羲職那可亂軒紀人生幾寒暑天道頻甲子徒嗟潦倒身汲汲百年裏乙未冬至巳應黃宫律初生復卦陽道隨天在北愁與日俱長節物驚時換年光有底忙浮雲多變態試與問何祥任仲山弄璋奕世多隂德傳家得寧馨人間熊有夢天上昴無星喜洽犀錢座光生玉樹庭鍾情笑盧老白髮望添丁五哥生日落落青雲器天然骨骼竒自從懷橘後每恨學書遲同樂憐荆樹相煎笑豆萁氣豪常自許躍馬自男兒代四哥贈相戒南陔養長看花蕚輝義深薑季被恩重老萊衣隊似魚同戲行如鴈共飛讀書當自勉繼取錦堂歸元夜有感春城行欲遍百感到愁邊市冷猶燈火人稀尚管絃梅從今夜落柑憶舊時傳歸去西窗月無情照不眠四哥生日秀出三株樹芳聨五桂枝杜家憐驥子徐氏重麟兒巳有髙門望方當志學時一杯添夀酒滿酌不須辭寒食為戀風光好那堪節物催事隨浮世往花似去年開莫灑無家淚須傾有限杯詩人多少興都向醉中來九日下山宰肉陳平社折腰元亮鄉車無門外轍菊與徑皆荒所恨國難守若為家不亡天威寒氣逼急急下山陽王生夀日幾度縣弧節當年琢玉郎徐行知禮讓幼學愛文章莫厭魚同隊休隨燕入堂眉間色多喜禁臠近東牀遊青蓮間攜方外友同謁梵王宫山吐三更月松搖萬壑風流年飛鳥過浮世落花空不有歸來興何能見逺公又行處春風惡山中勝槩藏漸佳如蔗尾薄險似羊腸翠揖雙峰角清臨一水堂夜長僧睡少為我話興亡過雲中把酒不成醉出門行路難客愁千里破歸夢五更殘三仕有何喜一生常鮮歡恨無南去鴈為我報平安宿海會寺同孫講師明上人趙叔寶劉巨濟夜酌佛堂光未放桑下喚難回是處皆堪歇何山不可開泉因龍吐出經自兔銜來徑向黃沙過尋僧問劫灰又青山雲水窟杖錫幾時來竹待香嚴擊松經道者栽西江無水吸震旦忽花開三笑圖中友同傾破戒杯遊碧落乙亥仲夏十有九日平水曹漢卿楊子方本郡李鑑臣劉濟之君祥姚子昻史遂良同謁治平院與上人和霽月煮茗道話抵暮而歸寂厯松間寺臨流勝槩藏斷雲開石壁橫吹爽溪堂謾與詩情在留連道話長行人貪弔古歸路半斜陽九里谷九曲羊腸路千層劒戟山行鉤藤蔓刺坐印石花斑樹發三春暮雲歸萬壑間相陪林下屐雖倦不知還食芡池底休鋪錦雞頭自有栽柔中皆水性剛外乃天才精彩惟魚目珠圓出蚌胎坐間咄嗟致不似荔枝來穎陽元道人虛白菴有山心可算有水耳堪洗飄飄元逸人寓意在山水勘破人間世不聽心與耳一室虛生白自得吉祥止八日登山同謁吳王祠四月老樹凋殘盡靈祠寂厯中古今時易改幽顯意能通嵗享屢登樂俗追三讓風送迎人散後日落亂山空陽城懷舊呈陽敬之燕子和李文卿路梗傷時事春歸感物華風波千萬丈煙火兩三家樹杪失巢燕牆根無主花當年人不見何處是生涯又道途行處惡故舊别來稀澗口分流水林稍挂落暉好山留客住幽鳥背人飛門外秋光老征鞍尚不歸上長平寄楊成之衰遲長在外矍鑠愧征鞍世路驚心惡天風刮面寒迢迢人漸逺冉冉嵗將殘今夜梅梢月同誰共倚欄獨坐地偏無俗客日在掩柴扉暑退間蒲扇涼生換葛衣風髙雲散影露下月揚輝獨據胡牀坐心清即道機乙亥過河一身長道路四海尚風塵昔作依劉客今為去魯人渡河年在亥乞酒嵗非申别後山中友相逢話又新河陽呈苗簡叔妖氣長斗北殺氣尚河東人物不如古地圖祗自雄三城環野水二麥卧天風多少逃亡屋荒涼晚照中即事炎涼愁裏過陵谷暗中遷素拙生生計尋耕下下田為嫌頻告糴却恨不逢年門外催租吏長妨對聖賢中秋對月雲山懷素隱秋興暫來歸月與人同醉星隨客漸稀入河蟾不沒繞樹鵲何依浩氣凝光界瑤臺夢欲飛山中寄張漢臣李廣之枳棘非所棲繫匏焉不食未黔墨子突又奪伯氏邑一年三褫服半嵗兩塗敕歸去來山中無喪亦無得經童盈門修鄭校同隊執韋經蘇子應千里徐兒向九齡鴈行成次序鶯語太丁寧堪笑西城老朝朝酷教刑自遣居間聊自適造物果何如生理年年拙交情日日疏吠猶聞跖犬技可笑黔驢誰識徘徊意西山有舊廬過星軺古道開天險危峯拔地形連營南北戍過客短長亭野燒驚山鬼胡雲掩將星何人弄羌管哀怨不堪聽七言律詩小旱雲而不雨阿香誰使送雷聲敢望天瓢一滴分恨魃長為周地虐閔尫幾被魯人焚風吹海立垂垂雨澤與山通處處雲何事卧龍猶不起得微往見葛陂君注山谷得微往從董父餐寧當罪繫葛陂淵復用韻區區布榖不停聲安得銀河水半分湯稼未應枯後溉周川豈獨旱如焚是誰主當知時雨有底商量出岫雲造物不為天下計只將花事了東君十六日雨平地俄驚霹靂聲老龍功過此應分不知東海因誰祭却笑西華欲自焚四面蔽虧無日月百神奔走會風雲時人那識天公事一溉惟知有巨君注鄭𢎞字巨君行春天旱隨車致雨注後戴卦為四華令縣旱積薪以自焚火起而大雨王子榮過家上冡暫領元戎小隊行盡驅春色入山城蔥蔥佳氣隨軒蓋嫋嫋髙風卷斾旌題柱橋邊男子志散金閭里故人情貴遊前後知多少不使堂虛晝錦名州有晝錦堂用趙之美留别韻五首把酒離筵且莫辭坐中瓜葛暫相依花從識後常含笑鳥自還時想倦飛往事微茫春夢斷故人牢落曉星稀天涯白髮禁愁得好在西山不早歸長短亭中送别時問君東去復何依今宵明月三人共來日紅塵一騎飛傾蓋莫嫌相見晚斷絃惟恨賞音稀天涯盡道還家好笑我雖歸似不歸為君不惜送行詩但恨蒹葭失所依流水盡朝東海去孤雲只向太行飛仕途氷炭收心早客路參商見面稀一曲陽關歌未徹聲聲頭上聽催歸遙指東山去恨遲爭如蓮幕早來依須知宋鷁猶能退有底齊禽尚不飛洛下書生憐我少燕南壯士似君稀主人好客懨懨醉正要髠留肯放歸平生藏器待何時除卻荆州不可依預報行人應鵲噪相將送客有花飛鴈從去後弟兄少鶯未來時朋友稀不盡赤心今日話東山無以我公歸赴山陽寄君祥濟之仲寬子昻立馬西風不忍行往回只是片時程一年又作半年客百里有如千里情落日寒林山下路淡煙疏竹水邊城願君把酒休惆悵四海由來皆弟兄白文舉王百一索句送行世事紛紛亂似麻不堪愁裏度年華傷心城郭來家鶴過眼光隂赴壑蛇彈鋏歌中成老境班荆話後各天涯何時造物歸真宰卻覩人間第一花承二公寵和復用元韻二首脫却朝衫著紵麻殘年猶復夢京華世情共指鹿為馬天意反教龍作蛇白髮不公人易老青山有素恨無涯那禁送别東郊外滿目離離濺淚花有客衡從説藝麻要教身後見西華若為養得能言鴨未解除他引睡蛇歸去稍知間氣味荒唐猶種老生涯眼前浮世慿誰問獨倚東風看落花重午偶題龍鍾歎我百年身幾見山城節物新水荇長如牽翠帶石榴半似蹙紅巾可憐今日依劉客便是當時弔屈人誰道南來風解愠試從比屋問吾民春日白頭不奈隙駒催慣飲屠酥最後杯百嵗無多偏晝短一年將盡又春來東君得地權終在北斗隨天柄巳回造物却還真宰手衆人今後試登臺和參謀李舜舉二平步青雲感遇初試看傾蓋氣何如橘皮應笑陳人榜雋永爭談辨士書夢鹿果能誰得鹿知魚未必子非魚青山馬上多詩句北斗以南名不虛一怒王師弔伐初堂堂人物古誰如劒頭何患無炊米楯鼻多應有檄書盡道公孫能躍馬應憐學士獨焚魚旌旗未度長河水千騎元戎已搗虛和東菴孔安道韻二擬結間中一草堂此心安處即吾鄉須知見在身為患見説長生藥有方老去看書徒引睡愁來得句不成章從前習氣都除盡待與髙人論坐忘淡泊生涯共一堂杖藜踏遍水雲鄉不妨廬結在人境應念客來從逺方三笑可無陶靖節八仙宜得賀知章袖中時出煙霞語習氣師兄亦未忘和子榮暫使彭宣到後堂安昌只以醉為鄉浮雲世事日千變流水生涯天一方老子興雖如庾亮故人恩不減蘇章能消幾兩尋山屐回首孤邱本未忘五舍人生朝積德高門慶有餘隔年記得掌中珠清新月窟兩枝桂俊逸渥窪千里駒戲自老成看蠟鳳志從小異見樗蒲一朝騰踏青雲上快覩徐卿第二雛籌堂夀日此生但覺醉鄉寬王績誰謂螭猶北海蟠王猛處處相迎皆倒屣王粲人人共喜欲彈冠王陽州應向日懸刀夢王濬山試今朝挂笏看王子猷仙馭未來緱氏鶴月明吹徹玉笙寒王喬烏衣厯厯是名家人物于今比晉多俗論不侵揮麈話王衍壯懷都付缺壺歌王大將軍雖無金埒堪調馬王濟賴有黃庭可換鵝王羲之見説長江欲飛渡王濬那須氷合望滹沱王霸和子搢中秋最後賔來舉白浮要須同賞桂花秋蛾郎應恨燈無焰孌女能教月再修分外髙寒天上闕就中明徹水邊樓姮娥不我為生客休把光芒取次收和子搢九日謾興此身到處賈胡留細雨斜風冷淡秋佳節又從愁裏過故鄉不似舊時遊試拈紅葉題詩句強摘黃花泛酒甌落帽龍山幾人在雲沈鳥沒恨悠悠節物催人分外愁干戈眼底未能休丹楓落處吳江泠黃菊開時壩岸秋可是涼風添寂寞更堪缺月照綢繆悠悠今古何須問淚灑牛山亦過憂沁園懷古風波平地難開眼劒戟羣山欲割腸冠蓋隨時成物故園林何日破天荒摩挲碑石空懷古點檢圖經為補亡誰是熙熙堂上客近來老子也和光和即事擬將唾手取封侯世事那禁種種愁未可搏他馮婦虎終須享此景升牛但知勿翦甘棠在莫為難圖蔓草憂自古貴人天所豫定教名字到金甌和新秋簾捲兩山雨乍停自知時節候蟲聲新涼邂逅如佳客殘暑留連似宿酲可見韓檠燈下志且憐班扇篋中情若為解得吾民愠更鼓南風一再行寄史正之往來門下亦風流分得籌堂幾許憂剛甚養他橫槊馬何如了取濟川舟人還忌器休投鼠誰為蹊田欲奪牛聞早抽身間處著不妨仍帶醉鄊侯聞捷音招王德華吳天章等出山紅塵一騎報平安知是元戎小隊還且喜好音來汴水仍將舊事問潼關橫雲自護車箱澗落日空銜箭筈山只恐膏肓歸不得早隨春色到人間用子榮河橋送别韻河橋把酒不成歡正是離人去住間公道幾時饒白髮世情今日見青山娟娟明月無家對慘慘孤雲待我還慙愧殷勤花裏鳥一聲聲送出陽關承徐子賢賈仲常張伯英寵和復用韻天涯杯酒強追歡白髮光隂轉首間獨夜夢魂千里月暮年心事數重山回腸都為愁將斷行腳猶疑債未還儻得一㕓休老地柴門今後定牢關宿村舍四首别後曾無一日歡風光都在落花間眼青羞對門前栁頭白相驚雪裏山華表鶴來猶是客烏衣燕去不知還森森庭院荒荆棘虎豹窺人夜撼關握手親情有底歡疏籬茅舍兩三間尚憐作者千年調那肯分人一半山安得意如張翰適慿誰放取浩然還得君斗酒須防客不怕重門更著關坡云重門著關不為君政恐惡客來仇餉懷抱何曾得少歡春愁飛上兩眉間一瓢謾酌獨清水幾屐能窮無盡山見説酒兵長日備江咨議酒猶兵也可千日不用不可一日不備酒可千日不飲不可一飲不醉未知詩債幾時還須防别後將軍槊不待尋盟輒斬關三兩殘杯不盡歡強陪年少貴遊間客中未必常為客山上那堪復有山鶴髮都從愁裏變貂裘直待醉時還一朝却入龎公市驚倒城門老抱關坡云城門抱關卒怪我此重遊閔董用之怪底年來懶下帷似嫌榜尾姓名題一枝自謂鳥難借百里誰知鳳肻棲頗訝生前徒強項未應老後不然臍試將點檢平時友大半佳城在馬蹄用之次韻復答小齋飄雨注風帷門外青山困品題足躡盡知齊是假膽嘗爭奈越猶棲任教别後書盈篋嬴得年來氣暖臍聊與老農歌帝力一缸村酒薦豚蹄夜雨五月十八日夜雨濟之君祥正之顯之漢卿子昂燈下酌酒相賀喜而為之書元氣淋漓徹九垓那消掩耳一聲雷雨雖不解知時節雲豈無心出岫來所恨龍潛猶未起大都天意卒難回等間莫話為霖事且對簷花盡此杯夜半天公號令催即時驚起阿香雷須知稼穡艱難甚誰把隂陽燮理來不使魃為周地虐定應龍自葛陂回鄰家酒熟留連客聊與愁人共一杯化工寧許著詩催平地俄驚失筯雷行雨夢從巫峽斷為霖人自傅巖來老農學稼無多力太史書年有幾回愛酒陶家才種秫何如共此即時杯用之請還府用韻拒之殄冦將軍力自宜幕中議論可回天氣吞驕虜鞭先著威定并門檄罷傳正恐一隅防飲酒張漢臣馬武有同醉堂休從百尺笑求田揚雄祿位誰能動姑為侯芭草太玄弔劉伯祥記曾林下見臞仙惆悵紅塵未斷緣不憚廣文寒處坐屢逢元亮醉時眠難逃辰巳賢人嵗有負虀鹽太學年落落天才無地用卻還英氣與山川伊闕鸂鷘堂二同王德華子正善卿澤之焦彥昭唐俊卿張伯宜史正之李文長姚子昂男李楊杜浩然書壁千年古道入荒城破屋頽垣一聚塵天地如何收險阻山川猶覺露精神餘波禹貢朝宗水習俗周南既醉人把酒西風無限興黃花時節對佳賔一日灘流淺自分灘頭鸂鷘似通神大都鸞棘無多地畢竟烏臺得幾人浮世堂堂春易去隨時局局事皆新當年靈翼今何在滿目西風動白蘋亂後寄兄二長劒何人倚太行氊裘入市似驅羊怒降白起不仁趙死守裴侯無負唐可奈崑炎焚玉石更堪蜀險化豺狼紫荆猶是階前樹風雨何時復對牀萬井中原矚汴梁縱橫大劒與長槍晝烽夜火豈虛日左觸右蠻皆戰場丁鶴未歸遼巳冢杜鵑猶在蜀堪王此生不識連昌樂目送孤鴻空斷腸送趙慶之赴邠州且莫匆匆數去程一壺别酒為君傾三年簿領妨行樂十里溪山管送迎湓浦蘆花風裏恨渭城栁色雨中情三峯無復同州看休著新詩笑不平别郃陽申伯福昆仲百里相望邂逅遲如今始得話心期情深堂上留髠夜興盡山隂訪戴時客舍故人那用送異鄉遊子不勝悲煙村水驛秦川路來往郵筒好寄詩和子搢來韻新年桃李似無情回首繁華一夢驚點檢青氊非故物等間傾蓋昧平生雨中燕子還留客風裏楊花欲送行試聽東流橋下水向人時作斷腸聲郭仲山夀日乘興遊山也自賢千金奚羡築臺燕誰為洛下同舟友人道江頭弄月仙欲向漳源歸舊隱便從莞谷種間田槖馳樹得長生理不解如君養性天和河上修橋四故里風光衣錦遊賦詩誰與共臨流相逢依舊山青眼也有何愁浪白頭官渡方當橫槊日合肥正是著鞭秋坐間有客誇雄辨不念題橋志未酬日日相陪杖屨遊往來林下亦風流雲間隱隱堆螺髻雨後鱗鱗漲鴨頭休恨臨津臨津河經始晚且看利涉河橋名落成秋尋常公事間中了詩債如何尚不酬眼底關山憶舊遊滔滔河漢自東流星槎不覺來天上鐵鎖那能護石頭顧我巳嫌題柱晚喜君正是濟川秋酒間豪氣誰堪共一醉千金價不酬落魄天涯頗倦遊片帆歸去得安流幾年無事誇犀首一旦封侯看虎頭飛將正當南渡日拾遺還是北征秋龍鍾不稱凌煙像只有山林志可酬壬寅九日同史正之劉濟之君祥仲寬姚子昂東城小酌寄錦堂王君玉長天一色鴈行斜雨過南山氣勢加懶後不冠羞白髮興來無酒負黃花何人見憶間陶令有客徒嘲老孟嘉秋景滿前宜共賞未應種種屬詩家興來落筆任橫斜坐上朋尊續續加貌似葉紅皆被酒頭如雪白也簮花金風漸急秋將暮玊樹相依客盡嘉酩酊入城扶不去臨街下馬是誰家隨州長官張鵬舉暨壻陳振文見過寂寥秋思梗吟懷幾度柴門鵲噪開一話勝看江表傳百書不及隴頭梅馬催行色日邊去鴈送歸程天際來萬里龍庭莫辭逺中原事業望人才和子榮悼恆山韻功名人比漢淮隂猛虎俄因犬輩擒星落旄頭兵似火雲屯細栁士如林豈期虞虢乖唇齒謾倚良平作腹心灑盡英雄憂國淚變風那得不傷今消盡羣陽道長隂將軍何患敵難擒唐家外望歸藩鎮漢室中興仰羽林忽墮曹吳分鼎計方知胡越濟舟心依然錦繡山川在一旦浮雲變古今剛忠公未除妖氣斗牛間一夜長星落將壇天意欲將全節畀人心無奈此時寒斷頭那肯降朱泚血指誰思滅賀蘭立盡犬行山上召我公忠烈不容刋同濟之遊百家巖懷郭延年有感三月雨晴間向百巖遊今古都成一段愁老衲解回山下虎稠禪師真人跨入洞中牛陸真子水流花落三春暮鳥沒雲沈萬事休有道碑前空墮淚往來誰復共仙舟辛丑中秋夜與用亨漢臣濟之君祥子昂仲寬及諸同志聚飲於學宫隂不見月二節物相催近覺頻勝遊攜酒意何勤幾人白髮對明月萬里青天愁片雲嫋嫋風髙秋巳半厭厭客醉夜將分督郵氣味從來惡今日尊前也獻芹戲遂良酒莫嫌勝日燕遊頻且慰寒窗力學勤白也停杯將問月退之利劒欲開雲清光難此秋三夜痛飲何辭酒百分况在泮宫思樂地與君共采水中芹送别曹漢卿馬上功名奈老何出門無地不風波慿誰試著回天力有客空揮卻日戈青眼乍驚行處少赤心常笑話中多愁人近亦無腸斷又聽離筵送别歌九日濟之君祥仲寬子昂攜酒於漢臣書齋小酌巳而乘興與衆老人會於城西馬氏東籬談笑盡醉抵暮而歸為賦此以紀一時之勝事相扶醉袖出西城翠展秋山一望晴坐上孟嘉嘲未解籬邊陶令話多情酒猶強飲狂時藥菊莫尋餐落後英興盡歸來天色暮老人星散月還生暮春和端甫韻暮春索詩且以不能陪郊外之遊為恨雨夕風朝樂事妨老來猶自為花忙春光一嵗只三月尊酒百年能幾場辛苦衙蜂輸蜜課等間巢燕得泥香如何復共遨頭醉待把銀瓶指點嘗承和復用韻草草杯盤興不妨一年一度送春忙我無酒量難投社君有詩情合擅場衣錦堂前冠蓋貴落花徑裏綺羅香暫時忘却愁滋味驀上心來似膽嘗答趙之美見和不堪春事等間妨汲汲光隂過隙忙青眼久懸髙士榻白頭羞入少年場風從定後花猶落月自修來桂復香休向兵厨問消息且教下馬客先嘗之美有深鎮兵厨未許嘗之句李子搢約同上山督之踏青時節醉何妨一掬歸心想見忙杖履不須從捷徑觥籌且莫戀歡場明山秀水家家景野草間花處處香休訝登臨無腳力世間險阻備曾嘗答史正之正之至連日清話限不能文字飲也時三月晦日草堂深處百無妨却為髙岑對屬忙髙適岑參杜遙知對屬忙啼鳥送春歸閬苑妖星亂世局文場間花空怨緣衣使煮酒不隨青杏香見説麴生風味少尚堪留與老叨嘗陽城題北臺觀壁幾年空負北山移今日方知見事遲猶憶王鳬初去後忽驚下鶴暫來時雖無壁上題名記頗愧棠隂聽訟詩指似荒城舊遊處西風搖落菊花期客中寒食斷篷蹤迹寄天涯劒戟林中閲嵗華又值禁煙焦舉節焦亦作周奈無對月少陵家驚心咄咄催歸鳥觸目冥冥濺淚花老後愁懷誰遣得未應端的酒勝茶和徐子賢西行留别便從傾蓋話詩情風雨端能落筆驚金馬謾誇三學士碧油曾見一書生竹溪花圃留連醉水郭煙村取次行自恨年來懷抱惡與君相别但吞聲調祁定之風埃滿面髮蓬垂欲學喬松久逺期浮世幾場漂杵血流年一局爛柯碁不須玉女引巢父那在神官邀退之果待吹噓送天上人間事了未為遲姪謙甫鞏縣寄魚掣三牽兩得沈腥顧我庖厨逺未能幾度敲針無處釣一朝醒酒不須氷居官止合如羊續命駕何須學季鷹當念家風本寒素莫從今後爇饞燈母師聖醉中落水用郭進之韻無人橋上醉婆娑腳力危時可奈何賀監未應真落井屈平到底也隨波浮雲世事黃粱夢斜日秋風薤露歌點檢交情能有幾柴門今後雀堪羅下鼇背浮雲蹤迹去留難谷謗巖嘲勒我還畢竟一身無著處大都百計不如間無多伎倆三休外是亦風流二老間昨日主人今日客回頭山色若為顔許司諫歸來圖社稷憂深志未舒陸渾山下賦間居幾年不復朝雞夢一旦翻隨壠鶴書闕朱雲徒折檻寵踰疏闕懸車商巖了却和羮事方信旁求象不虛寄伊陽令周文之括户幾年客裏厭馳驅故向伊川好處居剛受一㕓同許子誰知四壁過相如厥田不稱中中賦此事真堪咄咄書疲俗脂膏今巳盡看看鞭算及舟車和子搢秋晚出郭陶寫詩人得句忙舊遊能復憶嵩陽山頭雲霽雨聲歇水面風來花信香今日事雖非向日故鄉景自勝他鄉杖藜忘却尋歸路獨立河橋詠晚涼和述懷二簮履三千氣壓齊寒林那羡一枝棲坐中有客鵬將賦門外何人鳳欲題沽酒未嘗防惡犬著鞭寧復待荒雞夕陽休憑欄干望今日長安不在西擬將齊物物難齊惟有山林迹可棲身望鳳池慙不到名登鴈塔愧先題未能忘舊歸家鶴長是思鳴失且雞天為東周道垂喪肯生夫子在關西戲嘲江西社裏幾詩流詠月嘲風未肯休得句不能當競病措辭那敢向春秋笑翻王氏三珠樹驚倒張家五鳳樓帶繫雪詩三十韻勝如騎鶴上揚州答子榮行藏事拙且乘流遊遍人間老即休多汗愈膚三伏暑漸衰潘鬢一時秋風髙勢欲欺茅屋雨急聲疑在竹樓今世宦情何處好但憂無蟹有監州送史邦直入洛肉山南去汗如流了取公家事便休征棹不霑瓜蔓水歸裝莫待菊花秋忙中暫過平嵩閣别後頻登望省樓若問鶴鳴近消息翅翎飛不到揚州即事鐡馬長驅汗血流眼前戈甲幾時休誰能宰似陳平社那免悲如宋玉秋漠漠微涼風裏殿蕭蕭殘夜水邊樓千村萬落荒荆棘何止山東二百州寬張文玘怪來久不造龍門依舊相逢一笑溫任把錦囊嘲李賀休將布鼓詫王尊事隨勢過心猶駭言與時違舌可吞誰為書生肯推轂綈袍且念故人恩和竇君瑞勒石燕山後世名憲子孫蟬蛻起風塵融誰憐喜鵲飛來意由自歎靈椿老大身禹鈞愁見灌夫杯酒過嬰夢驚蘇蕙錦書新滔幾年客裏無情話一笑相逢姓麥人竇子溫宅為有力者所奪謾勞買宅著千萬此又卜居何適從得把茅來頭可蓋但教窗下膝能容尚憐相賀巢邊燕知為誰甜花底蜂速向元龍問間舍暫將一榻過今冬子榮途中見憶有先生在世人中龍三十年前到月宫之句依韻謝答髙樓日日望元龍禾黍離離閔故宫兩地謾看千里月五湖能借半帆風囊錐穎脫何難出名紙毛生未肯通好在沁陽山色裏一㕓寧許寄揚雄弔曹慶之杯酒中間氣沓拖從教千丈起風波絲棼世事無一可花落人生得幾何休向棘林長夜哭試聽蒿里送行歌豈容身後鍾君在阿騖如今嫁者多弔王德華衰鬢愁添鏡裏絲流年恰及夢中蓍可憐白日佳城地正值黃楊厄閏時丁亥閏十一月撫柩恨深元伯母負薪清慘叔敖兒髑髏不識生前樂枉却招魂費楚辭贈醫郭顯道小隱嵩陽種德時智能博物物皆歸籠中無愧狄仁傑山下常逢臺孝威子細論來生可養斬新卦得遁之肥粗疏誰似嵇中散幽憤詩成憶采薇焦彥昭失中子相逢地下果何如自謂情鍾亦太愚未必珠能空老蚌豈期玄不與童烏且憐商也無三罪尚喜徐卿有二雛萬事盡歸天豫奪速宜收淚謝玄夫讀五代史破却千金築一臺折衝閫外望人才中原山嶽河分斷塞上牛羊草引來西海正驚天狗墮北人忽擁帝豝回猶憐仙掌英靈在能把潼關閉不開春溫軒三尺枯桐膝上橫一彈洗盡綺羅塵芙蓉城裏誰為主姑射山前别有人雲雨不侵行處夢丹青難寫醉時真早尋林下乘鸞侣莫遣春溫過却春索和長平諸詩友送行韻信筆奉呈君玊閏之資客中一笑四漢厦非無論道氊自慙老去鬢皤然間愁似海藏皮裏往事如風過耳邊幾度班荆誰與話一朝傾蓋自相憐柴門近日多來客火速移牀待孝先青春人物正當時咫尺雲天快樂披相見便如膠漆密此行還似筈弦離方傳細栁將軍令或賦甘棠召伯詩待得一朝公事了聯鑣西去未為遲此身莫輒犯針氈只合浮沈委自然久墮風波人海裏暫依雲漢使星邊斗升乞活真堪笑青紫歸耕亦可憐早晚皇家重名器著鞭當在祖生先老覺粗疏過往時赤心今始為君披交情大抵無新舊人事從來有合離見説片辭能折獄未嘗一話不言詩河東自古文明地可惜儒冠感遇遲昨晚蒙降臨無以為待早赴院謝聞巳長往何行之速也因去人寄達少慰客中未伸之志耳二縱橫入市盡裘氊一旦衣冠氣索然豈信魯連歸海上頗哀屈子老江邊汗流石馬誰堪恨草沒銅駝世所憐莫憚區區困刀筆論功終讓指蹤先書生掉舌豈其時手底青編亦倦披鐡鎖尚沈江漠漠銅駝又沒草離離隂山路上明妃曲天寶年中杜甫詩古往今來幾興廢白頭恨見太平遲任仲山談西府事德音到處下情通喜動山城百嵗翁和氣挽回中國化威聲振起外臺風少酬漢使澄清志不愧周官燮理功南北封疆歸一統太平立法自河東唐臣滿月洗兒索詩故賦兩滿月白頭休恨夢熊遲却是人間久逺期有客巳為摩頂記為君復草弄璋詩一從老蚌生珠後再值姮娥月滿時咫尺昻霄看英物不須女子作門楣有二女留題靳載之園亭幽徑疏籬竹外村淡煙斜日水邊城地形占氣辨南北風俗以人分重輕坐上有山圍似畫樽中得酒論如兵青春將種多才調拂袖林泉恐不情載之靳千户之子送郡侯段正卿北行二征途萬里朔風寒過盡隂山復有山嵗既在於辰已後星多客向斗牛間漫漫積雪無冬夏劫劫飛鴻自往還若到龍庭試回首太行一片白雲間獵獵霜風墮指寒一鞭行色抵天山馬嘶衰草孤煙外鴈沒長空落照間入塞盡穿氊帳過去鄉須待錦衣還功名大抵黃粱夢薄有田園便好間送參謀劉君祥二寂厯書齋獨坐寒白頭羞見雪中山虛名得失蝸爭外浮世榮枯蟻夢間半夜朔風催客起幾時新月望君還鶴鳴林下無人共何處煙霞不可間馬首風花拂面寒十年兩度過隂山浮雲暮暮朝朝裏行鴈兄兄弟弟間大抵故鄉生處樂莫教明主放時還如今造物尤難料枉使身心不得間杜門近來人事頗相乖獨坐何曾得好懷犬吠為連沽酒市雞鳴長傍讀書齋門終待學張家塞闥恐難當噲等排惡客就中多氣岸時時下馬繫堂階中秋二露下天街一氣涼月明不復被雲妨正當金帝行秋令疑是銀河洗夜光蛟室影寒珠有淚蟾宫風散桂飄香席間醉客忙歸去獨共三人盡此觴共對青天好舉觴從前三五是尋常一年佳節秋將半萬里清輝夜未央才向缺時舒窈窕欲從盈後斂光芒姮娥曾得長生藥我欲停杯問此方和喬舜臣韻六月十四日二畫圖懸箇老人星一炷香煙禱處靈見説蟠桃將結子不知稿木巳忘形倚空山色青排闥掃地槐隂緑滿庭凡骨恨無輕舉便且求強健保殘齡幾年鬢髮已垂星豈是長生藥不靈席上精神歡伯力塵中面目偶人形來歸徒訝荒陶徑學退還思過鯉庭鄭重世情相愛甚一杯酒勸望延齡郎子雲酒熟同李茂卿史正之豪取不許愛錢措大眼孔小病酒先生舌本乾債是尋常誰不有囊嫌羞澀且留看三人未必一人損豪氣難忘習氣酸眊矂相逢欲空去從來如此四并難再赴陽城用前韻别茂卿子雲正之誰使腰間印欲懸不知面上唾才乾先生敢以督郵去坐客莫將官長看祖席又成攜手别離杯何苦上眉酸且休凋落髙陽社來往雙鳬也不難代樂仲和張溫甫處督米未必書生氣盡寒食常不足為居間清於孺子滄浪水瘦似詩人飯顆山欲向田文彈鋏去恐因邱嫂頡羮還聞君自有江湖量肯為枯魚少破慳清明席上同史正之姚君寶子昻浮雲雨後自縱橫不待風收放曉晴百計花期成謾興一年春色過清明誰家鑽燧罷藏火何處吹簫猶賣餳回首故園魂欲斷鳥飛只是片時程悼亡須信人生足别離别離不待白頭時因憐曩日在縲紲豈憚今朝炊扊扅中道奈何奔月去此情惟有落花知眼前活計無聊甚空對當年紙局棊段侯行春顯聖觀喜雨癸卯季春小旱清明後七日段侯正卿行縣回會名流勝士五十餘人於仙翁山下之顯聖觀須臾雨作自未至亥而止大滿人望酌酒相賀莫不盡酣適之興張種德有詩因和韻以紀其勝元帥申甫段玊使姚升書於壁行春冠蓋暫躊躇誰信東山面目疏興盡奚勞風送客氣和不覺雨隨車移民雖恨梁加少腐粟猶誇漢有餘獨嘆吾儒有何貴自今牛角莫橫書傷儒人種田事寄答趙公定他人共折依依栁居士但飲薄薄酒豈其必取齊之薑又恐不為白也母雖然客或許敦龎慙愧我無白璧雙更向稠桑老人卜準備買紅纒酒缸姚子昻夀日二月初三日門外風光二月初衣冠把酒慶懸弧一生接物無腸蟹萬事隨緣短脛鳬坐上書空窺草聖醉中疥壁笑詩奴年來世事俱嘗遍只合千金養客軀又用濟之韻贈子昻綿綿宗派自何時借問吳興第幾支書愛換鵝功不到獄因劾鼠法先知為秦徙木思無地在漢髙門福有基此去鄉閭結仁愛請君聽取忍齋詩有仁人巳結鄉閭愛之句為劉益之營中上王懷州二自分毛錐不入時如今尤恨掃門遲徒勞魏氏貪雞肋却笑虞人望羖皮未有赤心相待處奈何白髮是歸期儻令扶病還桑梓橫草難忘報所知氊帳連雲逐日移胡笳月底不勝悲中原為患有驕子造物戲人如小兒馮鋏縱彈無便去晏驂未解有誰知天涯回首消魂處故國霜前鴈過時錦堂碧落夀席年五十一年光過隙一何忙知命年來百念忘公事了時隂德大塵緣斷後道心涼未償勇退求間志先得長生不老方共勸十分添夀酒莫辭酩酊醉山堂答張文玘見戲邂逅騷人興愈多不知賜也許同科君猶老去詩魔在我奈新來技癢何但幸近無阿買寫慿誰付與雪兒歌一從探得驪珠後驚倒中洲蚌與蠡和王李文襄陽變後二逐鹿中原未識真指蹤元自有謀臣虞全不念唇亡國楚恐難當舌在人拔劒挽回牛斗氣舉鞭蹙起漢江塵相逢空灑英雄淚誰是荆州一角麟天命須分偽與真衙蜂戰蟻盡君臣蛟龍不是池中物燕雀休嗤壠上人衣不能勝嵇紹血扇無可奈庾公塵自從絶筆春秋後誰復傷時為泣麟僧奴劉氏甥十一月二十一日生籌堂子白髮因緣短犢車可憐小德外家無蚌生珠後何嫌老鳳有毛時亦自殊會看伯仁興絡秀不妨節信論潛夫劉生誰謂難成事將相從來有種乎注劉牢之甥酷似其舅共舉大事誰謂無成喜事相尋種種來豈期天意一朝回璋從弄後熊無夢月到圓時蚌有胎便可字教阿買識那消錢為窟郎堆賢愚懷抱俱休挂且盡前尊露頂杯和楊之美韻光華異域伏全才銜命匆匆出吹臺物外英標傾水鏡坐中妙語落瓊瑰節回北闕旋如斗名振西陲聽若雷不踏賀蘭山下石國風未合入詩來和李唐傑韻二翰墨場中第一人而今委翅在雞羣縱橫詩律凌徐庾浩汗詞源嫓典墳兵氣橫流存此老天心未欲喪斯文年來草就歸田賦嘯傲南山卧白雲郵筒寄後憶詩人落落英才逈出羣試問槐花忙幾舉可憐桂子落誰墳浮沈且與陪中立喜愠何嘗見子文傾破葵心望天表龍庭不日會風雲大朝再試悼籌堂霞鞍金轡紫絲絛玉帶紅靴織翠袍赳赳少年真手臂津津玊氣見眉毫不愁造化功難補可惜秋山勢自髙那免牛車身後患一場春夢亦徒勞和秦克容來韻白頭羞入利名場得得歸來自逺方何日詩豪離上黨去年道話憶山陽可憐杜宇訴亡國還笑沐猴思故鄉不意間中春色早黃鸝啼破謝家庒癸酉榜後寄姪謹甫第一科萬軸牙籖未是多十年辛苦短檠歌敢忘奕世箕裘業忽玷清朝甲乙科我巳夢君三舉後君如輸我一籌何二疏此去人方識名字先應報大羅塵忝後夢一人云王道衡李撝更三舉二人亦髙第癸酉省試王道衡第二御試撝第二道衡第十一隅三舉也本壬申舉場為兵事移至次年和安齋見寄調祁定之麻衣補破紙為絛不羡仙人宫錦袍天地老於雙轉轂山河渺似一秋毫煉深寶鼎丹砂就瑩徹靈臺夜月髙上界而今官府足暫遊塵世莫辭勞莊靖集卷二
