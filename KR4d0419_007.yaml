body:
  text: 莊靖集巻七金李俊民撰樂府洞仙歌謝楊成之寄梅隴頭瀟灑辜負尋芳眼浪蘂浮花問名懶縱看看驛使帶得春来祗恐怕綠葉成隂子滿暗香無恙否月落參横惆悵羅浮夢䰟短賴故人情重不减西湖花上月分我黄昏一半更選甚南枝與北枝是一種春風待爭寒煖又汴梁與計道真郭伯誠劉光甫同賦百年富貴一覺邯鄲夢識破中流退應勇縱生前身後得箇虚名褒貶處一字由他南董故園歸去好還肯同歸大厦如今有梁棟對青天咫尺列宿森然君莫恠不見少㣲星動且拂袖林泉作詩人盡明月清風笑人嘲弄又中秋秋光海底湧出銀盤爛只怕㣲雲淡河漢料姮娥應笑醉舞仙人今夜裏空恁樽前撩亂尋常三五夜也有團圓爭柰人心未能滿記當初破鏡飛上天時雙照影留得人間一半待仗他玉斧再修成問明月明年共誰同看瑞鶴仙細君夀日蕭然林下秀笑簷外梅花似人清瘦東風在垂栁筭幾時吹散眉間春皺興来搔首問今朝何處有酒怕一塲醉後漁歌樵唱大家拍手知否眼前合計無辱無榮地乆天長不須肘後望懸他金印如斗待一朝隨我騎鯨去後共尋天上王母把碧桃花底流霞為君添夀又夀李經畧生朝曉窓寒氣悄問小槽滴後真珠多少愽山夀烟裊向百花頭上梅花開了金樽頻倒甚坐間猶恨盃小記去年今日大家同慶太平佳兆堪笑浮雲世事流水生涯南柯夢覺風光正好欲退時何似聞早把俗縁抛盡逍遙林下青松長伴難老與鶴鳴立箇家風作千年調又綿綿仙種李有大道家風逍遙活計長庾見苗裔問如何謫在落花浮世麴生風味為喚回席上和氣被誰人說破黄糧夢裡一塲富貴何濟不如歸去樂取閑身登山臨水衆人皆醉笑獨醒澤畔憔悴但從今管甚雲翻雨覆暫教心上無事且一杯盡後一杯滿百千嵗又沁南守劉巨源誕節十月十五人生為郡樂推拯俗仁懐濟時英畧和風散蓮幕把功名一事暫宜髙閣興来自酌要酒澆胸次磊落比月中玉别有長生安心是藥休錯早還識破一夢南柯宦情漸薄北山素約試回首千岩萬壑況竹林當日七賢遊處物外驂鸞駕鶴在爛柯局畔樵人看君下著又錦堂夀日壬寅十一月十五河東賢太守使草木生光太行增秀功名落誰後醉歸来馬上氣衝牛斗一陽應候看春風先到細柳笑座中有客侯輕萬户詩誇千首依舊桂花盈處蓂葉圓時為君添夀滿堂飲酒盡平生傾盖素友對水雲鄉裡真山面目錢家誇甚錦繡但年年嵗嵗相逢似人耐乆酹江月壬午中秋與楊外郎仲朋姪壻郭仲進姪謙甫福昌待月中庭待月正催詩雨過暮山横碧别後連昌秋幾度一話團圞今夕萬里清風闕中為我掃盡雲踪跡泠光不似尋常些小窺隙應憐白髪功名倚樓看鏡惟酒澆愁得且鬬樽前身見在亹亹風生談席洛下仙舟闕間星使邂逅非生客天涯雙桂廣寒誰念幽寂又六月十四日感舊先生誕日臞仙風格暫天教作箇人間浮客白髪光隂催老境誰見摩挲銅狄揮劒成河曳戈却日著盡回天力黄粱夢覺轉頭一段陳跡休問花謝花開春蘭秋菊總被風欺得華表鶴来人換世惟有眼前山色偎徑栽松傍門插柳笑比陶彭澤晚涼月下一樽聊永今夕又承濟之和復用元韻脫巾挂壁向雀羅門外幾回迎客縱有一樽陶寫後不遇當年儀狄未著祖鞭先投班筆老恨無才力天涯地角斷蓬流落蹤跡歸去作箇閑人錦囊詩句都向閑中得謾說他鄉光景好多少世情風色損友違三益朋近五易卦占山澤人間星聚不知天上何夕又王懐州夀日丁酉年堂堂玉立看坐間揮塵風生談席相對竹林三四友氣壓蘭亭豪逸招隠詩中登樓賦内此恨無人識缺壺歌後佩刀還向誰得何用三窟謀身醉鄉一笑與元規塵隔好在朝川堪畫處寫出髙人椽筆雲外舄鳬月邊笙鶴邂逅騎鯨白蟠桃㑹上不為王母生客摸魚兒送姪謙甫出山這光景能消幾度大都數十寒暑結廬人在山深處萬壑千巖風雨朝復暮甚不管堂堂背我青春去髙情自許似野鶴孤雲江鷗逺水此興有誰阻功名事休歎儒冠多誤韓顛彭蹶無數一溪隔斷桃源路只有人家雞黍歌且舞更不住醉中時出烟霞語暫来樵斧貪看兩爭棊人間不道俯仰成今古謁金門贈教授李勉之初雨歇槐夏綠陰時節萬里無雲天紺滑一輪光皎潔好怕暫髙還殁好怕暫圓還缺同是廣寒宫裡客相逢無話說又和邦直烟雨曉夢斷池塘春草坐上麴生風味好銀杯休厭小剛要玉山醉倒社甕釀成㣲笑人世閑愁都占了有情天也老昏又曉蝶夢不棲芳草照映瓊林人物好薰香荀令小不怕醉時徤倒恐怕醒時花笑潘髩都因愁白了老人心未老西齋得梅數枝色香可愛一日為澤倅崔仲明所竊去感歎不巳因賦謁金門十二章以寫其悵望之懐寄梅開未徹先把一枝偷拆看取黄昏今後别暗香浮動月誰為尋芳時節誤了前村踏雪為問花間能賦客如何心似鐵探梅誰便道昨夜雪中開了次第不將消息報探芳人草草宜在嫩寒清曉興比孤山更好籬落逢花須醉倒惜花人易老賦梅金的爍猶帶枝頭寒色休道北人渾未識自然梅有格初見花時摘索再見花時狼籍詩句眼前拈不出惱人樓上笛歎梅頻㸃檢依舊雪肌清減似恨海東花使濫不教么鳳探休笑詩人冷淡道盡影踈香暗桃杏雖然無藻鑑承當應不敢慰梅誇獨秀動把春光泄漏誰道江南無所有一枝先入手須是日就月將那在風飄雨驟直待豆稭灰落後初嘗山店酒賞梅全不讓占了百花頭上殁箇知音人共賞陶潛無處望也有江湖酒量也有風騷詩將休道花前無伎倆踈狂些子放畫梅偷造化秀出含章簷下為問花中誰可嫁海棠開巳罷占了十分閑雅占了十分瀟灑若使畫工能此畫九方臯相馬戴梅花譜内莫作等閑看待鬬草吳王無可對有他西子在好在一枝竹外影也教人堪愛未免世間兒女態折来頭上戴别梅懐抱惡猶被暗香著莫想在隴頭誰領畧一枝分付錯今夜雲窓霧閣明夜烟村水郭紙帳天寒人寂寞夢回聞雪落望梅春一半留與大家同看覔箇温柔林下伴北枝猶未煖縱有姮娥照管可惜羅浮夢短斷嶺不能遮望眼幾時魂却返憶梅多少恨不見舊時風韻浪蘂浮花都懶問江頭春有信誇甚夀陽粧鏡說甚揚州詩興雲破月来堪弄影世間無此景夢梅隨徤步巳過市橋江路費盡西湖多少句暗香留不住銷得黄昏幾度又是天寒日暮枕上吟魂無著處化為蝴蝶去又再和邦直人未曉古錦囊中詩草抺月批風滋味好氣吞雲夢小要把鳳棲驚倒不學烏臺嘲笑多少閑愁陶寫了數篇吟可老又河南府同知髙誠之夀風漸力水剪飛花狼籍鼎沸笙歌催舉白玉堂金馬客歡動周人頌徳喚起洛陽春色況值日南天道北老人星拱極水龍吟翟端甫夀日十月一日勝逰漫說山陰筭来不及山陽好七賢林下一時人物何如安道況有竒才縱横筆陣千軍獨掃向碧油幢底真儒事業倚馬看檄書草誰識平居隠操翟湯遇江州十分禮貌世情交態雀羅門外幾人曾到且鬬樽前等閑休問髙山白早頼姮娥留得一枝丹桂伴靈椿老為男孫哥在又籌堂夀日一朝衣錦歸来髙門不負于公望恍然如舊黄流萬里大行千丈只此當時添些氣勢減些風浪記采薇戍罷分茅議定凱歌動聲悲壯元自山西出將却從他山東入相兠鍪須待貂蟬換了凌烟畫像且把功名暫都分付淺斟低唱但年年看取三台長在老人頭上阮郎歸戲李子搢江南江北水連雲江山憔悴人華簮猶拂洛陽塵離筵何太頻歌近耳酒盈樽樽前見在身昨朝罵坐灌將軍近前丞相嗔又楊彦明夀日籌堂之甥年来宅相有誰承人誇似舅甥帶牛佩犢盡春耕莬裘了一生閑事業寄丹青筆端如有神試看自冩鏡中真老人南極星又郭延年誕日斷蓬蹤跡去依劉試登王粲樓此心安處即莬裘尚何来往求詩遣興酒消愁竹林多勝逰與君何日共仙舟相看應白頭感皇恩楊成之生朝四月初三日啼鳥怨春歸一聲聲切蓂莢初生兩三葉征鞍何處撩亂楊花如雪鵲聲頭上喜来時節香篆半銷夀波重酌玉帶金魚坐中客幕天席地便是仙家日月試從今後數蟠桃結又李子搢夀日戊申年甲乙科第甲乙占科名同根仙李富貴南柯夢相似天涯雙桂慙愧廣寒宫裡怱怱歸去覔佳山水休話升沉休形愠喜且論南華養生理問君甲子少我行年一紀須知鄉黨禮莫如齒又出京門有感忍淚出門来楊花如雪惆悵天涯人離别碧雲西畔舉目亂山重疊據鞍歸去也情悽切一日三秋寸腸千結敢向青天問明月算應無恨安用暫圓還缺願人長似月圓時節滿江紅孟洲長馮巨川誕日解愠風来天氣爽緑隂庭院多少話暫都分付畫梁雙燕明月欲隨人意滿十分未愜姮娥願但一年一度夀觴時身長徤玲瓏曲低低唱玻璃盞深深勸任春紅吹上桃花人面簪履盡居彈鋏下烟嵐休恨平嵩逺待試看南極老人星今朝見又和張文玘宿酒纔醒聽喚起一聲春曉無限恨滿城風絮一川烟草年少抛人容易去萬紅千紫都開了試但教頭上插花枝花應笑狂言在人絶倒狂藥盡愁難掃待叮嚀囑付再来青鳥團扇不堪題往事斷絃惟恨知音少但時時頻把鏡来看人將老又名利塲中愁過了幾多昏曉試看取江鷗逺水野麋豐草世事浮雲翻覆盡此生造物安排了但芒鞋竹杖任蹉跎狂吟笑樽有酒同誰倒花滿徑無人掃念紅塵来往倦如飛鳥懶後天教閑處著坐間人比年時少向太行山下覔莬裘吾將老又李孝先夀日四月八日小雨初晴風揺蕩綠隂清晝見說道長庚復向人間鍾秀又對上畨成竹笋能忘贈别垂條栁看將来三五月圓時人如舊時東平取前妻浮世事君知否春夢斷空回首笑平生豪邁氣沖牛斗幽鳥自歌無譜曲飛花故送長生酒待騎鯨海上再相逢為君夀又詠雪漠漠愁隂銀界曉浩然一色誰剪水就中撩亂燕山如席天若有情天也老髙山底事頭先白甚教人錯恨五更風花狼籍寒欲退劉义筆深欲殁韋郎膝問何如江上孤舟簑笠君不見過門多惡客等閑踏破瓊瑶迹便麄豪下馬坐人牀尋歡伯婆羅門引重陽與元帥竇子温暨衆友東城賞菊即席賦浮空霽色江㴠秋影鴈初飛相逢共遶東籬㸃檢樽前見在人似曉星稀對滿山紅樹葉葉堪題大家露頂任短髪被風吹只恐黄花人貌不似年時盃添野水更何用頻頻望白衣沉醉後㩦手方歸清平樂壬申嵗六月十四日滿斟綠醑勸我千金夀不住光隂催老醜三十七年回首鏡中白髪無多缺壺安用長歌有志封侯萬里列仙不柰臞何又錦堂夀青雲得路休嘆功名誤好在輞川堪畫處聞早抽身歸去任他千丈風波光隂著酒消磨識破落花浮世笑看金狄摩挲本作抄又閏重九宋翔卿席黄花今後纔是秋光暮依舊滿城風又雨勾引錦囊詩句東籬尚可重逰羨君来往風流莫惜樽前徤倒這回節去蜂愁又戲贈城南歸路信馬隨車去家在白雲樓下住簾幙深沉庭戸不論天上人間到頭此債須還一枕行雲夢覺小樓却似巫山南鄉子李克紹生朝来往亦風流曾伴仙翁衣錦逰聞道長平朱紫地西樓依舊人人說故侯能得幾春秋未必靈椿老便休自有枝枝丹桂在何憂寶月忙催玉斧修又上夫人夀日香靄愽山爐羅綺森森奉燕居晝錦歸来冠盖里當時曾拜金花大國書一旦得雙珠阿大中郎喜有餘見說上天雖富貴爭如平地仙家碧玉壺又錦堂夀日弓劒不離身唾手功名馬上成見說人生為郡樂班春政事如棋局局新熊夢慶佳辰喜動山城擊壤民晝錦堂前爭獻夀留賔盡是蟠桃㑹上人又錦堂碧落夀席爽氣逼人家相對溪堂雪後山賴有忘年林下友盤桓都把功名付等閑盡道好休官況在黄柑紫蠏間天意不随人意改平安愁莫能侵鏡裏顔太常引崔齊明生日太行千里政闕問何處是黄堂遺愛幾時忘試聽取人歌召棠烏衣年少插花躍馬休負好風光三萬六千塲但暮暮朝朝醉鄉又竇君瑞夀日燕山勲烈有餘光問丹桂幾枝芳隂徳後来昌但教子應須義方功名看破黄冠野服林下道家裝何處是仙鄉這日月閑中最長又劉君祥夀二月十五日區區州縣肯徒勞誰得似卯金刀一笑醉蟠桃問何處仙山可巢兩朝人物積年陰徳心力過蕭曹門户便須髙看今後君家鳳毛西江月籌堂夀落落瓊林人物飄飄鶴氅仙風渡江已後見英雄那在懸刀一夢霧恰山中隠豹雲還天上從龍太行直枕大河東猶比聲名不重又裴節使夀字懐誠薦疏李誇精鑒垍壻佳韋得賢侯寛手如霹靂在同州琰之不讓當時談藪頠但可稱為勁草諝莫教指作清流樞歸来緑野任沉浮度這箇家風耐乆炎又張堂臣夀日人比當年楊柳六郎元似蓮花漁經獵史是生涯那羨章臺走馬鱸膾未歸夙駕斗牛尚客星槎直教三戰過崔家伴取赤松林下又答亞之漠漠烟生碧樹溶溶水滿芳溪東風吹濕落花泥忙殺營巢燕子百字詩慙我寄一壺酒望君㩦休將閑事等閑題且把眉頭放起鵲橋仙段侯夀日題橋志氣沉碑勲業不在著鞭人後浮雲富貴轉頭空似一夢南柯太守輞川别墅平泉小隠此計地長天乆金章還肯換簑衣買陂塘旋栽楊栁又劉君祥夀癸夘二月十五日嵗方值卯斗方指卯卯月月圓時候大家来把卯時盃共與箇卯金為夀一盃夀酒一盃貴酒更有一盃富酒一盃留待賀添丁見積善之家有後㸃絳唇重陽菊間小酌同申元帥等秋樹風髙可憐憔悴門前柳白衣去後閑却持盃手一笑相逢落帽年時友君知否南山如舊人比黄花瘦又錦堂夀日馬上功名射鵰誰似將軍手一朝肘後金印懸如斗錦繡山川何似人長乆閑中友為君添夀共勸忘懐酒又王懐州夀日戊戌十月一日横矟將軍是他馬上男兒事河山表裏養就英雄氣衣錦歸来占盡人間貴功名遂神仙平地學取留侯計又馮巨川南齋牡丹花恨開遲為花遲後為花惱問花開了却恨花開早人貌年年不似花長好還知道年年人貌却笑花先老又酒贈車元帥著甚乾忙人生只合糟丘老一盃軟飽從事齊能到不讀離騷恐怕愁難掃春光好醉時便倒何處無芳草鷓鴣天弔李克修須信人生足别離此情惟有落花知方憂躍馬明年事年四十二亡忽至黄楊厄閏期乙未七月二十六日閏前生有限去何疑騎鯨公子賦成時得從上界真官府百計招魂不肯歸荘靖集巻七
