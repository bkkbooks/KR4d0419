body:
  text: 莊靖集卷一金李俊民撰古賦醉梨賦花殘葉疏鳥勸提壺春回雨淚之容香滿白雪之膚得之霜而顔始紅見其日而頭欲扶夫天之酒星不在於天化為巢飲之徒煦甘嫗㫖嚅膏嚌腴張公之裔遊無何之鄉哀家之胄入步兵之㕑笑君子之交淡閔大夫之色枯其未醉也磊磊落落髙世之傑趨之者衆甚於成蹊之李其既醉也昏昏漠漠保身之哲趨之者寡比於不材之樗凌寒傲暑舞空蹈虛兀然將頽之叔夜塊然獨留之淳于其醉於心者心朋心友也如郭奕之見阮咸其醉於面者面朋面友也若程普之遇周瑜小二豪之在側悼一夫之泣隅當是時也以日月為過客以天地為蘧廬猶笑夫獨醒之子不肯醨糟之餟餔乃有心如渴烏勿燥未濡夢三江而吞五湖然後乃得䝉其齒録䇿一醉之勳也莫不愜魏梅之望快湯稼之蘇是所謂以醉醒醉者邪梨之為物也秋而後成屬西方之金其花皎而白金之色也其實甘而冽金之味也皆得天地之義氣介然特立確乎不移此性之常也然今之所謂醉者乃其性之變者歟故今日之放乃向日之拘向日之潔乃今日之汙隨俗俯仰因時卷舒彼常而不知變者未免乎憔悴而守其株者也嗚呼噫嘻以舉世為桔橰邪則漢隂之甕不以用拙而不抱以舉世為鴟夷邪則井眉之瓶不以迎危而不居蓋可及者智不可及者愚然則是梨之醉也其中有趣雖父不能傳之子宜其楂之不如馴鹿賦有足而跂有角而枝處山而適食野而肥一旦為雉兔者所獲遂見縶於籓籬不纒而縛不械而羈覩常如崖異履平如險巇野哉之性何異夫由也之見仲尼鄭人之夢鄭人之疑秦人之指秦人之欺母而歸未能如西巴之麑與犬而嬉慎勿效臨江之麋鹿兮鹿兮汝生我依我恩汝知不見夫人之子食其肉而寢其皮四言古詩蕭權府三害圖長橋之蛟南山之虎在彼州曲父老所苦豈獨苦此亦有周處周乃慨然恥聞斯語薄險投深踊躍健武爾蛟既除爾虎既去周乃自勵履規蹈矩卒以將種效忠典午按劍平西貞節克舉瑕以瑜掩過以功補身雖云亡名播千古止姚亞之刲羊養生之鞭隴種之苗欲魯去朔在齊聞韶咄嗟老叨腹如瓠枵踏破菜園合喫藤條焦天祿野叟聽音圖梨園弟子天寶之後誰其知音百嵗遺叟曲終悵然淚迸林藪時清眼明萬事緘口唐叔王韋生卧虎圖梁鴦之養或失其時曹公之肉不救其饑羊質而皮狐假而威誰能於此辨是與非學中史正之㑹客有懷伊人在泮飲酒我客戾止其嘗㫖否未見君子我心孔疚惠然肯來小大稽首烟江絶島圖江風不波峭壁森立冥冥飛鴻翔而後集雙松古渡圖傾蓋相逢堂堂兩公寂寥渡口以濟不通古柏寒泉圖冬夏長青晝夜不捨拔本塞源豈知量者紙扇竹疏而骨楮剝而膚權以行巽風乎坐隅棕扇直節貫中怒髮衝上朝蠅暮蚊畏風長往五言古詩成之夜談省庭新事偉哉青雲器底藴莫能見開口論利害坐客服雄辨汪汪江海量氣不許黃憲從來布衣願一擲輕百萬投瓜必報瓊豈望在焚劵雖承雨露恩慷慨輒自獻與其便於已孰若於國便蓋嘗推此心天下欲兼善儒家惟有孟日夜講不倦儻以利為利請看貨殖傳復和驅馳戎馬間太平不復見往往談雋永寧許齊士辨有田宜早歸奪恐遭竇憲再三欲買鄰愧我無千萬難倩沽酒奴待立便了劵籌堂天下士風度邁羲獻别後曳裾人造門恨無便握手再相逢虛左待益善平生身口纍老大折腰倦莫訝陶先生自作五栁傳鎮山堂峥嶸屋下城突兀城上屋初看頗驚眼再見堪捧腹能無鬼神笑可奈瘡痍俗不哀梁間叟欲竭南山木嵇康淬劒石尋常論養生未得養生說擬從林下遊一書交盡絶既無當世志安用三尺鐡頻頻石上磨神光浸秋月可憐粗疏甚自謀何太拙危絃發哀彈幽憤終莫泄死留身後名有愧侍中血樊噲戲石丈夫氣慷慨隱迹在東市或逢逐鹿人乃棄屠狗事壯哉鼓刀勇旁若舞劒地遂摧拔山力自嘆時不利至今空山石傳是將軍戲能興卯金運頗與黃石類不期兩都後復有三國志過客對春風徒灑山陽淚寄籌堂老為人所憐貧恨友獨寡等閒門外車盡入宰肉社欲隨射虎將爭奈無匹馬安得化為雲四方逐東野大庇天下士擬作萬間厦顧我蓋頭茅寧肯助一把非無問舍心或恐卧牀下縱有願留人有館不能假還因索居久往往罪商也須待舍館定然後見長者毛晉卿肖山堂悠然林下客世事頗能料閒中意自適身外名肯釣卜居山之陽初為識者笑勢將凌岱華氣欲吞嵩少方尋願谷隱稍近孫臺嘯微茫數烟岫巉絶對雲嶠為我增雙明未必在逺眺始雖如面友久乃得心照恐隨有力去或被移文誚已見成膏肓百計莫可療一時烟霞語慎勿駭廊廟咄哉肖山堂所以警不肖廟學落成斯文天未喪吾道有時厄方嗟鳳兮衰遽嘆麟也獲繼遭秦焚書又被魯壞宅邇來天下事多自馬上得不修下車禮不獻在泮馘不授羽林經不講博士席旁若沒字碑肯見一達掖偶因長樂老盡挾園冊及見中選人始知為學益學者如牛毛自古數濩澤連年取青紫易於地芥拾爭將逸駕攀遂向塞路闢揮之無倚門從者皆入室肅肅俎豆風洋洋絃歌邑幾時復論秀四海望偃伯術能嚮者誰世無秋風客德老栽花成竹芍藥花物性隨所移嵗晚氣自變失却本來身還於身外見得參玉版禪如對菩薩面叢林一花祖派入香嚴傳劉漢臣堂甫北歸哀哉同隊魚盡在枯池裏縱免鼎中烹將見渴欲死造物何不仁豈獨困二子我雖江湖心恨無斗升水母應之餉黍憶昔周室衰周人詠黍離君今餉我黍為賦黍離詩厥初藝黍時飯牛使牛肥八月黍未穫畨兒驅牛歸畨兒不滿欲我民還買犢今秋犢未大又被畨兒逐畨兒皆飽肉我民食不足食不足尚可鬻子輸官粟遊碧落壬寅重午日陪郡侯段正卿暨王用亨劉漢臣濟之君祥仲寬姚子昂張唐臣祿卿平陽趙君玉王潤之同行浮雲翳炎景長夏愜幽事相陪林下友共造金碧地清流潄寒玉老樹聳蒼翠何人開山祖妙處發天祕悠悠嵗月深剝落磨崖字遨頭興不淺有酒留客醉幽鳥背人飛不慣聞鼓吹抵暮出山門溪風送歸騎史遂良索詩立身有道邦誰似直哉史流傳百世後各各異行止許史有何厚在漢勢如彼安史有何薄在唐亂如此人之賢與愚皆為類所使近從儕輩中偶得一狂士未能通一經謂可拾青紫時時出俚句技癢不自已只恐落調歌難入知音耳縱橫言世事不顧刺舌恥焉知阮嗣宗口不挂臧否年髙鬢如雪鄉曲所不齒試與阿戎談咄哉犁之子男牛兒留别李㢲之癸卯三月十七日癸巳嗟嗟平生交所恨不耐久幾年戎馬間大半正丘首憶初識君面同門皆小友倐忽五十春相見成老叟淹淹泉下人樹拱骨已朽﨑嶇見在身何幸得此夀感慨嵗云晚哀淚迸林藪古今均一夢萬事付杯酒七言古詩司諫許道真徵復圖君不見退休緑野平淮相靈臺不許丹青狀又不見五湖歸去鴟夷槳越人爭鑄黃金像功成身退天之道道直天憐去官早鹽梅須借築巖人羽翼重來採芝老袖中諫草力回天害除利興車載懸何憂不識荆州面圖畫如今處處傳郭顯道美人圖君不見昭陽殿裏蓬萊人終惹漁陽胡馬塵又不見吳宫夜夜烏棲曲竟使姑蘇走麋鹿移人大抵物之尤喪亂未免天公愁雖然丹青不解語冷眼指作鄉溫柔試問人間何處有畫師恐是傾國手却憐當日毛延夀故寫巫山女粗醜杜詩誰道巫山女粗醜何得此有昭君村宣差射虎十二月初九日北原風徑霜草枯草間出沒藏於莵耽耽來此被誰驅不防邂逅馮婦車將軍膽氣勇有餘手中笑撚金僕姑等閒如射兔與狐兩眼錯莫精光無深山大澤失所居或撩汝頭編汝鬚可憐肉食無逺圖伎倆不及黔之驢羣鼠為耗而猫不捕欺人鼠輩爭出頭夜行如市晝不休渴時欲竭滿河飲饑後共覔太倉偷有時憑社竊所貴亦為忌器不忍投某氏終貽子神禍祐甫恨不猫職修受畜於人惡除害祭有八蠟禮頗優近憐銜蟬在我側何故肉食無逺謀耽耽雄相猛於虎不肯捕捉分人憂縱令同乳不同氣一旦反目恩為讎君不見唐家拔宅雞犬上升去彼鼠獨墮天不收仙傳唐公昉師李八百得其神母遂舉家升天雞犬皆去唯鼠空中自墮腸出一月三易其腸今山下有拖腸鼠束廣微所謂唐鼠掃晴婦世俗為掃晴婦者蓋假燮理之手導隂陽之和使民間免乾溢之患也感其事而賦之卷袖褰裳手持帚挂向隂空便搖手前推後却不辭勞欲動不動誰掣肘偶人相對木與土神女但誇朝復暮龍公不作本分事中間多少閒雲雨見說周人憂旱母寧知東海無寃婦殷勤更倩封家姨一時斷送龍回首雨雹庚子年四月二十八日壬戌大雨雹五月七日八日又雹按左傳昭公四年魯大夫申豐曰聖人在上無雹雖有不為災以古者藏氷為禦雹之道祭寒而藏之獻羔而啓之今棄而不用雹之為災誰能禦之由是言之禦災其在人乎感而賦詩傷今之不如古也按月令仲夏行冬令則雹凍傷榖注子之氣乘之也陽為雨隂起脅之凝為雹雲龍失守元氣乖隱隱愁聽狂車雷須㬰飄驟不成雨一天風雹從何來交橫散落星石隕紛霍迸擊氷山摧坳平忽訝坑谷滿垤起俄作丘陵堆驚忙飛走殘夭夭斫喪枝葉枯根荄穿忩入戶彈相射填街溢巷把莫推恢恢難補天網漏凛凛欲壓坤軸頺一方生理遭殄瘁造物不恤空自哀是時仲夏行冬令誰把四序顛倒催雖有舜絃愠不解孰謂鄒律春能回陽雖位降乾道在一隂才進力可排履霜之漸此其始司寒挾黨結禍胎春秋大小百餘國獨向魯地三為灾左傳僖公二十九年昭三年昭四年大雨雹世間萬事豈不見那用區區書觀臺我思天變豈徒爾以象告人當自裁五行志占雹有眼天罰戒民過也鼎齊司馬景仁因病瘧而得腹疾鼎齊療之而愈因索詩為賦茂陵千載文園客流傳耳孫猶病渴引飲自嫌江海窄家無麴藭奈腹疾水帝之魂成水厄女丁婦壬不相得始圖一溉滋湯旱卒見九河歸禹畫嘗聞秋夫曾療鬼大勝扁鵲能起虢君不見上醫可醫國異哉鼎齊堪鼎食姚子昂畫馬雄姿卓立開天骨騰踏萬里如神速可憐不遇九方臯空使時人指為鹿自從大奴守天育無由更騁追風足中原一戰收乾坤白髮將軍髀生肉苴履待詔門前東郭趾藍關路上仙人迹雪花紛披蓋地白東家不借借不得雖然近市屨亦無以故為新即有餘同行留我木上座補過仰渠金十奴一生能著屐幾兩用心猶在阮孚上不須更覔下邳侯山林此計成長往時守下邳兒輩剡木作匙一震之威乃如此坐間或失將軍匕不能便染公子指有意欲割崑奴耳小兒造物窮物理斗柄之揭如其尾雖然劍頭有炊米又愁遇著捩手鬼聞蔡州破甲午年正月十日己酉不周力摧天柱折隂山怨徹青冢骨方將一擲賭乾坤誰謂四面無日月石馬汗滴昭陵血銅人淚泣秋風客君不見周家美化八百年遺恨黍離詩一篇籌堂尋梅蕭疏籬落誰家圃尋芳信逐游蜂去眼前荆棘少人行馬蹄直到香來處怕愁貪睡獨開遲瘦損春寒鶴膝枝可是東君苦留客斜風細雨不堪詩和秦彥容韻五首彥容寄詩有先生髙見真吾師速營莬裘猶恨遲窗明炕暖十笏地松風蕭蕭和陶詩山野巳尋雲外路直入天壇最深處踏開李願舊游蹤請君自草盤谷序之句故依韻和之養賢列鼎手自烹燮調元化和如羮馬蹄一蹙燕地裂氊裘尚拂隂山雪將軍表請願出師壯士戈揮惟恐遲武成才試二三策黍離巳見閔周詩縱橫門外豺狼路我老此身無著處君不見平淮十萬兵猶向襄陽守朱序見征淮漢君不見子幼自勞羔日烹何如命駕季鷹吳中煮蓴羮又不見姜侯設鱠鑿氷裂何如徒步拾遺長鑱黃獨雪幸遇南來董鍊師說似壺天日月遲謫仙之游乃非謫長安市上斗酒百篇詩蒲輪休指商山路得到白雲採芝處諸生待揖隆準翁馬上未遑事庠序獵犬巳為死烹猶向漢俎分杯羮腳靴手板凍欲裂尚立唐階沒膝雪三寸舌為帝者師終比赤松見事遲相看一笑在目擊何用左思招隱詩出門便是天壇路雲間指㸃巢仙處不辭杖屨從子遊王者之後養老在西序時寄王子榮西齊榖因辟後厭鼎烹那在丘嫂轑釡羮冠未挂前巳先裂一簮却上山頭雪我雖無師心我師速修何恨下手遲論中自得養生理筆底盡是游仙詩休向回車問前路終須有箇安排處晴忩㸃檢白雲篇不知誰為作者序不嫌瓠葉日猶烹不羡公子染指爭黿羮不把荷衣等閒裂不羡曹人共服麻如雪愛身肻似賤場師凡骨只愁輕舉遲北山未出移休勒東老雖貧樂有詩望中雲海蓬萊路誰道樂天無歸處一千年鶴再來時行鴈難將弟兄序暴雨秋夜暴雨上漏下濕終夕不寐因得鄙句奉呈疾雷破山雲暗天雨腳不斷如麻懸淋浪一室無乾處何異露坐乘漏船鼠牙便是潰隄蟻牆有百道飛來泉狂客豈因狂藥使眼花如落井底眠採石江頭弄明月一夕去作騎鯨仙我雖忘我亦可憐但恐不免蛟龍涎苦無根源笑潢潦可能朝宗東注覔海道君不見來陽禹力所不到至今難尋杜陵老綵樓髙平縣綵樓聞之舊矣今始親見議者猶謂髙下侈麗不及向者三分之一因感而賦之層層華構髙且崇萬綵糾結填青紅何人下手奪天巧都入意匠經營中書契以來未省見異事驚倒百嵗翁郢斤般斧莫敢近却立屏息慙無功寒忩戛戛鳴機婦積年杼柚一日空山川謂可錦繡裹塵土盡皆羅綺封前者攀轅後者挽奔車徑欲趨靈宫三年送迎禮雖舊人事不與天時同方當炎屬行夏令權勢大抵歸祝融神之於人無厚薄蓋以至誠能感通豚蹄豆酒道旁祝所獲神賜亦巳豐閭閻疾苦還知否我為大夫歌大東享炎帝閏年上九里谷與濟之君祥仲寬李德方朱夀之姚子昂太行巍巍形勢尊造物設險雄中原巨靈一朝擘石裂連峯忽斷開山門侵雲直上幾千尺挂壁一徑愁攀援十步回頭五步坐栗栗汗出如漿翻清風掖至最髙頂下視寰海塵埃昏天壇咫尺若有待顧我不往慙食言世間好處豈不愛腳力雖盡心長存為君試寫逺遊興夜半月出清吟魂與祁定之約遊天壇不果剝蓮蓬相將去採秋江蓮青房戢戢飽且圓倒靫收菂亦可喜春筍未剝空流涎玉井有花開十丈至今依舊藕如船試索緑莖不尋藕與誰共此從巢仙遼漆水郡王降虎陳仲和之逺祖秋風漸髙秋草衰空山校獵千騎圍突然有物勢闕猛萬里侯相食肉肥橫行妥尾不畏逐挾闕似有百步威當時扈從懦於鼠雖欲下車人其非將軍一奮躍身出氣雄志勇捷若飛攘臂搏虎虎負去須㬰闕皮擒虎歸北方鋭兒皆好武無愧匹馬及短衣聲名赫赫耀前古却笑馮婦膽力微胙田命氏報恩異至今漆水生光輝君不見射石李廣一箭亦可喜死不封侯知者希遺善堂雪嚴老人欲其子孫之善何如是諄諄也哉有子仲賢以其遺命書之於堂訂曰遺善遵而行之朝夕於是其命之使行者不敢不行其所行者皆善事也命之使不行者不敢行其所不行者皆不善事也非惟不失士君子之行其孝子之心何時而巳耶噫處世兵革之間不忘於善亦所未聞故喜而為之詩君不見遺子韋侯只一經相門出相那在金滿籯又不見燕山教子以義方靈椿老去五枝丹桂芳破散錢堆一百屋紫微不願有子如窟郎陷為天下輕薄子伏波不願有子學季良身前身後事茫茫我恤我躬猶未遑長把賢愚挂懷抱請看積善之家遺善堂贈出家張翔卿翔卿河內人也籌堂毁其簮冠使復儒業昔唐李素拜河南少尹吕氏子炅棄其妻著道士衣冠謝母曰當學仙王屋山去數月復出間詣公公立之府門外使吏卒脫道士冠給冠帶送付其母事類翔卿故書大袖斜襟粗布袍髻丫撑似彌明髙滑稽自謂世可玩清淨不守形徒勞百年光景巳强半容易便把青春拋欲向蓬壺尋福地奈何龍伯釣後負山無海鼇欲駕天風朝帝闕奈何巫陽去後九虎守關牢養生未獲一溉力那忍遽絶平生交但今造物哀正直豈肯屈曲從仙巢留侯學道欲輕舉尚且强食扶金刀安期當年本䇿士意氣直謁扛鼎豪平地作仙亦不惡或恐上界官府名難逃後山詩話昔之黠者滑稽以玩世蒯通初善齊人安期生安期生嘗干項羽羽不能用其䇿而項羽欲封此兩人兩人卒不肯受君不見醉吟居士不歸海上山又不見昌黎先生屈曲自世間况非出塵風骨羽化難夜義白日守天關黃庭正恐坐誤讀鐵鎖縱垂那可攀我笑學仙王屋著道冠只待河南李侯脫去然後還籌堂燕籌堂梁上巢燕將雛幾墮鼠計飛鳴哀訴者久之主人得其情而護焉卒無所害夫䑛犢之愛物物皆爾感而為之賦且以戲克紹隂隂池館落花泥出入通家獨見知曾遭江上淘河嚇又被巢邊野雀欺且欺且嚇亦不惡奈有鼠輩窺其兒兒方在卵卵何危哀鳴若訴奚勝悲主人能得腹中事百計護持彼毒無所施羽毛養就刀剪齊雄雌相隨引雛飛尋常百姓家汝巢非汝宜春兮來秋兮歸莫忘烏衣巷裏時趙倅司馬山謝雨乙未嵗旱自春徂夏五月丙申澤倅趙公唐齊沐潔誠就司馬山祈禱八日庚子大雨年榖遂登民物安逸纍獲嘉應次年丁酉孟夏巳丑公與本郡僚屬父老人等具牲幣酒醪簫鼓之禮仰答神休仍求嗣嵗祭畢聊識嵗月云爾去嵗不雨民憂深愆陽亢甚多伏隂冥冥造物豈難料感以至誠神所歆我公默禱若響應出岫誰謂雲無心天瓢疑是池中水三日以往皆為霖淋漓元氣滿人望解愠何止薰風琴家家豚酒樂豐嵗空山鼎沸簫鼓音春祈秋報有常典仰荷靈貺如桑林四舍人生日驥之子鳳之雛精彩丰容美且都年至十二三頭角已異同隊魚積善之家慶有餘掌中幸得雙明珠定知他日必充閭不妨更讀古人書絳帳先生當合之範模步亦步趨亦趨執經北面預先講唐虞明主何嘗不用儒相門出相文可無豈獨手撚金僕姑能騎生馬駒然後稱為大丈夫贈儒醫卜養正孰親如身在所慎一病能惱安樂性囊中探丸起九死以其病病人不病豈獨和扁號神聖能於鬼手奪人命嘗聞上醫可醫國何不使權造物柄游濟源庚子春季與劉濟之君祥仲寬仲美姚子昂秦懿夫馬子溫李德方深之伯英朱夀之下太行抵覃懷望方口臨沇水二十三日丁亥郡侯段正卿因西山鎮遏回自析城來赴期值雨留宿奉仙觀翌日巳丑天霽具牲酒幣帛謁清源王廟禮畢㑹友人郭伯玊李慶之王天盆史德秀王輔卿紇石烈仲傑完顔夀之方外士祁定之郭道正元明道部將段玉等大飲於裴公亭用麾下鼓吹以樂賔薄暮極歡而罷故賦之紀一時之勝游也元戎小隊閒登臨悠悠旌斾穿山林太行南下路澰澀不憚著腳窮幽尋清源祭秩世所重喬木掩映靈宫深是時方口雨初過天風破曉開微隂入門為問廟見禮白髮黃冠通古今且言享誠非享物郡在與俗占浮沈鞠躬執簡默有禱脯酒縱薄神所歆幾年願違莫能遂至此始得償初心㸃檢圖經歎禹迹山青水緑無知音竹根醉倒客星散夜聽波底蛟龍吟樊氏昆仲懶窠君不見讀書邊孝先謂師可嘲何典記又不見梁州隂子春足不肯洗恐敗事何須向人說道理養得疏慵性如此擺手便行誰家子嵩洛之間兩居士未嘗㸃檢形骸外挂角羚羊心巳死問之非漁亦非樵人言似癡還似髙叔夜自知不堪匕以書遂絶平生交一官從此束髙閣賴是天教閒處著時人爭賦懶窠詩我羡懶窠詩不作壬申嵗旱官為設食以濟饑民千里地赤澤未霑驕陽為沴烈火炎就中秦頭晉尾旱魃所棲托十室九室突不黔撐腸一飽豈易得咀嚼草木如薺甜山川課雲職不舉無乃風伯號令嚴民是天民天自恤何時霹靂起龍潜男揚洗兒十九嵗自慚無德為兒父今朝把酒為兒夀為兒今賦洗兒詩願兒他日於兒厚我猶不恤况我後委蛻自天汝非有速宜修德大吾門無復童心年十九兒歸來禽名兒歸來兒歸來百年郎罷恨何日寧馨回東去但除嚴母墓望思空築茂陵臺兒歸來兒歸來一聲未盡一聲哀贈郭顯道醫惡石聚散元氣撲本草搜剔造化窟俱收並蓄籠中物山精水怪藏不得休言魄為天所奪入其手者命可活須防姮娥去奔月大勝扁鵲能起虢君不見錢子飛藥不敢施為鬼脅和答董用之將軍死戰血染衣空山白骨鬼夜啼洗兵政要及時雨天禍未悔無雲霓卧龍不起主張漢獵犬待烹僥幸齊就中儒冠身多誤如坐矮屋頭常低敢將龍鍾哀造物但幸老大能扶犁咄哉董生三寸舌善謔不思為虐兮人間回首憂患始去之不速將噬臍再和秦彥容韻扊扅歌後伏雌烹箸猶未下愁覆羮布衾多年踏裏裂夜半寒忩灑風雪待與重尋痛飲師東山杲杲日出遲撑腸拄腹文字五千卷一字不入髙人詩幾年不踏紅塵路直入白雲最深處君不見洛陽城下未歸魂一夢思鄉歎溫序後漢溫序次房行部至襄武為隗囂將荀宇所執欲降之序不聽伏劒而死光武命送喪到洛陽為塜地長子夀為鄒平侯相夢序告之曰久客思鄉里夀即棄官上書乞骸骨歸葬帝許之乃反舊塋焉莊靖集卷一
