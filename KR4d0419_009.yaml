body:
  text: 莊靖集巻九金李俊民撰碑銘重修真澤廟碑柳子厚書南嶽大明寺律和尚碑隂昔者公室禮得用碑以𦵏其後子孫不去遂銘徳行用圖乆於世及秦刻山石號其功徳亦謂之碑而其用遂行自是所在營建者莫不用焉大朝龍集庚子九月十五日丙子悟真觀樹落成之碑冠盖雲集酌酒相慶循故事也或者謂碑之所云異其名也名雖異人心未嘗異也所慊者材不中度不足以壯福地此處自有石豈無知者乃相率而求之於荒榛間㣲露節角出土而得之真良璞也徳方以易卦筮之得臨之節有大而可觀之象於是命工加磨礲焉無毫髪恨父老愕然相視曰夫神所依者人其有所待邪或廢或興亦其數邪事與時㑹豈偶然邪是廟也自唐天祐迄今三百餘年庇庥一方實受其福水旱疾疫禱無不應貞祐甲戌烽火以来殘毁殆盡幸而存者前後二殿神且不安人其安乎由是感激奮厲踊躍就役斧斤者陶甓者版築者圬墁者不募而来不勸而從缺者完之仆者起之繪事之墁漶者色之不日而新無愧於初父老請以其事實之碑徳方笑而諾之就用其石慰人心也其使之敬鬼神向𤣥化振仙風徳方有力焉因索予為文以刻之其詳具於前後之作者言之則幾於贅姑頌之以詩以告其成云川原自秋色爽塏變荒土騰空仙馭逺閱嵗遺廟古頹基埋草莽敗壁剥風雨枯松噪寒鴉老瓦竄飢䑕煌煌星各位耿耿月獨苦鞠躬香火民黙與杯珓語真游厭塵雜非類敢狎侮豈惟奪時享乃又虐神主曾無一震威蕩滌還淨宇黄冠得仙李起廢心已許聞聲應如響爭地築環堵圖全出衆力能事在一舉周旋禮俗中百福神所予刻石示將来不朽邁石鼓重修王屋山陽臺宫碑王屋山者在底柱析城之東仙家謂之清虚小有洞天三十六洞天之一也壇之南十六里曰陽臺觀者小有洞天之一也其靡然而逝隆然而起似近而逺欲斷而連隠隠乎山之陽者九龍戯珠嶺也東向二百歩許溢天一之水白而不濁甘而不壊為九鼎金丹之祖者洗參泉也巖竅其腹廓然有容嘘吸元氣與山澤通者西北白雲洞也位髙而自抑勢仰而還俯如竦如懼如趨如附北面而朝壇者華盖峯也亂峯之間邃而深幽而往窈窕而入延袤而上者紫陽谷也樹林叢翳虎豹郤走蕭爽森肅鬼神䕶守者上方院也自是出避秦溝陟瘦龍嶺躡仙橋欵天門然後登壇而朝玉頂淩風汗漫披雲杳㝠其去天闕猶咫尺爾時天界諸天悉以天衆見於每嵗朝山之會宜其為洞天之冠也大唐中中巖道士司馬鍊師始奏置陽臺觀道塲立像而嚴奉之並御書額壁畫神仙龍鶴雲氣等升降輦節羽儀金彩輝光滿宇遣監齋韋元伯齎圗畫事跡題目奏聞時開元二十三年六月十二日也𤣥祖之教繇此而振山林學者皆生無上道心不退轉志宜其為福地之冠也又按司馬别記曰余届王屋清虚洞側獲真篆仙經二品一曰元精一曰丹華又覩玉皇寶籙乃知上古丹寶並傳而莫不遐年自夏禹後遂止亡有繼者余不敢嫚泄復藏於名山以俟其人開元十七年仲秋十五日記以是考之陽臺觀之成也在司馬鍊師藏丹寶後之六年開元二十三年乙亥也下值大金貞祐二年甲戌凡四百八十年兵火而毁觀改曰宫隨世沿革崇其名爾嗚呼玉笈秘文流運道氣猶有昇沉之時況巍峩華構豈無成壊邪累代重規一夕焦土草木色歛烟霞氣沮方外之逰未嘗過而問焉正大四年丁亥林州先生王志祐由平水抵王屋周覽勝區感嘆陳迹慨然有動於心邑令及司氏昆仲挽留住持養道餘暇以起廢為事不募而役集不鳩而材具變汚以潔易故而新宏大殿堂修直廊廡復靈官之位列齋厨之次接遇則有賔舘招納則有道院其用簡其功速旋天闗回地軸華日月而平北斗其為力也大哉廢始於戌終於戌興始於亥終於亥一紀而廢一紀而興疑其有數存乎其間爾先生少業儒術長慕𤣥理年髙行積境滅心休幽人逸士望風稟受號曰棲神子一日與余邂逅於山前頗得其所長盖以静為基以慈為寶慤而愿厲而温有竹林髙致不嘯傲升平有盤谷雅尚不輕欺富貴味老子五千言不讀非聖書悟廣成長生說不作矯俗事龍伯釣後長愁海上之鼇子晉歸時難駐雲間之鶴大朝巳亥嵗三月二十二日壬辰登真於嶽雲觀春秋八十有八其徒曰定曰忠曰祥曰𤣥曰温索余文其碑故欣然書之以示来者其辭曰太行肆几連亘王屋天設之險神竒所畜烟蘿眇然若化若遷誰其主者小有之天天台錬師即宫于兹奕奕榮觀百世之基中原繹騷刼火莫逃虐熖毒燎毁仙所巢猗歟王公復此故宫彼徒者清始終厥功事舉其墜風振其頹濫觴𤣥源實實枚枚欲去者留既往者来雲軒羽盖肅焉徘徊突峰秀巒光凝翠寒乍隠乍見聳如髻鬟泉涌流決巖回岸薄或抑或揚響如珮玦栢茂松悅芝芬桂芳可糗可粻既夀且康鶴翥龍矯鸞翔鳳鳴可駕可軿游乎太清朝烟暮霞我仙所家坐閱人世浮如落花大哉道域悠乆不息何以誌之他山之石縣令崔仲通神霄宫祭孤魂碑人之生或幼而殤或壯而夭或幸而不殤不夭獲考終命者則㷀而獨或不幸而遭天之變人之禍邦之憲身没而名滅者宗亦覆吁幸不幸皆命也其視世其家碑其墓廟其貌而配饗不絶者異矣夫不幸之中又有幸不幸者焉人死曰鬼鬼者歸也故鄭子産有言曰鬼有所歸乃不為厲吾所以歸之政謂此也道否以来刄政交惡玉石俱焚寃魂無依哭聲相聞哀於泰山之虎猛悲於桓山之鳥别其無所歸幾何不憑於人而為厲者哉當是時也生且不遑恤況夫死者乎獨晉城縣令愽陵崔公逹惻然有動於心乃於野外拾遺骸而瘞之又與前上清宫提㸃大師孫景𤣥道正李處静十月十五日就本州神霄宫設黄籙大醮為壇位而祭焉其幼而殤壯而夭者在此位幸而不殤不夭考終命而㷀獨者在此位不幸身没名滅覆其宗而無配饗者在此位師乃於𤣥科之外以幽明之故始終之說施報之理因果之事發揚呈露豁人心而駭鬼聽公乃吉蠲從事其迎来也有餘敬其送往也有餘哀欲其慘而来舒而往新大故小皆適其歸嗚呼恤人之所不遑恤使不為厲合於子産之言識者以為知禮其可以無辭乎銘曰雅廢國屯四海揚塵魂兮来兮天地廓清虐熖方沃蠆蜂揺毒魂兮来兮䲔鯢被戮干戈厥躬腹背勍敵魂兮来兮靈臺偃伯骨肉不收離居蕩析魂兮来兮宜爾室家不周之粟不虞之臘魂兮来兮今薦馨徳不屋而號不宫而弔魂兮来兮今有寢廟忠肝義膽不辱不屈魂兮来兮此乃血食暴露風日沙場草白魂兮来兮此乃掩骼洋洋如在曵曵而出公之豐潔是享是格如歆而類如祀而族公之信孚宜介之福郡侯段正卿祭孤魂碑無戰之國民多夀好戰之國民多夭夫戰危事也民之夀夭係焉春秋二百四十二年間書戰者二十三内戰敗績六外戰敗十二豈惟戰哉其侵伐襲討潰滅殱獲等例書者不絶故其民夀者少而夭者多豈唯民哉死而不得其所者何可勝紀或見於新城之巫或啼於貝丘之豕或踊搏於寢丘之夢或呌登於昆吾之墟或如若敖之餒於楚或如伯有之懼於鄭或與獻子而相訟或同實沈而為祟皆不得其所而又無所歸可哀也哉聞内史過之言者則以物享之用鄭子産之事者則撫之乃止由是鬼有所歸無復為厲故筆之以為春秋法自中國雅廢以来天道在北日尋干戈無異於春秋之時糜爛之餘百怪争見無異於春秋之民吁是時也孰能以春秋之法享而止之哉澤州長段直念常在此欲為之而未暇也嵗在鶉火毅然力行之應於郊野暴露之骸歛而裒之卜𦵏於馬英得鳳凰之兆且其繇曰鬼宿騰芒積尸在傍月建之下可以伏藏正月十一日壬午隨所指而窆焉乃以信士劉巨川檢舉典常嚴修祀事外内戒飭以洽百禮建立壇塲設無上黄籙浄醮三晝夜位分三百六十不以逺近無主孤魂并投壇附薦亡靈等衆一切召請而祭之十五日丑時解席告畢以清虚大師前提㸃上清宫太上昇𤣥内教秘籙弟子賜紫孫景𤣥妙逹大師前管内威儀太上正一三五都功賜紫李處静奉行法事暨法籙道士程徳元等四十餘人三時行道華夏步虚備演三洞靈章敷露五方真文拜表啟𤣥散花賦水恵風與薌燎清塵壁月共燈輝縞夜無碍筵前至者相憐昇仙橋畔度者争先聽元始符命受九真之戒佩昇天寶劵出五苦之獄悔深吝消行髙障滅逈脫𡨕津咸躋道域嗚呼死生之說果如何哉夫死者生之盡物之變者也其有知乎其無知乎豈蕩為大空與化無窮乎將與木俱腐乎豈精爽在天結為光輝以助臨照乎將復乎還名山大川返其英靈之氣乎豈奮為明神廟食人世福善禍滛乎將厭人間之勞貪南面王之樂乎是未可知雖聖人亦所不言然而於死者之禮尤盡其詳者盖欲盡其事死如生示民之不忘也以春秋之事考之則見矣謹屬辭而為之銘曰懐沙楚騷江沈浪漂不有巫陽孰與之招横縱戰場地塗肝腦不有李華孰與之弔豺狼路荒羈鬼相望咸殄厥祀君子攸傷悠悠返魂我公所賔享之吉蠲靡踈靡親肅肅靈壇我公所建誠之感格靡近靡逺盍簮星㑹恪居精思不倦於勤用相其事歛彼棄骸𦵏筮之地告以兆語於艮之位暨啟冡土其日壬午入此穴處靈其鼓舞送之而往迎之而来来迎往送且敬且哀靡神不舉無虐神主以禮始終宜福是與亡者可矜存者可恤存亡之民係公休戚故王公輔之墓誌銘世傳王氏周靈王太子晉之後以其是王家太子其子孫遂稱王氏有二十一望各以分封食采而立史記秦有王翦漢有王陵最為顯姓太原琅邪二望為尤著今按王姓非獨出於子晉之後又非分封食采而得出太原琅邪者子晉之後後漢逸民霸司徒允魏司空昶晉司徒渾後魏龍驤將軍慧龍梁太尉僧辯唐侍中珪並出太原漢諌議大夫吉晉司空祥及宋齊梁朝王氏盛於江右者唐宰相方慶皆出琅邪王子比干之後以王為姓者出河東天水六國齊王田建子孫以王為氏者出北海陳留魏公子信陵君無忌子孫以王為氏者出髙平京兆公諱翼字輔之其先河中人疑王子比干之後世逺不得其傳祖明避靖康之亂徙家濩澤晉城之王城里父徳遷於星軺鎮生翼驚姜之後不聞啼聲者數旬王父以為癡及能言與他兒小異性頴悟稍勤於學七嵗常從師行有誦杜牧之華清宫詩後師舉似厯厯能道之師頗竒焉八嵗能屬文既長日記千言應進士舉因感疾遂留意於醫與名輩闕全道趙子華友講究難素及本草物性藥證病源以拯濟為務貞祐甲戌郡檄諉以巡檢南山土冦一日破葛萬賦性不嗜殺遂辭職晦迹月院山耽味經史百家之說每有疑事書之别巻疑釋塗去之尤精於易占無不應與人交尚義重然諾友愛同氣分財取衆房之所不取武城張氏數口遇盜不知所適公一日因採藥偶得張遺橐及書契瘞於巖下後其孤還給之寡婦李氏有少年安姓者强娶之不從力斃之棄屍古冢繼而婦活公乃誘其父兄訴之官安服其辜人皆義之丁先生女以父亡值艱食凡鬻與豪民焦氏焦婦疾篤命公視之曰若差從公所欲報之公曰但得丁女可矣焦諾之婦安擕女而歸長嫁於汝陽庾氏醫不取利衆醫讓之曰予所重者人命奚以利為利心一萌何異紾臂奪食乎咸愧其言薄㳺河南從者如市謂其徒曰汝輩若依得論語知之為知之不知為不知此兩句便可行醫如孫思邈者亦有所不知若不知為知雖思邈亦不足敬盧氏劉氏各遣子學醫亦令二子說論語人或有疾醫不克痊公至問所服藥曰是也但病深藥未效爾及愈謝之曰非獨此藥亦向者服藥之功也常謂其子從儉曰人與汝有隙病而求治何以處之從儉徐應曰若羊叔子豈酖人者邪公首肯之致仕阿不罕特進在汝州忽暴風疾不語公曰服此藥三日愈十月又病公曰宜吐之後服𤣥明粉半月愈恐来年十月病必復次年如期而病公曰此不須藥過後月十六日寅時無恙上遣太醫庾公来視疾服藥輙斃公曰藥勢太急正不勝邪故也日晡當復甦其二子哀泣求藥不許曰藥能起生人不能起死人翼日寅時特進公斃十一月十六日也河内崔氏子年三十餘病不救將就斂公至曰此已不能藥當針之猶可活其父不信公三針而體温明旦再針而目開七日如故梁縣尉范某傷寒不起公曰六日汗解請藥曰善攻不如善守過五日昏眩左右手無􅀈妻子泣謝公熟視之徐笑曰勿驚汗將出矣頃刻汗而愈防禦完顔公問易曰當先理㑹心又問曰以静以誠如水動則濁濁則不能照物王彦明問讀􅀈經皆能誦之然臨證切􅀈多感何也曰汝但口誦而心不悟譬猶按圗求馬果得馬乎時吉仲器在傍曰學者尚如此況不學者乎於秀老徳老二人處悟禪理太原公處精術數誦古今才人詩得句法平生著述有素問注疑難二十卷本草傷寒歌括各一巻筭術一巻古律詩三百餘篇長短句二百首雜文四十篇辛卯至日召子從儉謂曰早来望氣不祥我數將盡汝勉之過次年二月初八日酉時可免壬辰正月入汝陽山避天兵所臨過㳺騎俘至營中被害皆如所占臨終語妻李氏我平日别無大過惡惟破葛萬賊不能無寃此其遺恨爾死於兵與死於病相去幾何古人視死如歸我死無憾男從儉必在可往求之李氏以遺命入山見從儉曰我豈是要活為汝父所囑今既見汝死無恨矣終於玳瑁寨公始娶山陽張氏生三子長曰從約業進士次早卒季曰從儉再娶馬氏無子再娶李氏一子夭從儉有父風業儒大朝委劉中試諸路精業儒人從儉中平陽選癸卯春將以某月日𦵏狀其父行託所友徳老李子搢求誌諸墓故哀而銘之曰家世儒業靡忘厥初尤所長者活人之書葛萬之賊一掃滅迹不忍於殺乃退厥職遭時之變潛居月院左經右史好學不倦周流河外聲震汝海向風而從無小無大有疾則視得􅀈於指囊中探丸起人之死神妙不測莫善於易擬議而動與時消息恤人之寡箠撻之下贖人之孤備禮而嫁徳如叔㣲藥如宋清宜其有後不墜家聲淺土之喪客於他方有子克孝䕶還其鄉委骨原野其誰與藏魂獨歸閟此𤣥堂姚子昂宜休齋銘物極則反器滿則覆居安慮危身寵思辱金然眉塢之臍玉刖荆山之足室髙為鬼瞰貨積為盜蓄名不可貪利不可逐宜休宜休以小人之心為君子之腹贊中書君贊心乎其畫腹乎其藳雲烟落紙龍蛇揮掃汲冡孔壁殷盤周誥嗟乎孤秦欲窮吾道黔首未愚彼惡先老嗚呼噫嘻天之將喪斯文也吾不得而知之天之未喪斯文也何屑屑乎使中書君而枯槁啟郡守段正卿上中書啟某啟伏念職在分符有忝承流之寄權歸造物共推論道之公凡預奬提奚勝慶抃欽惟中書相公經邦偉器佐命元勲自有典刑盖是相門之相一變風雅或覩詩人之詩宰天下思天下之均遇國士以國士而待豈謂吹等之末亦䝉推轂之私然鳬脛續之則憂念雞肋棄之可惜猥辱衮褒之字願為穎脫之錐光耀鄭鄉春回鄒谷某敢不勉所未至求為可知白首效勤不憚執鞭之事赤心圗報寧無結草之功謹奉啟事躬詣台屏陳獻伏惟鈞慈俯賜照察上行省中書啟某啟伏以任尊百揆盖優佐命之勲望峻三台咸仰調元之化逺依大庇倍積歡悰欽惟行省中書相公治世棟梁清時羽翼唐資房杜遂開田口之基漢任良平竞啟卯金之運位常虚左志在圗南方當師渡之朝遽播公歸之詠以申伯之功文武是憲宜鄭武之職父子並為不吐不茹激古人之風無党無偏公天下之選致令庸瑣亦預甄收某暫脫戎行獲膺民寄忝荷璽書之賜重加衮字之褒承乏力州增輝梓里某敢不益堅素守少效㣲勤待用無遺物幸充於狄籠見知則說恩難報於蘇天榜段正卿祭孤魂榜易為㳺魂遂著返終之說傳因化魄乃明為厲之由未有所依是誠可恤雖卒歸於㝠漠猶不昧於英靈勿伏道慈曷超幽域願殫欵素冀有感通謹擇某月某日命前上清宫提㸃大師孫景𤣥就某處設黄籙大醮三百六十分位祭一切無主孤魂并各家投壇追薦逺亡近化姻親及收斂暴露骸骨正月十一日安𦵏裒集誦念經文来春正月一日會疏將興法事預戒前期因豈無因有佀樹花之落死猶不死還隨月魄而生尚賴同心共成善果崔仲通祭孤魂榜伏念無可奈何者命歟終歸於盡不得其所而死者奚禍之深義有當為祭而非謟況乃龍蛇嵗在螻蟻生輕或因師旅饑饉之加或在桎梏巖墻之下以棘林為長夜以薪野為佳城京觀非楚子則誰封戰塲無李華而誰弔通願傾誠懇庸蕆浄筵所望上格神休下開𡨕路聞而起起如從夢裏之呼樂且融融皆自隧中而出今請到講三洞寶經提㸃大師孫景𤣥擬於十月下元日就本州神霄宫設黄籙大醮一坐計陳一百二十分位祭河東南路無主孤魂并投壇追薦各家逺年近代姻親同登道岸富如王氏宜輸請命之錢貧似杜家可翦招魂之紙敢希勝侣同結善縁髙平縣瑞雲觀祭孤魂榜王希及道淵伏念縱横血刄之兵毒痡安忍暴露衣薪之野精爽奚歸其生也不辰其死也無地徒有青蝇之弔奚勝黄鳥之哀形可復乎亦莫能於司命魂兮来些或有頼於巫陽所依者人得請於帝豈特融融之樂偏及黄泉抑令鬰鬰之居重見白日尚希善衆同啟䖍心孫講師約束亡靈榜當壇謹按太上法籙修設無上黄籙浄醮薦拔孤魂亡靈等衆夤奉髙真祈求拯濟除巳依科闗奏外誠恐亡人從来未知壇内威儀誤有干犯重遭隂責須至出榜者右具如前今出榜曉示亡靈等衆即聽次第呼召昭與昭齒穆與穆齒無引非族無雜非類其間孝子順孫義夫節婦有新有故有長有幼無相棄背如在左右不臘之虞薦未必馨殺牛之鄰福未必受無求人祀無奪人享無嘯於梁無見於堂善有餘慶惡有餘殃天之施報無異存亡固當率相教戒敬心歸仰領受功徳速求超度無致别有違犯故兹告示各使通知孫講師約束孤魂榜式同前右具如前今出榜曉示孤魂等衆即聽呼召男有男位女有女位無亂人倫無參異類無託物為妖無憑人為祟無逞私憾無尋寃對無呌天無辜無請罰有罪其有强弱相欺貴賤相侮棄義陵上背恩憎主或號或呼或泣或訴或攘或奪或貪或妬輕躁跳梁笑傲狂舞前過未除重犯靈怒永繫幽囚難尋生路固宜率相教戒敬心歸仰欽受符戒速求超度無致别有違犯故兹告示各使通知開元寺重修經閣榜本州開元寺經閣近遭壞刼幸有遺基雖存起廢之心尚賴贊成之力今則度材計費鳩役募工冀我同誠畢兹能事且平地為山尚有往者豈道傍築室獨無成乎髙下隨宜共敞黄金之地廢興有數復来白馬之經徳不妄施福從實受暨善知識結大因縁碧落治平院祝夀榜竊以叢林標準法海津梁開諸佛方便之門證無上菩提之路雖云𢎞教所重報恩今請到因公和尚本院開演圓覺静講為國祈福祝皇帝萬嵗伏願寶厯無疆洪基永固四海享太平之樂百僚崇相讓之風一切有情同登覺岸結冬開講榜伏念海㑹福田忽躍啣經之藏隂淨域尋来聽法之雞物尚結縁人何背境本州碧落治平院者近將就毁今復增新欲開重悟之門庸閳大乗之教今請到裕州寶泉山因公和尚結冬開演圓覺静講一百日為國焚修祝延聖夀者勿謂一花五葉止掉葛籐要從萬水千山盡来瓶鉢庶幾善衆咸仰宗風化供榜伏以衲衣雲集共依彌勒之龕魚木雷鳴咸仰如來之粥顧兹香積頼我檀那但學雪峯住山莫訝趙州貪食常念助縁之力敢忘惜福之心幸免負牛頭之糧少望送南臺之米稍能添鉢無愧上堂請益榜竊以鐘鼓聲邊盡入雨花之界鉗鎚手底未施㸃鐵之功不有發明難成頓覺伏惟講主因公和尚維持宗教模範叢林孤如嶺表之雲瑩若波心之月雖長空過鴈不立文字然枯木龍吟無離語言身後茫然莫舉三生之話指箇歇處願揚百丈之風傾落妙音發䝉太衆曲垂慈憫無吝奬提茶榜詩人多識遂留茶苦之名文士滑稽乃立葉嘉之傳豈謂詩情之重或成水厄之憂驛徒致衛公之泉喫不得盧仝之椀今兹團月别其典刑與其强浮泛而體輕孰若自快活而心省甘易回頰枯免搜腸但歸愛惜之家以待合嘗之客設粥榜人方著土舉聞賣劒而買牛嵗雖在申不應乞漿而得酒豈君子之不周急況居者之有積倉轉壑之民之四方者幾矣滿堂之樂如一夫之泣何宜損有餘以補不足青詞段正卿祭孤魂青詞民不聊生豈亦自求之禍天無私應盖由所感之誠爰瀝丹悰仰干洪造臣誠惶誠恐頓首頓首伏念臣某立身艱險涉世憂危偶叨五馬之榮承乏三刀之寄欲使化霑逺邇恵及存亡可堪暴露之餘猶在照臨之下念就死之地以無罪而隠焉恐不善之殃所由来者漸矣冀悉宿愆之殄必須大道之依是用精建靈壇䖍修法供肅延羽侣妙繹真科伏望上聖降臨衆真孚佑曲加哀眷開濟𡨕塗出彼黄泉咸賦融融之樂見夫白日罷形鬱鬱之嗟崔仲通祭孤魂青詞民雖易虐寧無就死之寃天豈私親盖有感誠之應輙披丹懇仰瀆𤣥穹伏念臣某遭世艱危脫身荼苦幸延殘喘念及非辜然命之短修皆莫逃其數爾而理有施報何如此其酷邪庶招𡨕漠之魂宜腆馨香之薦謹差榖旦爰敞淨筵萃羽裾之清流繹琳科之祕㫖伏望上真垂佑列聖降臨鑒是哀𠂻錫之嘉貺人生有限卒隨宿草之陳物化無涯妙證落花之果馬子華百日子九成追薦青詞靡瞻匪父奚勝痛割之情不反者時尤切孝思之感輙傾丹欵上瀆𤣥穹伏念臣父命不其延身莫能代向者劬勞之徳今而𡨕漠之靈冀拯迷塗須憑法廕謹因卒哭肅建清壇萃琳宇之勝流演瓊科之祕㫖伏望上真昭格列聖降臨亮是哀𠂻錫之休應多生積釁潛消𤣥籍之書未㧞幽魂並造朱陵之境劉濟之禳烖青詞生不可輕幸遂求安之請應由所感誓殫圖報之誠爰瀝丹悰仰酬洪造伏念臣某内守或戾外邪所侵盖不善於養和敢遽期於勿藥心因黙禱身即小康願惟無妄之烖恐亦自招之咎不依大道曷洗宿愆是用祗建靈場精修法事肅延淨侣妙繹冲科伏冀上聖垂慈衆真孚佑蠲除過責殄息憂虞周濟存亡保寧外内將安將樂不罹六極之凶難終難穹宻賚一門之慶郡守郭彦卿禳蝗青詞民猶艱食幸逢多稼之秋物或為妖欲作穉田之害敢披丹欵仰叩洪私臣某誠惶誠恐頓首頓首伏念時雨既霑嘉苗未實慮失垂成之望夙堅懇禱之誠爰建靈壇䖍修法醮伏冀聖慈眷佑𤣥鑒照臨亮是精𠂻錫之休應遺殃悉殄並無入境之憂和氣潛回永納降康之佑臣無任祈天請聖激切屏營之至謹詞馮裕之析城山祈水設醮青詞民服其業式堅望嵗之心神享者誠聿獲降康之佑肆彼懇欵仰叩明靈臣伏念巖邑遺黎下田薄産切慮隂陽之沴或成乾溢之烖爰即祠宫精修法事仰祈沖佑垂鑒䖍衷雲上於天常沐既霑之澤稼豐於野屢書大有之年裴懐誠禳蝗青詞臣某言民初務本恒深傷稼之憂物或為烖益儆畏天之戒爰輸丹欵預荅洪私臣某伏念攝領郡符疚懐民事雖秋成之在邇柰田害之未除非誠則無以動於神而妖固不足勝夫徳慮嘗在此為之惕然故有事於靈場冀潛垂於嘉應餘殃悉殄並無入境之虞和氣頓回不失有年之望段正卿新居謝荅年豐青詞物其多矣頗酬望嵗之心天實佑之以篤降康之祜肆傾丹欵少荅洪恩伏念臣脫迹戎行分司郡寄所願公私之給仍求中外之安衛公子之居亦既完矣漢良吏之職果能稱乎貴恐難逃憂未嘗歇欲立於無過之地必依夫衆妙之門是用肅命清流䖍修法事仰祈靈鑒俯亮精衷福錫厥民普浹三刀之境慶鍾於後光增萬石之家楊榮追薦母及姪男青詞無母何恃奚勝終慕之懐謂天盖髙未獲孝思之感爰披欵素仰瀆圓靈伏念臣涉世多艱遭家不幸方痛虞丘之樹或憂謝氏之蘭慼恐自貽應如此酷冀悉罪根之洗敢忘道廕之依是用延集羽流肅陳法供仰祈昭鑒俯荅哀悰長夜幽魂早遂往生之果合門殘喘潛消旡妄之烖齋文附事親為大匪母何依徒深瞻望之悲未盡劬勞之報爰陳法醮周濟㝠靈崔時可舉子醮謝青詞皇矣盖髙必以至誠而感居然生子允符吉夢之占爰罄丹悰仰酬洪造伏念臣某幼違慈訓長慕貞闕稔經二紀之艱危逺頼一家之餘慶方篤奉先之孝俄膺錫𦙍之祥續莫大焉望不到此難稱生前之報預圖身後之修是用精建靈壇肅陳法供命琳宫之淨侣演瓊笈之沖科仰頼聖慈曲垂嘉祐豈惟見在潛消無妄之烖亦冀未来獲享自求之福秦贅孟贇追薦婦翁青詞業由所履遂分善惡之塗情未能忘故有死生之說輙輸危懇仰叩圓靈臣某系自孟孫出為秦贅緹縈父喪巳修過去之縁衛友母存豫證未来之果謹因誕月肅建靈塲命琳宇之清流繹蘂章之祕㫖伏望上真孚佑列聖降臨俯鑒愚誠式垂嘉貺敬終敬始益堅報徳之心身後身前悉荷降祥之祉孫徳為弟男設醮青詞家道或乖念其親之難保天鑒不逺諒所欲之必從乃罄䖍祈庸償夙願臣某艱危兹乆聚屬不收方懐急難之原仍建求亡之皷居嘗慮此為之泫然俯憐無告之民仰冒盖髙之聽緬惟靈鑒亮是哀衷既夀且康永介一門之慶由中及外均䝉百福之崇郭彦卿謝雨青詞臣某言和氣未回徒切三農之望至誠所感遽霑一溉之恩爰瀝精衷仰酬靈貺臣某叨膺民寄承乏州麾顧多稼之在田柰宻雲而不雨恐因亢沴或害秋成肆伸懇禱之悰即獲休祥之應神之所賜天且不違有開必先式表年登之瑞無徳不報難忘祀典之常崔仲通中元醮青詞天所親者無私惟徳是輔人之應也以實有感必通肆蠲克享之誠仰瀆盖髙之聽伏念臣某幼違真教長昧𤣥風屬百年喪亂之餘當四海毒痡之後艱苦萬狀保存一家上以慰陟屺之恩下以全䑛犢之愛夫何修而致此實莫大之幸焉尚慮過未能亡悔猶可及庶幾獲其終吉敢不為之敬威冀滌罪根依須道廕是用謹差榖旦肅藏浄筵萃羽裾之清流繹琳科之秘㫖伏望上真孚佑列聖降臨荅是精衷錫之嘉貺爰念恢恢之網不失之疎益堅翼翼之心聿懐兹福郭彦卿追薦夫人青詞時往不返恒深逝者之嗟道窮必乖尤切慨然之感肆伸丹悃仰叩𤣥穹伏念臣官以恪居室靡遑處遂致起家之配俄成彌月之栽憂喜相尋禍福莫測事寧免於一失義不容於兩全數實難逃孽恐自作冀悉餘殃之殄敢忘大道之依是用肅建靈壇䖍修法供集琳宫之羽侣繹蘂笈之沖科周濟存亡普安中外伏望上真降鑒列聖垂臨荅是精衷錫之休貺克蕃厥後已符夣姞之徵不及其泉早賦出姜之樂秦氏得子後報謝青詞責已也周猶有求亡之恨應天以實庶幾所欲之從伏念某識昧𤣥風動違真教虞丘蚤嵗遽纒風樹之悲謝氏晚年方覩庭蘭之瑞念常在此為之惕然嗟窮而無告獨四者之民恐積者不善非一朝之故痛自懲而悔過若不及以檢身恩滌罪根仰依道廕謹因榖旦即事靈壇萃羽服之清流繹琳科之祕㫖伏望上真垂祐列聖降慈荅是精誠錫之多祜無後為大免貽不孝之譏由漸而来獲保有餘之慶裴懐誠禳蝗青詞膏澤既濡已有順成之望嘉苗方秀或憂飛孽之烖爰罄丹悰仰干𤣥造臣伏念民服其業稼多於田在三務垂成之功皆八政所先者食慮因貪類有害豐年肆堅懇禱之衷冀速餘殃之殄緬惟靈鑒庸示休徵莊靖集巻九
