body:
  text: 莊靖集卷十金李俊民撰祭文郭彥卿祭蝗文三日為霖巳沐溉枯之渥八月其穫尚虞飛孽之烖方致䖍祈遽䝉嘉應蓋以至誠而神感遂使大田之稼多無害有秋敢忘昭報肅陳菲薦仰答靈休又秋報祝文旱蝗為虐年榖未登肆殫懇禱之誠即獲休徵之應不妨穡事有恤民勞屬大田多稼之秋皆上帝諸神之賜勝妖以德易儉為豐祗薦菲儀仰酬景貺又湯廟祈雨文亢陽為沴時雨久愆徒深稼穡之憂未答雲霓之望神或不祐民何所依肆堅懇禱之誠冀獲休徵之應仰希靈鑒俯亮精衷普垂一溉之恩庸示三登之兆速回和氣密贊生成尚饗史沖霄祭清源王文導流既東書備明乎禹績祭壇而北禮詳著於周官昔者封侯今而王爵善利於物克長厥靈驅雷叱電以張天之威騰雲致雨以澤地之産不愛其寶故時時而效珍所享者誠宜翼翼而懷福肅陳菲薦仰瀆明靈冀有感通曲垂眷佑設醮祭亡靈文嗟嗟汝靈生非汝有寄此浮世薤露易晞風花易墜倐然而來忽然而逝賀者未巳弔者隨至亡者之魂存者之淚傷心哉隂德之門或子或孫蘭刈之後有時而生急難之原或弟或兄荆枯之後有時而榮投江為父孝感者女化石為夫思深者婦悲樹之風念親而哀望思之臺欲子之來顔死相繼一家忠義袁死相告一門忠孝嗚呼人之生世如夢一覺其間利害竟亦何校生非所惡死非所好伊誰不然在順其道日月之行戚其來往霜露之降助其悽愴雖在幽𡨕不昧英爽潔我庶羞宜其來享設醮祭孤魂文嗟嗟汝魂生何不辰罹此多難道喪生輕時危命賦夀夭所係將軍一戰同為枯骨遊魂之變可哀可矜可弔可唁蚯蚓鑽額烏鳶啄面月苦霜白風悲露泫傷心哉時邪命邪何不幸邪蜂蠆之毒邪䲔鯢之戮邪彼氣之竭旗之靡邪彼血之流戈之倒邪泰山之哭虎之猛邪桓山之悲鳥之别邪愛人之官鬼之朴邪為人之役鬼之倀邪枕者之尸誰其封邪㸑者之骸誰其掩邪嗚呼天地之間人為過客能夀幾何各反真宅何者為休何者為戚雖皆人禍亦乃天厄所棲者魄有兆有域所享者德有黍有稷魂兮不昧宜其來格齊文附擾攘兹久奚堪血祚之戈暴露者多長嘆衣薪之野今則遺骸既掩旁魄未招欲通幽爽之靈庸致薦修之欵肅陳淨醮周濟𡨕塗崔仲通祭孤魂齊文佳城馬過益增鬱鬱之嗟華表鶴來徒切纍纍之恨諒惟𡨕漠不昧英靈肆陳黃籙之筵為指未陵之路疏趙子容之河州贈行紏疏適齊而請難為繼富之周在宋者辭宜有逺行之贐且聞大夫之無者貸豈惟君子則贈以言矧夫易足之亷望有肯來之惠顯真觀重修三門疏昔年樓觀之居幾成而壞今日烟霞之侶既往復來相與合謀共圗起廢今則度材計費鳩役募工尚虞經始之難須借贊成之力敢希信士同結勝緣請楊仲顯同住神霄宫疏李德方伏念白首鵝經頗愧山隂之士青雲鶴駕望來華表之仙某夙業琳宫近經灰劫所缺煙霞伴侣風月間人共堅𢎞道之心庸敞棲真之地伏惟先生主張宗教壯觀𤣥門雖所樂者巖居亦何妨於市隱當如修靜暫辭蓮社而來那在李真更乞鏡湖之賜幸無固拒曲示光臨請寶泉因長老碧落開講疏一把蓋茅便是開山之祖九年面壁豈無立雪之人不舉話頭曷傳心印伏惟堂頭和尚花開震旦雷震叢林每笑古靈放光不許豐于饒舌宜示諄諄提耳之誨以破昏昏無眼之禪行處道場誰非法器寶泉巖下拈起拄杖便行碧落雲間放下鉢囊且住宜無多讓少振家風留請因老住持碧落治平院疏五葉開時不昧栽松之境一庵破後忽來結草之人但恐緣疏豈求旦過隙光難挽講席易終方惓惓乎法中之王何屑屑乎桑下之戀當須摩頂授記何在擺手便行發藥叢林復萃鉢瓶之衆主張教閾載揚鍾鼓之音少屈髙懷俯從衆望請雲老開堂疏竊以團圞坐上共話無生煩惱林中便覔重悟方悵逹摩去後卻嫌彌勒生遲試拈一瓣之香為闡三乘之教伏惟雲公長老機鋒峻捷戒行孤髙曾向維摩問禪不許丹霞下著以一則語振祖師將墜之風於萬斯年祝聖主無疆之夀早升法席佇聽潮音開元寺重修經閣疏劫火騰空忽碎雨花之界業風蕩地漸摧龍藏之基不救其危將歸於盡欲復翬飛之勢必須鳩僝之工見義則為當仁不讓量財助役施雖毛髮之輕隨喜結緣行若丘山之積敢希善衆共啓誠心樂贊其成有光於後張村寺為佛寂滅設齊疏十方蘭若久為灰劫之塵六祖叢林未覩花開之兆逹摩歸去後彌勒下生遲雖鐵石人皆有向道心於瓦礫中誰是說法者因緣佛事舉似家風暮鼓晨鐘驚破龍蛇之地千山萬水喚回瓶鉢之流史正之酒疏伏念君子有酒既多且㫖衆人皆醉奈何獨醒可以忘憂速宜就飲聊共孔文舉之客坐莫聽劉伯倫之婦言惠然肯來永以為好燕子和重修陽城縣廟學疏能修泮宫魯美僖公之化不毁鄉校鄭髙子産之風天未喪文人能𢎞道本縣文宣王廟梁木將壞仞墻未窺牧兒為薪刈之場童子無詠歸之地思與衆共期於一新是皆好事者為之未見有力不足者當仁莫讓同氣相求庠序未遑久仰詩書之治絃歌不絶復還禮義之鄉陵川縣重修廟學疏郭子昭張仲德盧仁美大成教立共尊百世之師釋奠禮行敢怠二丁之享今則仞墻就毁廟貌無依雖漢之庠序未遑在魯則絃歌不絶大凡被三遷之教者有能用一日之力乎得助者多圖成也易梁其壞矣第形安仰之嗟學果廢邪能免不修之刺儻䝉許可請惠好音本州廟學築墻疏學久不修幾廢大成之教廟雖如故悉摧萬仞之基時然後興文斯未喪自行束修以上者豈無一簣之往焉所助者多其成也速敢希同志共力鳩功段正卿西學請劉漢臣疏鄭校不修舉是在城之子鄒館既假悉為受業之人須鳴其待問之鍾方鼓此入學之篋漢臣殿元先生吾黨領袖士林範模凡一卷而立之師不三年而至於榖行束修以上者就有道而正焉春暮風雩未遂詠歸之志秋涼燈火㑹看同隊之親無倦發䝉當請主善李君卿藥局㑹疏秦緩未來罕悟膏肓之疾孟孫猶在復何藥石之憂生不可輕命由所飬固嘗愧扁鵲之先見豈徒望叔微之隂功細詳肘後之方共濟籠中之物用雖一粒重若萬金知伯休之價乎守之不二受康子之饋者達則敢嘗張伯宜藥局疏未精所業猥叨三世之醫欲濟於人賴有萬金之藥豈云小補非敢自私李德方畫十王糾疏善惡兩途難逃隂責幽明一致各有司存生而上柱國之榮死則南面王之貴不寫尊嚴之像曷伸夤奉之誠尚賴同心共求妙手葬枯骨疏禮備後人奚取衣薪之葬序迎春孟正宜掩骼之時況久慘於毒痡尤不堪其暴露可為矜恤當共瘞埋庶為亡魂一同薦拔又禮詳月令具垂掩骼之文辭按離騷尤重招魂之句蓋所哀者民命其可後於天時爰收暴露之遺俾反措安之兆且希同志共贊隂功抄簡疏浩浩𤣥穹密運資生之化冥冥長夜良多不返之魂未知所依是誠可憫爰軫薦修之念但無幽贊之人與我同誠畢兹能事抄紙疏焚紙錢而祭唐之遺事用紙衣而葬周之儉風習以為常俗莫能易然念鬼神之感豈求享祭之豐不腆冥財曷伸哀欵庶能周恤須賴勸緣抄經疏譯而為經作者為聖豈惟貫道之器是亦升天之階將有事於靈壇可不資於精業仍希善衆共積隂功陽城縣楊敬之重修太清觀四聖閣疏奕奕靈宫爰敞棲真之地巍巍重構忽搖經始之基不救其危將歸於壞本觀四聖閣者光揚道域威護法門厯嵗月而漸深困風雨而就毁欲復翬飛之勢方圖鳩僝之功莫不聞風而恱之多見得道之助者宜堅信向同結勝因香火緣中載肅太清之境鼓鐘聲裏一新華夏之音段正卿請講師孫仲逺疏初罹多故長昧大方雖存恥過之心未有投誠之地不依法廕曷薦愚衷伏惟提㸃大師洞貫𤣥機表儀羽衆謂此道善於利物況其力可以回天咸仰登壇無辭枉駕儻垂惠肯何幸如之喬舜臣酒疏百年能得幾時斗酒可以自勞好向幕天席地縱意所如免使明月清風笑人不飲況值麴蘖事了何妨指㸃索嘗肯令坐上之尊空不比街頭之價貴一時勝友共醉新醅頴陽鎮修宣聖廟疏欲復漢庠雖在未遑之際當思鄭校常存不毁之心念道實在於人𢎞文豈由乎天喪今兹頴士不負孔門舞雩雖有詠歸之風在城尚多挑達之子欲擇采芹之地重修釋菜之儀備禮執經得從兹而北面連年取第庶不減於西城表丘和叔析城山祈請聖水表東作西成方著舜耕之土春祈秋報必因禹奠之山蓋以享者克誠豈有求而不應臣伏念本境土兼冀壤儉襲晉風小人知稼穡之艱大旱有雲霓之望神或不祐嵗何以登肆堅懇禱之悰冀速休徴之應緬惟靈鑒答是精衷雨不失時以畢三農之務祀有常典仰酬一溉之恩馮裕之析城山祈請聖水表三代以還咸仰配天之澤百世而下猶多戴舊之民凡致䖍祈必䝉嘉祐伏念臣某職專奉上志切憂時室家襲晉儉之風稼穡闢舜耕之壤慮因旱虐有害秋成是用謹請靈宮肅伸懇禱仰希昭鑒俯答精衷應若桑林咸沐溉枯之渥祀如那首敢忘降福之私上梁文髙平縣宣聖廟上梁文百世大成之教將喪於天二丁釋奠之儀欲行無地庶幾見聖須賴有功況河東人物之豪在長平朱紫者半憫其梁木易壞仞墻未窺悉存起廢之心方屬未遑之際而乃度材計費鳩役募工於時則咸謂之迂而為之猶賢乎已㸃因言志必期春暮之風符欲讀書奚待秋涼之雨所望入其門見宗廟之美升其堂聞絲竹之音今則畚鍤具陳斧斤告畢謹差榖旦爰舉虹梁因採歡謡式揚善頌拋梁東比屋衣冠似魯中二十餘年荆棘地一朝刮目見華風拋梁西水漫城根欲斷時不見向來挑逹子盡為市上買書兒拋梁南謾說中牟異政三何似此開遊學路流為萬古作名談拋梁北路從闢後無楊墨琴堂美化及民新吏事方知有儒術拋梁上吾道隨時有消長邇來門户爭相髙要取人間卿與相拋梁下往日蔬園今學舍不遇當年董仲舒誰為後世修書者伏願上梁之後家家爼豆處處絃歌政誇令尹之新人有君子之行不獨文翁之郡學亦能興抑令子産之鄉校無敢毁湯廟上梁文禮莫重於祭神所依者人享以克誠思戴商者久矣放而不祀肯與葛為鄰哉肆堅肅敬之心爰敞奉安之地五丁為之戮力百鬼為之駿奔奕奕而新巍巍乎大庸俟斧斤之畢具修俎豆之容不日而成蓋天所佑今則謹涓榖旦肇舉虹梁因採民謡式揚善頌拋梁東人物熙熙樂土中了郤公田無箇事豚蹄豆酒慶年豐拋梁西人事天時一旦回佇聽春雷起驚蟄世間翹首望雲霓拋梁南四面山光滴翠嵐惟有新城嘉潤地休功美利與天參拋梁北宅土芒芒咸仰德慘舒一氣兩儀間無物不資神妙力拋梁上峻宇淩空雄且壯春祈秋報有常時靈貺應人如影響拋梁下吹簫擊鼓農桑社百靈受職風雨時萬頃連雲看多稼伏願上梁之後俗化衣冠人離塗炭澤被九圍之逺禮還三代之初精意感通栗栗桑林之事歡聲歌誦洋洋那首之詩神霄宫上梁文金碧朝真之地劫火所焚斧斤起廢之人家風猶在方圗鳩僝俄覩翬飛莫不聞風而喜之未見有力不足者告成有日當落霞孤鶩之秋㑹集如雲盡佩玉鳴鸞之侣謹涓榖旦爰舉虹梁因採歡謡式揚善訟拋梁東萬象咸歸道域中靈宇巋然還舊觀共為鼻祖立𤣥風拋梁西成壞須知自有時技癢逰人休疥壁留為君子看花題拋梁南輦玉夷荒共結庵絳帕䝉頭多少衆從今剔耳聽𤣥談拋梁北清髙地位仙凡隔天風吹散步虛聲化鶴時來千嵗客拋梁上冠劒登壇環珮響門外黃塵不見山致身福地何蕭爽拋梁下人物山隂隨所化不須更覔換鵝書手內黃庭皆自寫伏願上梁之後地天交泰神鬼護持徐甲復來不憚掃除之役可元再出一新香火之緣錦堂上梁文德邁于公素有髙門之望賢如晏子欲更近市之居此心所安乃卜既吉爰即鳴珂之里以新衣錦之堂為天下士欲得萬間在大丈夫安事一室象蓋取諸大壯歌載播于斯干巳許王翰為鄰將見許伯入第謹涓吉日肇舉修梁因採歡謡式揚善頌拋梁東崇構巍巍聳碧空天際浮雲風捲盡放教逺岫列窗中拋梁西落霞孤鶩與齊飛扶搖萬里垂天翼肯向枝巢借一棲拋梁南百屋堆錢不可貪何如養取間中趣漸漸佳如食蔗甘拋梁北歸意濃於山有色故鄉曾見幾人還多少朱門鎖空宅拋梁上子子孫孫枝葉壯不知更有貴甥誰能與外家成宅相拋梁下壁上尤堪三絶畫更將黃卷教兒童學取鄴侯書滿架伏願上梁以後門闌多喜家道克昌鬼神為之護持民物於此安逸豈止梁間之燕咸賀其成抑令屋上之烏皆知所止崇安寺重修三門上梁文僧圓勝嵗月既遷久曠莊嚴之境家風不墜大開方便之門結十方隨喜緣種三生無量福恃者衆力期於一新使檀越如此用心欲衲子有箇歇處謹㳙吉日肇舉修梁因採歡謠式形美頌拋梁東一旦精藍掃地空誰似崇安能起廢聖人門戶見重重拋梁西橫峯側嶺護招提卻還舊觀淩霄漢氣厭龍門一望低拋梁南瓶鉢生涯共一龕試問龍蛇今幾種前三三與後三三拋梁北色即是空空即色有時天女散天花莫認毗耶居士室拋梁上一榻茶煙小方丈幾年面壁少林師肯向人前呈伎倆拋梁下山林所在皆蓮社此心安處便宜休銷得蓋頭茅一把伏願上梁已後永光法界不墮劫灰看取佛堂放光且為道場起本金得長者之布日日而興衣自祖師而傳源源不絶髙平顯真觀三門上梁文郜志淵瓦礫積年未敞棲真之地斧斤一旦共為起廢之人時然後興應者如響同力莫不相濟下手惟嫌太遲得助者多能事將畢謹差榖旦爰舉虹梁因採歡謠式形善頌拋梁東壯觀𤣥門似有功幽事不妨清淨念便從林下立家風拋梁西看破棲霞不肯棲别為道場重起本紅塵背鏡笑人迷拋梁南杖屨山林處處庵但結卧龍岡下伴不須海上覔仙龕拋梁北地位清髙風雨隔一朝白日上青天得道旌陽人不識拋梁上有作有為俱是妄問君何處是真逰試向仙翁山下望拋梁下蕭爽殘年香火社姓名今已籍丹臺空界時來鸞鶴駕伏願上梁巳後羽衣雲集宗教日崇不羡陶家隱居如在壺公謫處靈宫載肅蓋多星斗之臨厯劫長存自有鬼神之護雜著龜鏡山人陳時發屏風道尊孔氏妙窺三絶之編市隱君平坐閲百錢之肆在憂患而作者其精微之教乎儻學者加以數年則愚者必有一得龜鏡角折五鹿閣束九師以變者為占其應也如響滕公之室屈子之居晉隗昭之索金漢張伯之懷璧知來者逆情見乎辭筮而不從動則有悔莫靈如卦定因三畫之吞或泄此書未免六丁之取蓋有聖人之道以斷天下之疑秦鏡雖亡幸斯文之未喪楚龜巳朽賴其䇿之無遺問而以言瀆則不告副元帥討亂臣諭將士伊戚自貽久露滔天之惡帝德乃大尚寬棄市之刑儻滋蔓而不除將噬臍其難悔某官某誘竊戎柄包藏禍心飛書構亂華之夷詭計為奔軍之將幸免崇山之外放敢兆蕭墻之內憂衆叛親離人怨神怒雖欲不忌器而投鼠或恐以蹊田而奪牛若執小嫌有傷大義忠於為國奮不顧身少正兩觀之誅彼自取爾趙盾一字之貶我其免乎無為彼先勉出乃力道藏經後洪惟𤣥祖逺振宗風垂三洞之靈文演一真之妙理要使學仙之子咸與道俱尚憂誤讀之人或遭隂責宜新刋正用廣流傳劾張唐臣酒過欲解憂於杜康佳期難遇俄立威於寧越和氣有傷民自速辜酒以為禮序㸃揚觶而語杜蕢厯階而升罰以兕觥脅以童羖被醉不臧縱意所如受爵不讓多言數窮登牀而忤鄭公脫靴而忿力士鴟夷過左阿君之家沐猴舞平恩侯之第自以為適不知敗德自以為真不知喪身至有汝陽涎流公孫腹溢賀監眼花夷吾舌出未歌驪駒先賦相鼠犯朱虛之令激灌夫之怒拳安劉伶之肋帽脫張旭之頂曵墮地之遐罵到官之鄭不聞南康之納狂客不見後閣之遣窮賔在側雖有二豪所指豈惟十手醉猶未醒死而復蘇初逐武坐之蠅便可去矣誰謂宋門之犬如此惡邪仰天而呼烏烏向空而書咄咄幾年程普方思公瑾之交一旦楚元罷設穆生之醴宜加薄責用警非彛盍省前愆勿貽後患酒檄山堂酒不至戲檄以督之人生貴在意適我輩況復情鍾念樂事之難并須同欲之相濟山堂主人作真率會鬬見在身掉船尋賀老於稽山齎具邀淵明於栗里盜甕而飲者醉指瓶而索者嘗伶婦無言宋犬不吠乃有忘形爾汝痛讀離騷了一生於蟹螯視二豪如蜾螺以其無公田而種秫故不待酉嵗而乞漿莫謂寧逢惡賔亦可便稱名士獨不與李將軍為地方且共江咨議論兵徒使汝陽涎流想見子幼耳熱酲猶未解釀可速傾得到於齊請鑒青州之事或薄如魯未免邯鄲之圍惠而不傷吝則有悔余言不食衆怒難犯焚問舍劵髙堂主人好客不倦肇開東閣大闢南館坐上簪盍户外屨滿客有趑趄而不獲進者乃持問舍之劵而見焉其文曰百尺樓前問舍萬人海裏藏身誰念入室相如四壁徒立自笑移居東野一物全無略敘幽懷勿嫌多事不欲起樓背山借宅種竹當門藝蘭開徑訪菊不欲犬吠於門梟鳴於木鬼嘯於梁鼠穿於屋所望取友必端序賔以賢屣為粲倒席因賈前鄒不可不迎枚不可不延醴如楚設榻似陳懸無使籍恥臣蔣雲羞吏宣諤諤者去唯唯者來紆餘者恱卓犖者哀豈樂正子後長者而不見而燕昭能自隗始而築黃金之臺乎主人讀畢怒而投之地客懷歸以語鶴鳴鶴鳴曰吁夫心契則言入目擊則道存豈不見鳥能擇木木豈能擇鳥哉子欲以垂雲之翼投覆卵之巢其可邪乃取其劵而焚之客於是浩然長往不數日主人及於禍而客免焉求田願為聖人氓但得一㕓田大庇天下士安用萬間屋我館既定我鄰既卜人夀幾何生理易足約以自處能者養福非敢望設醴楚元指囷魯肅馮歡食魚子思餽肉乃有鄭相葫蘆薛公苜蓿隂將軍之葱葉麥飯石季倫之萍虀豆粥吏部公之藜莧天隨生之杞菊商山隱士之紫芝少陵野老之黃獨請學為圃中有樊遲之祿至於華元羊羮庾恱梟炙監州螃蟹典籖熊白雖不至於嗟來而客不可以不速蓋在人者己所不為在己者人所不欲以小人之心為君子之腹是則釜不須轑鼎不須覆犬不須吠蠅不須逐無事而食有靦面目噫忘其朵頤之凶以養吾之老叨何其耐辱悼犬家有畜犬始善終惡衆勸烹之姑息間其惡彌甚戊戍秋烹以饗衆衆意頗快獨惻然悼之非土性而畜常戒於書祖陽氣而烹敢違於禮生豈不好禍皆自求爾心則獸心食者人食其志不如槃瓠其力不及韓盧盜如在齊吠如在桀楚人之井為汝溺宋人之酒為汝酸孝子為之去妻里媪為之逐婦徐勉不敢以還宅楊布不敢以易衣饑則乞憐飽則反噬不敬而養雖猛何為稍能聽指跟於蕭何自可得終老於柏直孔門弟子寧無弊蓋之思噲等少年爭效鼓刀之勇有此行者其能免乎蓋與衆而棄之豈無故而殺者雖然逐難忘上蔡之情可奈嗾獒終速桃園之禍莊靖集卷十
