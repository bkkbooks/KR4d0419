body:
  text: 莊靖集卷四金李俊民撰七言絶句謁秦吳二王廟三月十八日與馬子溫郭謙甫楊茂之叔姪劉濟之君祥仲寬姚子昂邢文炳同行頽垣陊殿夕陽中血食雖同事不同揖讓干戈兩陳迹酬觴拋與落花風杖藜行處記曾過草草杯盤野興多舉目山川縱如舊一場夢抵幾南柯卜居東鄰西舍兩三家簌簌牆頭落棗花慙愧畫梁雙燕子笑人今日又天涯中秋夜夢中秋前一夕夢入僧寺往來人物有送别意須㬰有一麗人於槖中出一春衫再四整疊欲相贈間而雨作趨避漏室中其人行歌而至雨止聽之歌未終而覺故為紀之征衣不用贈春羅試聽尊前一曲歌為問從來雲雨事如何偏向夢中多讀項羽傳鴻溝時暫割山河楚國山河一半多欲去故鄉誇富貴不知沛有大風歌糟筍甕中有地可藏真子子孫孫麴糵醺誰是聖之清者後此君應負此君君伯夷孤竹君之子新樣團茶春風傾倒在靈芽才到江南百草花未試人間小團月異香先入玉川家重午偶題只為離騷話獨清至今猶恨楚君臣魂招不得歸何處閒氣都留與艾人子猷訪戴圖雪後山隂本乘興似非特為故人來縱能一見戴安道船未回時心巳回和籌堂途中即事晚風吹雨過山堂燈火秋涼好對牀却被荒雞笑人懶一聲催起著鞭忙悠悠旌斾出山城世事驚心幾變更水郭烟村誰是伴老夫矍鑠尚堪行斗酒中間詩百篇錦囊新句落誰邊無窮山水吟難盡說似畫師僧巨然指楊舅彥明船子和尚圖千尺絲綸在手中月明歸去滿船空寒江豈是魚難釣釣得還將不釣同和河樓閒望孟州去去來來不繫舟至今師渡幾時休洗兵豈是天無雨盡逐黃河入海流一夜長空落將星不知誰抱越人氷中原可惜衣冠地自古以來多廢興用籌堂韻清尊莫惜再三開别後何曾得好懷為向緑衣花使道杖藜不是等閒來答滿法師此身分付水雲間不見髙人得句難待學江西立公案便宜築箇小詩壇和泰禪淡泊生涯分自甘十年霜葉碎青衫忽從問道山前過牧馬之兒是指南橙數珠水月禪師有橙數珠竹如意恨不見作者之句鑿空道其髣佛典刑釀出洞庭霜只取青圓不待黃凡俗盡從千佛轉忘言老宿但拈香從頭細轉梵王經一串秋香得洞庭為報重蘇當自惜莫教落入念珠㕔重蘇即水月也竹如意曾為彈琴指甲傷有時曝背竹書光不須爬癢倩仙爪忍待一朝春筍長即時參得指頭禪說似家風玉版傳一日佛堂光自放我師歇在古靈前雪菴二梅圖老對風光百不堪畫圖倣佛見江南為君試草花間賦未必心腸似雪菴贈碧落和講主蕭蕭古寺掩松關雨後無人草木閒掃地家風誰舉似我師特特為開山跋竇子溫江山圖渺渺澄江欲拍天參差烟樹老江邊舉頭不見長安日一棹秋風載酒船過雲臺夜半風吹霽色開曉乘殘月過雲臺連山斷處瞰平野一線黃流掌上來濟源龍潭塵世悠悠不識真一潭春碧養潛鱗可憐無故驚雷起誤却山前失筯人裴公亭青山如畫水如藍自笑平生性僻耽尊前留連妨逸興不能一到侍中菴與奉仙觀道士元明道野鶴飄飄性自髙徘徊塵世豈難拋棲真舊隱無多地何處仙山不可巢富公草堂青山萬疊水縈回山水中間幾往來風物不殊人世段中州何處是崑臺謝楊成之與客西從濟上回明朝扶杖到雲臺一尊相送休頻勸留作山行軟腳杯雨後春空靄靄暮雲低飛過山前雨一犁明日却尋歸去路馬蹄猶踏落花泥阻風東風作惡幾時休况值春光欲盡頭誰謂閒人無箇事一年長是為花愁答籌堂見招須信人生足别離相看能得幾多時浮雲一片無根蒂去去來來自不知日日相陪鶴髮翁烏紗白葛道家風火雲堆向山南去暑氣蒸人似甑中俯仰隨人亦自欺精神無復似當時年來世事俱嘗遍只有閒中味不知冠世聲名蓋世功尋常杯酒坐生風區區問舍求田客盡在元龍一笑中日日言歸未得歸白頭才是入山時依前却趂逍遙出慙愧山靈我不知誰謂長河不可通只消送客一帆風故人别後情偏重猶恐相逢是夢中史遂良夀日任他白髮不相饒兩頰春紅醉裏潮今夜鳳凰臺上闕未知誰可共吹簫和王李文襄陽變後將軍橫槊面潮紅一舉淮南掃地空堪笑楚人無伎倆至今猶說馬牛風張翔卿出家絳帕䝉頭讀道書孫郎見後肯容無休將僥幸闕名教天上臞仙即是儒鼇背元夜山市家家秉燭遊風簷齊挂月燈毬不須更用閒粧㸃人在鼇峰最上頭許司諫醉吟圖席地風光引興來不辭白髮被春催眼前有句貪拈掇閒却梨花樹下杯明皇擊梧圖不使梨園弟子知太平音在鳳凰枝一朝野鹿銜花去長恨秋風落葉時秋江斷鴈圖不堪愁裏見秋光江北江南木葉黃誰信朔風猶跋扈天涯吹斷弟兄行游石堂山與史正之王廷秀姚子昂郭顯道李廣之同行雨後青山盡不如算心人去有誰居紫雲空鎖神清洞不見丹崖四字書邢和璞算心處歐陽文忠公神清之洞句龍廟溪行十里氣如蒸危檻慿虛不厭登咫尺仙山在塵世杖藜來往幾人曾陽關圖一杯送别古陽關關外千重萬疊山試問青青渭城栁不知眼見幾人還烟江疊嶂圖揮毫落紙生雲烟江北江南水墨天愛畫主人胸次别卧遊不用買山錢千里江山圖曾把雲山爛熳酬杖藜隨處賈胡留如今腳力那千里水墨中間只卧浮筆下江山取意成一峯未盡一峯生慿誰試向行人問水郭烟村第幾程答祁定之歸袖迎風拂面埃青山望處白雲埋如何千載離家鶴學得仙時不便來戲贈布袍襤褸化風埃是處青山骨可埋三笑家風闕時了我師容易去還來雪中寄秋空一洗絶纎埃著腳街頭雪半埋試問希真門下客衣蓑曾有葛三來不寐露下中庭鶴睡驚娟娟缺月照忩明夜深讀罷牀頭易紙帳梅花夢不成西山問羊淡泊不禁頻皛飯尋常無以致氊根西山繭耳多於石肯與書生踏菜園暮秋有感慈鴉無數噪寒林林下風吹落葉深惟有黃花枝上露向人猶似泣殘金即事將軍下馬氣如虹書生折腰曲如弓好山無限歸未得白雲慙愧渡溪風即席秋色南山氣勢髙坐間牛酒話粗豪自憐萍梗天涯客俯仰隨人似桔橰陸渾佛髻山十步都無一步平往來人似畫圖行可憐一派溫泉水不與荒山洗惡名湯下寺壁滚滚龍泉自吐吞誰能箇裏混光塵再三繞壁尋題句饒舌山禽不避人跋背面彌勒萬水千山特特來謾勞皮袋走塵埃橫擔拄杖明州去世上誰能喚得回題斷碑節角摧殘卧夕陽豈無神物護文章一從薦福雷轟後片石猶爭日月光游青蓮浦值巨川彥廣二上人出寂寂荒庭落葉堆與誰重上遠公臺青山不解留人住立盡秋風曦未來戲曹漢臣一見髙僧話亦髙醉中往往愛禪逃爾曹自謂曹溪後不怕曹溪笑爾曹移得花將碧落栽一枝開後百枝開今生也有狂時運待入東林社裏來碧落院松霜幹亭亭聳碧空幾年春雨養髯龍也能說得菩提法何處人間有萬松雪後送寶泉之碧落酒面輕風不作寒天花散落滿人間殷勤行腳休辭遠出得城門是雪山陶學士烹茶圖闕天寒對酪奴竹間雪鼎與風爐書生事業真堪闕莫謂粗人此景無修武騫林觀道經天上有玊京山騫林觀闕帶雨阻登臨往事看碑或可尋不是青牛洞中闕人間何處有騫林射虎逐鹿中原鹿巳無功名那在一於莵分明射中南山虎李廣元來不丈夫答籌堂寄詩有青燈佳話正當時之句見其戀戀之至也用來韻答休嫌堂上聚星遲懷宫有聚星堂邂逅人生似有時雞黍恐忘今後約預先報與巨卿知秋涼急急授衣遲便是霜林葉落時夜聽寒砧動離思恨無針線小蠻知參謀王君玉魏文侯冒雨出獵圖終朝冒雨入山林畢竟馳驅獲幾禽自是魏侯言不負當時只合獻虞針抱樹石火餘介子身猶在槁立鮑焦心愈堅欲向前村問遺叟石荒樹老不知年和王成之梅韻踏雪尋芳路帶沙南枝初放兩三花髙樓寄語休吹笛留取春風與大家朝來一雪羃晴沙行到前村始見花驛使便將春色去暗香今夜落誰家狂風春光著物酒如濃白白紅紅眼界中又是一場蝴蝶夢能禁幾度落花風游錦堂後園與濟之君祥仲寬子昂共粧㸃園林次第新野花無數不知名即時喚起閒中興慙愧陶家趣未成袁景先東歸喪馬汗血奔馳死即休東郊骨骼有誰收舉鞭遙指前山路野草閒花滿地愁長鞦短轡慣騎驢人日徒行為的顱得失從來等閒事未知愁得塞翁無玊李花盤根春後幾枝分似比樹頭花更新落月試將顔色照便如傳得謫仙神半丈紅艷冷香清是就中等閒不肯媚春風東君也恨無顔色染出枝頭㸃㸃紅溪竹﨑嶇一徑逐溪斜泛泛溪流帶落花為問風前雙燕子銜泥飛去入誰家吳神山頭多少往來人香火爭將瓦鼎焚簫鼓下山人漸遠晚風吹起一溪雲過古寨繫馬垂楊日半斜荒村籬落兩三家可憐華屋生存處瓦礫堆中幾樹花大陽與諸友話舊尋芳來入杏花村見客人人有典刑不用看碑問前事坐中一話即圖經聽樂時錦堂小疾聞韶還似在齊時三月猶然味不知若要得他安樂法請君聽取四休詩郜氏院看花誰道花枝不耐寒就中姚魏欲開難賞心未愜空歸去更待明朝爛熳看長平懷古趙括雖能讀父書長平一舉見規模縱橫戰國俱陳迹只有青山似畫圖枯松為嫌紅紫汙家風故向春來學種松秪恐等閒兒女輩輒將斤斧損髯龍勸行衣錦山前往復來莫教酒興盡時回前村見說無深巷留向溪堂把一杯留别耳畔頻頻杜宇聲馬頭山色翠相迎一杯不盡留連意送客風來便好行送毋受益之洛陽有心待種洛陽田早趂西風送客船借問梅花堂上月不知别後幾回圓寄大師孫仲遠講道經鶴骨仙人别後臞無由得近嘯臺居我師不了孫家事綘帕䝉頭說道書下太行山中日日伴雲閒不見閒雲只見山君去試從山下望青山却在白雲間德老瑞竹主人本望鳳來棲遂把孤根特地移不念平安猶未報誰教節外强生枝籜龍日日斧斤間可惜孤根托處難待得上番成竹後一枝還作兩枝看山前偶得白頭來往話難親琴酒重尋别後雲縱使山英不相棄奈無面目見移文為徒單雲甫作萬里相將鶴髮親倉惶永拂綵衣塵眼中滴盡孤寒淚誰是同門請粟人男兒糊口在四方聚蚊成雷不可當孝哉潁叔豈無恥恐君之羮猶未嘗過碧落寺流水溪邊一徑通參差殿閣倚晴空東林少箇開山祖何處人間有遠公古寺荒涼不記年庭松相對欲參天入門不見溪堂主秪恐蒼髯是老禪趙欲慿從約抗強秦完璧那能係重輕兩虎共圖全國計豈無一術救長平紛紛列國事縱橫誰似邯鄲得地形㑹罷澠池方氣勝不思嫁禍有馮亭觀射栁羽箭星飛霹靂聲追風馬上一枝橫平生百中將軍手不意今朝見栁營戒酒誰肯收心醉六經只言酒是在天星若能讀得離騷後學取先生半日醒游青蓮分韻得春字己亥暮春十有八日劉巨川濟之瀛漢臣王特升用亨郭甫仲山姚升子昂史顯忠遂良同游福嚴禪院與巨川彥廣二山主道舊兵革之餘不勝感嘆仍以春山多勝事為韻賦詩以紀其來四面山圍故故青茶烟榻畔坐忘身與師貪論安心法門外飛花送却春慈氏閣金碧相輝跨杳冥慿髙佇目記吾曾勸君試倚欄干望愧我今無腳力登出山興盡東山命駕忙斷雲似與雨商量出門卷地顛風起送客何須爾許狂東林景物畫中詩老恨因循著腳遲背了青山却歸去頭灰面上任風吹水簾倒傾蛟室瀉瓊瑰派落空巖雪浪堆卷地封姨收不起素娥垂下玉鈎來栁一年春色到溪頭展盡眉間幾㸃愁才得東君暫時意笑他張緒不風流千絲萬縷弄風柔為愛春隂盡日留杖屨重來有佳處道人鑿石沼清流臨清臺與諸友憩於臺上須㬰四面雲合垂垂欲雨忽驚平地一聲雷爍爍驕陽氣欲回安得雱𩃱片時雨臨清臺是望雲臺登山興盡早宜歸况是東風送客時只有臨清臺下水怪人來此不留詩懷舊杖藜重到古招提硤石雲深一徑迷不見同來舊時伴怕看雙翠壁間題新安芳華原頭一望空村南村北落花風可憐當日堆錢屋寂寂無人晚照中過二聖王氏故居感戰死者數仞牆圍石作基幾年風雨長苔衣英雄地迫難為計血汗遊魂不得歸東山道中採遍山城草木芽百年老樹盡枯查眼前多少閒田地雨後春耕有幾家擲筆臺空山老却涅槃師擲筆臺前旦過稀雉子豈知身後事至今猶傍法堂飛太平泉試從澗底覔根源剔蘚剜苔得舊泉人事盡隨流水去幾時復見太平年水邊堪賦濯纓歌來往遊人分外多為問太平何處是等閒不識起風波子榮過家上冡班超萬里歸無期張翰雖歸如不歸君看晝錦堂中相十五年前一布衣名遂功成不肯閒故鄉曾見幾人還百年扶杖華顛老爭看錢家錦繡山十七日送行匆匆又别故園春花落猶隨馬後塵相對離筵莫惆悵送行人是欲行人勉和籌堂來韻往古來今秋復春嬴顛劉蹶總成塵蝸牛角上爭閒氣笑倒南華夢蝶人氣似陽和處處春但隨流俗混光塵須知舌在為身纍非是是非何等人四海男兒得志時歸來一段話新竒野人不管興亡事飲恨閒看老杜詩漢祖龍興自有時未應六出計皆竒採芝人向山中老不見功名一首詩送穎陽史正之之鄧州風俗相鄰鴂舌蠻杖藜南去早宜還年今巳近强而仕捷徑休離少室山贈陳仲和吾友仲和故遼降虎太師之後以廕補官纍階三品喪亂之際相㑹於山陽年六十有二神閒而意適手持數珠日誦佛書不輟真髮僧也因誦飽諳世事慵開口㑹盡人情只㸃頭之句以此意索詩因書以示之百年浮世落花風漆水榮華一夢空拈起數珠都忘却大千沙界入圓融和秦彥容韻花信風傳閬苑杳騰空鶴駕望仙郎當年誰為看爐鼎曾得丹砂入藥囊碧落途中遇雪出郭山行十里餘據鞍擁鼻一臞儒飛花落在吟肩上便是藍關遇雪圖大陽值雪掃地隂雲撥不開北風吹落豆楷灰相逢父老應相笑直待山頭白後來呈濟之朝醒暮醉幾時休雞黍人家見客留聞道麴生行處有西村明日趁扶頭留别故人不寄一枝梅親到前村雪裏來興未盡時還又去為君更覔暖寒杯留别草堂諸友青山莫厭往來頻野鶴孤雲自在身客路傍春風色好明朝便是逺行人莊靖集卷四
