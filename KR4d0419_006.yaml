body:
  text: 莊靖集卷六金李俊民撰七言絶句襄陽闕南峴山闕中峴山闕萬山闕江漢闕古隄年平地溢四丈五尺魏太守胡烈補缺隄以利民至唐盧鈞為山南節度因烈之舊而增培之俗謂附城北者為金鎖隄南曰白銅隄一決江源水自東長隄隱隱卧如虹不因傳得襄陽操人世何由見禹功注張參議詩未雨還須徹桑土白沙湖上水湯湯元祐二年邢恕守襄詔以漢有決溢之患其畫經制久逺之策公來訪被水之地得之東南隅當漢水之衝土雜白沙水至輒陷民號白沙湖隄之內其勢平一決則兩城相望三十里瀦為汙澤近郊之民趨西山甚至登木杪白沙湖聞道沙隄水陷時茫茫無處覔完隄當時禹跡依然在以壑為鄰笑白圭戍邏墾田羊公鎮襄陽吳人罷守石城戍邏減半分以墾田八百餘頃公之始至無百日之糧及季年有十年之積屯徹南陽井井田劒牛刀犢兩功全石城驚落吳兒膽野宿貔貅萬竈烟樊城在襄陽北漢江之湄張參議昔年山甫興周地想見曹仁霸魏功昔仲山甫封於樊城曹公使曹仁守樊關侯攻之不能破暫來朱序秦還守初入曹仁漢復攻顛倒江山今幾主樊侯依舊襲周封漢髙廟在襄陽縣西南鍾山垓下未聞歌散楚澤中巳見哭亡秦乾坤到底歸真主愁殺鴻門碎斗人光武廟在襄陽東四十五里光武南陽棗陽人今棗陽縣是也舂陵在棗陽東望氣者蘇伯阿至南陽遙見舂陵曰氣佳哉鬱鬱葱葱光武始起兵還舂陵望舍南火光燭天今棗縣在襄陽東界六十里海內英雄待一呼雲龍際會入東都季龍不識真人事徼幸中原欲並驅楚昭王廟在宜城東北唐韓愈作宜城記言之甚詳愈又有昭王廟詩丘墳滿目衣冠盡城闕連雲草樹荒猶有國人懷舊德一間茅屋祀昭王一間茅屋暗塵埃香火凄涼幾奠杯故國到今如傳舍後人復使後人哀宋玉宅在宜城縣離騷經裏見文章水緑山青是楚鄉往事一場巫峽夢秋風搖落在東墻保漢公廟在襄陽子城南世傳紀信忠義祠今為州之城隍將將提兵氣自揚一朝翻為沐猴忙得從虎口抽身去不必雷霆怒假王鄼城蕭何初封在谷城縣西漢功臣表髙祖六年十二月甲申封曹參以正月甲午封張良最後封蕭何誰是興劉第一功我侯只合最先封當時獵犬猶爭甚得鹿權都在指蹤三顧門世傳襄陽水西門為三顧門先主自此三往見武侯張參議水西門外公來處將軍命駕出門西想見門從向日題山下卧龍誰說破賞音元直在檀溪注徐庶宅在檀溪之陽檀溪在襄陽西四里隆中諸葛亮宅在襄陽縣西二十里一朝師出震關東料敵曹吳幾日功未畢將軍天下計乾坤容易老英雄關將軍廟在襄陽南九里鳳林關鼎足相吞勢未分誰能傾蓋得將軍曹吳不是中原手天下英雄有使君鹿門山有龎德公宅在襄陽東南三十二里杜贈别鄭鍊赴襄陽為於耆舊內試覔姓龎人百年巢穴子孫安十日長聞九日間說破姓名人不識鹿門山是德公山注杜詩昔者龎德公未曾入州府襄陽耆舊間處士節獨苦龎士元宅在襄陽鷹自養來飢肯去龍從卧後顧須頻到頭驥足非難展祇在當時駕馭人徐庶宅在檀溪之陽習鑿齒與謝安書云游目檀溪念崔徐之交誰知方寸去留初盡把功名付葛廬舉目檀溪人不見空傳谷隱念交書注先主率其衆南行諸葛亮徐庶並從曹公追獲庶母庶辭先主曰方寸亂矣請從此别劉表祠祠前有墓在府城東門內天運端能卧可收江山形勢數荆州當時若聽韓嵩策那得曹瞞享士牛注曹操與袁紹相持於官渡韓嵩說表起乘其弊不然則以州附曹公今曹公先舉袁紹然後稱兵以向江漢將軍必不能禦表不從操征表表病死表之子琮竟以荆州降谷隱山衮斧留心漢晉間豈期谷隱避名難一人有半隨秦去不得相離釋道安注是時桓溫覬覦非望習鑿齒著漢晉春秋以裁正之後以腳疾廢於里巷襄陽陷於苻堅堅素聞其名與道安堅俱輿而致焉與諸鎮書昔晉平吳得二陸今獲士才一人有半耳俄以疾歸襄陽龎公祠唐龎藴也祠在鹿門山本自衡山得馬大師法來隱張參議家池龍種去無蹤珍重龎公似德公龎德公宅在鹿門山踏破衡山急急回鳳林盡是漉籬材大家了得無生著傾出團圞話裏來注張參議擺盡世緣空所有誰知佛法異還同丹霞不用傳心印靈照端能繼父風鳳林孟浩然故居在襄陽縣南十里天寶詩人去却回果曾北闕上書來若為耆舊無新語明主何曾棄不才注張參議有朝宗强欲相牽率豈識先生玩世心斬蛟渚晉鄧遐為太守襄陽城北沔水中有蛟常為人害遐拔劒入水斬之而去久憤汗干投水俗近憂泉室泣珠人到頭不是池中物血濺驚波劒有神夫人城在今襄陽西北一里苻丕之攻朱序也其母韓深識兵勢自登城履行謂西北角當先受弊遂領百餘婢并城中女丁於其角斜築城二十餘丈冦力攻西北角果挫衄而退襄陽號曰夫人城見說韓門素識兵故知西北勢先傾未應有子如豚犬何在夫人自築城注張參議五申下令吳姬肅三遂無譁魯築城誡虎碑宋傳僎字子成為襄陽令有善政縣多虎僎常追虎入城誡勵虎去不復為害邑人為立碑未除不必煩周處欲刺何須待卞莊入市如羊聽命去至今無害到襄陽注張參議應無白額煩周處解使於菟字子文杜甫故里杜易簡預之逺裔有從弟曰審言生子間間生甫世居襄陽甫徙家鞏縣不知故隱幾時離天寶年間處處詩過客不須尋世譜萬山山下看沈碑按杜詩吾家碑不昧王氏井依然注杜預沈碑峴山之下尹氏一門四闕在襄陽縣東南三里唐尹怦有父曰嗣宗居喪逾禮貞觀中旌表怦年十三竭力就養父卒負土成墳紫芝産墓側天子下詔稱揚龍朔中刺史改其閭曰南陔里子慕先孫仁恕皆著孝行萬嵗通天中繼被寵褒一門四闕張柬之張九齡為之記贊歐陽文忠公集古録言之甚詳萱堂猶是忘憂地烏屋相傳反哺恩一假家風誰出自千年鼻祖守關門注東坡尹可元詩千年鼻祖守關門武安君廟祠白起在南漳縣歸去咸陽是老頭如何此地肯重游分明祀典無交涉只合英靈在杜郵修褉亭在峴山半王子年拾遺記云江漢之人思周昭王至春上巳袚褉集王祠下如屈原故事相喚相呼上巳游國人無日不思周近來烽火遭三月那得間杯逐水流漢隂臺在宜城西三十步莊子子貢過漢隂見一丈人方將為圃鑿隧而入井抱甕而出灌用力甚多而見功寡子貢曰有械於此夫子不欲乎鑿木為機後重前輕挈水若抽其名為橰為圃者笑曰有機械者必有機事有機事者必有機心機心存於胸中則純白不傋神生不定吾非不知羞而不為也怪來賜也多言甚笑倒忘機老漢陰巧拙大都歸一溉寧教勞力莫勞心善謔驛在宜城縣驛前有淳于髠墓皆因盂酒與豚腣致使他鄉笑滑稽無限驛亭來往客獨言齊贅不歸齊滄浪歌屈原既放游于江潭漁父見之鼓枻而歌曰滄浪之水清兮可以濯我纓江上揚揚一棹波衆中清濁笑懷沙不知歌後滄浪曲却入騷人屈宋衙競渡屈原以五月五日赴汨羅土人追至洞庭湖大舟小莫得濟者乃歌曰何由得渡湖自此習以相傳為之戲憔悴沉湘楚大夫魂招魚腹肯來無至今江上漁歌在尚問何由得渡湖抱玉巖在南漳縣卞和得玉於此以進楚王王以為詐刖其足乃抱璞泣於荆山特特來從抵鵲山一心都在獻芹間非關楚國真難辨舉世人皆厭等間習家池即髙陽池也在峴山南百步水經云沔水東入襄陽習郁池內郁依范蠡養魚法作大陂列植竹木游燕之名處也日日山公載酒過醒時常少醉時多兒童拍手闌街笑驚破滄浪一曲歌的顱溪本名檀溪在襄陽西四里劉表因㑹取劉備備潛遁所乘馬名的顱走墮檀溪中備急曰的顱可努力的顱一踊三丈渡中流而追者至得雨蛟龍未易圗枉勞木禺用機謨死生畢竟誰堪託今日才方見的顱按東漢劉表本傳云表欲卧收天運其猶木禺之於人也注云如刻木為人無所知也前書有木禺龍音義云禺寄也寄形於木元具反張參議云垓下衆傾騅不逝合肥橋徹騎能飛孫權征合肥為張遼所襲權乘駿馬上津橋橋巳徹板著鞭超渡至今合肥名曰飛騎橋作樂山酈道元注云昔諸葛亮好為梁父吟每所登遊俗以作樂山名之今在襄陽西北二十里悠悠曾不倦登臨眼底何人為賞音白雪一歌猶掩耳安知梁父是龍吟冠蓋里漢靈帝時宜城太山廟有四郡守七都尉二卿五侍中一黃門侍郎三尚書六刺史朱軒髙蓋同日會於山下荆州刺史劉表行部見之甚歡歎其豪盛乃題道口亭為冠蓋里刻石銘之道口亭前多貴游一時來往亦風流若能共畫安劉計豈獨英雄記裏收呼鷹臺在襄陽縣東七里髙三丈表性好鷹常登此臺歌野鷹來曲臺之側有司馬徽龎統二宅英豪並起望人才底事將軍謾築臺倘使曹公肉能飽如何喚得野鷹來注曹公曰養士如養鷹飢即為人用飽則揚去仲宣井在萬山王仲宣故宅郭帥果移井欄於戎司其後破碎埋沒李帥奕收拾補甃置之便坐側稽考古今嵗月為之記試看汲古幾何深猶有餘波慰渴心誰把石欄移便坐並鄰又得一繁欽按耆舊傳王粲與繁欽並鄰同井杜甫詩云應同王粲宅留井峴山前張云繁欽有識還歆羡兹樓王粲樓按襄陽雜詠題曰兹樓蓋取粲登樓賦所謂登兹樓以四望兮襄陽志亦因之而樓不存見說襄陽有古風可憐耆舊老無功當年漢主龍興地盡在登樓四望中墮淚碑在南峴山上憤深藉館年年祭痛切夷陵嵗嵗祠不見征南遺愛地至今淚墮峴山碑注伍員破楚鞭尸藉館郢中立廟今自湖北至淮西故楚之地處處有祠白起伐楚燒先王墓夷陵宜城有白起堰灌城中死者流東陂臭聞逺近號曰臭陂沈碑在萬山下杜元凱刻石為二碑紀其勳績一沈萬山之下一立峴山之上中原人物老書生塞破乾坤萬古名俗子不知碑尚在一朝南渡愧荒傖晉柏在南峴山上即晉人所植下有小石題刻柯幹如鐵亭亭霜幹上參天色黛皮蒼老更堅當日不知誰手植到今人與樹千年文選樓在子城南門按祥符圗經云梁昭明太子於此樓撰文選聚才人賢士劉孝威等一十餘人資給豐厚日設珍饌諸才子號曰髙齊學士又云世傳文選成樓下所棄書與樓齊朝朝暮暮蠧書魚選盡人間得意書常恐不能精此理秪緣老杜近樓居注杜詩熟精文選理又眼前文字積如山想見中間筆削難一自登樓開卷後滿天依舊斗星寒解佩渚在襄陽西十里北臨沔水有曲隄按郡國志鄭交甫至漢臯臺下遇二女佩二大珠交甫求之二女解佩行數里二女及珠俱失相遇江臯事頗竒一雙佩解去還遺未能南國無遊女詠取周人漢廣詩弄珠灘楚俗以嬉游為事襄沔記嵗以正月二十一日二十二日謂之天地穿日移市於城北津弄珠灘按南都賦云游女弄珠於漢臯之曲江沙一日蚌胎虛遊女爭誇掌上珠美化不將風俗禁他年恐作媚川都注襄陽志云楚女於弄珠灘尋水竅石穿簮於叉上帶歸又云楚俗三月遊南山諸寺移市於山夀寺四月八日罷遊謂之辭山金沙泉在宜城縣東一里造酒絶美世謂宜城春又云竹葉杯何處山泉味最佳從來獨說有金沙楚人遍地宜城酒莫著淄澠誑易牙涌月亭在南峴山徘徊亭下晚相宜月與髙人本有期不比尋常三五夜十分圓後是來時七言絶句集古南遊一片歸心白羽輕髙蟾一場春夢不分明張泌東風二月淮隂郡劉商總是關山離别情王昌齡自遣南路蹉跎客未回樊晃山桃野杏兩三裁雍陶逢春漸覺飄蓬苦才調集更向花前把一杯嚴憚雨後出郊柳塘煙起日西斜鮑溶馬踏春泥半是花竇鞏何處最傷游客思武元衡緑陰相間兩三家司空圖寒食間身行止屬年華薛能故國春歸未有涯司空圖一樹梨花一溪月才調集不知墻外是誰家郎士元寒食席次鞦韆打困解羅裙韓偓把酒相看日又曛韋莊處士不知巫峽夢蓮花妓春來猶見伴行雲韋氏子郭外寒食悲看郭外春雲表數聲鴉噪日將曛潘閬山中舊宅無人住戴叔倫一樹繁花傍古墳盧綸小桃桃花依舊笑春風崔護悵望無人此醉同趙嘏應是夢中飛作蝶吕溫樹頭樹底覔殘紅王建看花兩岸山花似雪開劉禹錫開時莫放豔陽回李商隱明朝擕酒猶堪賞李涉雨漲春流隔往來劉商感花無人不道看花回劉禹錫猶憶紅螺一兩杯陸龜䝉曾是管絃同醉伴趙嘏來時歡笑去時哀韋氷惜花花樹流鶯日過遲武元衡少年爭惜最紅枝崔塗何人盡得天生態薛能為報東風且莫吹李涉又繡軛香韉夜不歸崔塗看花只恐看來遲韓偓今朝幾許風吹落楊巨源多在青苔少在枝崔櫓暮春一年春色負歸期韓偓緑葉成陰子滿枝杜牧公子王孫莫來好韓琮如今不似洛陽時崔櫓送春可憐寥落送春心髙駢負郭依山一徑深李涉燕子不歸花著雨韓偓小溪猶憶去年尋山谷又二月已破三月來杜子美常嗟物候暗相催樊晃幾時心緒渾無事李商隱終日傳杯不放杯山谷遣興讀徹間書弄水回趙嘏緑楊移傍小庭栽成文閉門盡日無人到韋莊便有春光四面來邵謁下樓繡簾珠戶未曾開東坡却向春風領恨回李山甫行到中庭數花朵劉禹錫遙聞語笑自空來李端招飲當時朝士已無多劉禹錫故里心期奈别何羊士諤不用憑欄苦回首杜牧且來花裏聽笙歌東坡春感嵗嵗無如老去何劉長卿東城南陌强經過謝皎然不知誰唱歸春曲曹唐斷得人腸不在多王建春怨己恨東風不展眉段成式落花惆悵滿塵衣趙渭南與君試向江邊覔東坡贏得悽涼索漠歸吳融約同歸故國煙花想已殘盧弼浮生各自繫悲歡司空圖青山一道同雲雨王昌齡步步相㩦不覺難劉禹錫江村夜添山雨作江聲羊士諤緑暗紅藏江上村韋莊何處人間似仙境劉禹錫寥寥一犬吠桃源劉長卿送客之江陵獨上江樓思渺然趙渭南故人去後絶朱絃山谷西南一望和雲水竇鞏入郭登橋出郭船羅隱贈别蕭蕭落葉送殘秋權德輿樓上黃昏欲望休李商隱滿目暮雲風捲盡陸龜䝉亭亭孤月照行舟蓋嘉運又洞庭風軟荻花秋鄭德璘客散江亭雨未休岑參南去北來人自老杜牧此中離恨兩難收魏野又誰家紅袖倚江樓杜牧白祫行人又逺游陸龜䝉今夜不知何處泊權德輿青山萬里一孤舟劉長卿秋懷八月霜飛柳遍黃盧弼鳥鳴山館客思鄉薛逢十年馬足知多少雍陶地角天涯不是長張建封妾洛中洛陽猶自有殘春劉禹錫水北原南草色新張籍山酒一巵歌一曲許渾不能回避看花塵趙渭南洛中感舊千里江山一夢回盧中悔緣名利入塵埃雍陶年光到處皆堪賞令狐楚誰與愁眉唱一杯山谷席上春風寂寞斾旌回武元衡兩度天涯地角來雍陶重到笙歌分散地杜牧與人頭上拂塵埃李山甫憶昔憶昔爭游曲水濵王駕當軒下馬入錦茵杜子美如今不似時平日王建風起楊花愁殺人李益送客之荆南千山紅樹萬山雲韋莊山鳥江楓得雨新雍陶我自飄零是羇旅東坡不堪仍送故鄉人顧非熊南征兩行旌斾接揚州李涉烽火城西百尺樓王昌齡九姓如今盡臣妾趙嘏青天猶列舊旄頭汪遵老將蓬根吹斷鴈南翔盧弼曉鼓鐘中兩鬢霜趙嘏獨倚關亭還把酒杜牧不堪秋氣入金瘡盧綸又憐君一見一悲歌劉長卿破虜曾輕馬伏波趙嘏今日寶刀無殺氣朱沖和太平功業在山河吳融又門前不改舊山河趙渭南淚落燈前一曲歌李羣玉更把玉鞭雲外指韋莊只緣君處受恩多朱沖和感征夫家臂上雕弓百戰勳王維居延城外又移軍令狐楚不知萬里沙場苦髙駢猶自笙歌徹曉聞王建從軍萬里還鄉未到鄉盧綸受降城外月如霜李益誰家營裡吹羌笛蓋嘉運不是愁人也斷腸戴叔倫聞角鐵馬狐裘出漢營常建瘴雲深處守孤城劉禹錫無端遇著傷心事吳融鳴軋江樓角一聲杜牧聞笛山頭烽火水邊營來鵠祗有牛羊與馬羣蓋嘉運羌笛何須怨楊柳王之渙忍教嗚咽夜長聞趙嘏漢女大邊物色更無春蓋嘉運碧玉芳年事冠軍楊巨源人世死前惟有别李商隱陽臺去作不歸雲趙渭南有别長對春風拂淚㾗才調集殷紅馬上石榴裙張諤無端更唱關山曲王表哀怨教人不忍聞蓋嘉運怨别書來未報幾時還竇鞏終日昏昏醉夢間李涉别易㑹難長自歎韓偓不堪重過望夫山真氏寄逺桃李年年上國新李益單于鼓角隔山聞馬逢一行書信千行淚王駕不是思君是恨君武元衡恨别悽悽長是别離情韋莊氷簟銀牀夢不成溫庭筠昨夜秋風今夜雨盧綸篝燈愁泣到天明韓偓又君問歸期未有期李益邇來中酒起常遲韋莊山長水逺無消息李涉指㸃庭花又過時韓偓感舊流鶯驚起不成棲陸龜䝉入到繁華夢覺時崔塗人面只今何處在崔護魏公懷舊嫁文姬舒元又碧欄干外繡簾垂韓偓曾識雲仙至小時李涉見我佯羞頻照影李商隱滿頭猶自插花枝劉德又九陌初晴處處春趙渭南日髙深院斷無人李商隱尊前花下長相見劉夢得宋玉東家是舊鄰王碩代送别隴上流泉隴下分崔涯自隨征鴈過寒雲李涉人生適意無南北王介甫莫向陽臺夢使君戎昱悼征婦萬里行人尚未還儲嗣宇百年多在别離間盧綸當時驚覺髙唐夢李涉為雨為雲過别山李㺯玉春夜春風二月落花時武元衡憶得前年君寄詩崔道共道人家惆悵事牛僧孺向燈彎盡一雙眉韓偓睡起萬轉千回懶下床崔氏不辭鶗鴂妬年芳李商隱酷憐一覺平明睡羅隱枕破施朱隔宿粧薛能無睡江南江北望烟波劉禹錫顰黛低紅别怨多李羣玉盡日傷心人不見許渾卧來無睡欲如何李商隱謾書巳共紅塵跡漸踈李九齡畫簷愁見燕歸初徐凝無端有寄間消息杜牧之腸斷蕭娘一紙書崔氏寄情年光空感疾如流吳商誥同向春風各自愁李商隱有境牽懷人不㑹齊已落花深處指髙樓權德輿又曾留宋玉舊衣裳李羣玉雲雨巫山枉斷腸李太白不為傍人羞不起西廂崔夜來新惹桂枝香裴思謙又寂寥滿地落花紅京兆女子獨倚欄干花露中趙嘏征客未來音信斷張汯年年回首泣春風王條秋夜擲却風光憶少年顧況多情信有短因緣鮑生妾欲知此恨無窮處羅蚪星落銀河月半天趙象有感風輕簾幕燕爭飛才調集到處煙花恨别離韋莊倚柱尋思倍惆悵張泌映人勻却淚胭脂韓偓戲答公子王孫逐後塵崔郊近來方解惜青春鄭谷春心不愜空歸去滕傅嗣長伴吹簫别有人劉禹錫戲遣雨散雲收一餉間真氏不知何處入空山盧綸殷勤好取襄王意戎昱下蔡城危莫破顔李商隱又枉破陽城十萬家李商隱門前初下七香車王維自緣今日人心别鄭都官隔坐剛拋豆蔲花軍倅偶見莫愁還自有愁時李商隱眉斂春山知為誰東坡含淚向人羞不語崔涯芙蓉頭上綰青絲李涉又滿身花影倩人扶陸龜䝉清潤潘郎玉不如楊巨源畢竟多情何處好韋莊庾樓明月墮雲初趙渭南又雲髻朝來不欲梳徐凝娉娉嫋嫋十三餘杜牧之分明記得曾行處方干看遍花枝盡不如趙嘏聽歌清歌空得隔花聞楊巨源寂寞堂前日又曛趙嘏共待夜深聽一曲戴叔倫女兒絃管弄參軍薛能寄懷愁雲漠漠草離離竇庠去國還家一望時韓琮幾度相思不相見武元衡雪中梅下與誰期李商隱秋怨且將團扇暫徘徊王昌齡淚滴間階長緑苔鄭谷春色似憐歌舞地姚合不論時節遣花開東坡悲故宫人雲慘煙愁苑路斜孟遲宫鶯銜出上陽花雍陶朱鉛滴盡無心語張祐生死深恩不到家竇鞏懷古暮雲宫闕古今情韓琮芳草長含玉輦塵韓偓春意自知無主惜崔櫓落花猶似墮樓人杜牧舊游山南山北雨濛濛韋莊十載長安似夢中李涉今日獨來張樂地劉禹錫故人墳樹五秋風杜牧關中嶽北秋空渭北川司空圖一村桑柘一村煙韓偓行人莫訝頻回首貫休記得春深欲種田薛能過梅溪舊居逺到音書轉寂寥徐凝青山隱隱水迢迢杜牧之村園門巷多相似雍陶花落梅溪雪未消靈徹登山陽郡樓將軍一去泣空營乾符童謠槐柳蕭疏繞郡城羊士諤試上髙樓望春色李涉落花流水嘆浮生溫庭筠王公樓上㑹飲詩酒能消一半春趙嘏紫微才調復知兵崔道融黃河九曲今歸漢薛逢獨上髙樓故國情羊士諤送客之南宫蕭蕭風竹夜窗寒武元衡書劒催人不暫間杜巖對酒已成千里客盧綸斷腸聲裡唱陽關李商隱答籌堂一夕秋風白髮生才調集相思迢遞隔重城李商隱前歡往恨分明在韓偓贏得青樓薄幸名杜牧夜集金鳯羅衣濕麝薰韋莊裝成掩泣欲行雲戎昱傍人未必知心事劉卓一曲狂歌酒百分髙駢戲書春風何處有佳期武元衡花滿西園月滿池髙駢料得也應憐宋玉李商隱東鄰墻短不曾窺段成式重九事去人亡跡自留劉長卿白雲猶似漢時秋岑參如今暫寄尊前笑劉禹錫明日黃花蝶也愁東坡十日遣興露葉如啼欲恨誰劉禹錫曉庭空繞折殘枝鄭谷芳尊有酒無人共趙嘏卧看南山改舊詩韋莊古城東風漸急夕陽斜朱鵠馬上懷中盡落花薛能腸斷入城芳草路韋莊孤煙起處是人家東坡送行天涯方歎異鄉身韋莊雲别青山馬踏塵趙渭南欲問孤鴻向何處李商隱依依還似北歸人東坡宫柳寒食東風御栁斜韓卻輕盈嫋娜占年華劉禹錫試看三月春殘後李山甫不見人煙空見花韓偓對花盡是劉郎去後栽劉禹錫為誰零落為誰開嚴憚風流才子多春思戴叔倫半醉間吟獨自來髙駢宿橫望逺上寒山石徑斜杜牧之月臨荒戍起啼鴉髙蟾故鄉今夜思千里髙適每到花時不在家張祜妓為尼無地無媒只一身趙渭南蛾眉畫出月爭新髙駢春來削髮芙蓉寺楊巨源從此蕭郎是路人崔郊新居每憶雲山養短才雍陶蓬門今始為君開杜子美落花寂寂黃昏雨韋莊依舊去年雙燕來趙渭南寒食野外浮雲飛盡日西頺韋檢莫向花前泣酒杯趙嘏獨上郊原人不見成文幹野風吹起紙錢灰吳融贈别緑柳才黃半未勻楊巨源灞橋攀折一何頻皇甫冉相逢且莫推辭酒白樂天明日忽為千里人劉禹錫柳還到春時别恨生張泌渭城朝雨浥輕塵王維自家飛絮猶無定羅隱不解迎人只送人皇甫冉惜春自有林亭不得間溫庭筠長安豪貴惜春殘東坡晚來風起花如雪劉禹錫為問無情嵗月看髙蟾春望半似羞人半忍寒韓偓風和時拂玉欄干段成式門前不見歸軒跡錢起强把花枝冷笑看張祜寒食夜雨風景依稀似去年趙渭南鳥啼花發柳含烟顧況夜深斜搭鞦韆索韓偓獨向簷牀看雨眠雍陶早行一聲歌盡各東西趙渭南花外煙濛月漸低陸龜䝉馬上政吟歸去好韋莊山山樹裏鷓鴣啼張籍過友人别墅少遊京洛共紅塵李益依舊瓊林照映人山谷且向白雲求一醉戴叔倫麻衣草坐亦終身靈徹不遇來往風塵共白頭戴叔倫誰人肯向死前休韓退之直教桂子落墳上賈島富貴何嘗潤髑髏山谷又豈有文章動聖君丁謂欲將書劒學從軍溫庭筠平生名利關身計翁綬執㦸官資笑子雲孫僅隱居此去秦關路幾多李商隱中原無鹿海無波吳融荷蓑不是人間事李涉造物小兒如子何東坡訪隱者不遇忽聞春盡强登山李涉却笑孤雲未是間施肩吾惆悵仙翁何處去髙駢尋真不見又空還韋應物懷韓居士烏巾年少歸何處姚合陵谷依然世自移李涉上天下地鶴一隻髙駢還在人間人不知東坡古道人鶴骨飄飄紫府仙東坡香風引到大羅天牛僧孺無人寂寂春山路李羣玉洞在清溪何處邊張顛遊仙霧為襟袖玉為冠韓偓委佩低簮彩仗間劉禹錫上界真人足官府韓退之不如歸去舊青山東坡李道者麻衣年少雪為顔施肩吾聞說經旬不啓關韓偓弄玉已歸蕭史去趙嘏洞門深鎖碧窗寒髙駢仙廟桂冷松香十里間康求水晶如意玉連環李商隱年年笑伴皆歸去盧綸門對寒流雪滿山韋應物又殿臺渾不似人寰唐永花態嬌羞月思間李涉髙坐寂寥塵漠漠劉禹錫秋風落葉滿空山謝皎然女仙臺上青真子玉童顔李涉石座苔花自古班王禹稱雲雨今歸何處去竇庠受人祭享占人山郭震聽琴蟬鬢慵梳倚帳門劉卓抱琴花夜不勝春趙渭南不應更學文君去李昌鄴擬作梁園坐右人劉禹錫重九日二十餘年别帝京劉禹錫可能朝市汙髙情韓偓秋光何處堪消日李汯漫繞東籬嗅落英東坡九日戲幕賔一任斜陽送客愁沈彬邊鴻不到水南流劉禹錫自從身逐征西府張祜破帽多情却戀頭東坡晚菊白露寒花自繞籬羊士諤從他桃李笑開遲冉宗敏一年秋色吟中過沈彬門外重陽過不知齊已十日對菊籬菊香寒晚吹笙孫僅可憐榮落在朝昏李商隱浮生也共花無别杜光庭不受陽和一㸃恩李山甫梅我今移爾滿庭栽韋莊不向東風怨未開雍陶回首看花花欲盡髙駢北人初識越人梅東坡落梅每到花時把酒杯韓偓暮天何處笛聲哀趙渭南縱然一夜風吹去司空文明不恨凋零却恨開杜牧之塞上古溝芳草起寒雲許渾斷續鴻聲到曉聞令狐楚萬里江山今不閉李益死生同恨舊將軍髙駢登樓東池送客醉年華吕溫獨倚危樓四望賖李九齡日暮鳥啼人散盡吳融輕風細雨落殘花武元衡花期不赴雲泥豈合得相親戎昱還把間吟慰病身丁謂一種是春長富貴杜子美有愁人有不愁人來鵬醉眠糝徑楊花鋪白氈杜子美日西鋪在古苔邊王建滿山明月東風夜韓偓留與逰人一醉眠鄭谷山中偶得棄擲功名脫履間孫僅東風吹雨過青山盧綸行人莫話金章貴鄭谷久許孤雲作往還義先夜飲虛榻吟窗更待誰王禹稱酒無多少醉為期東坡明朝騎馬搖鞭去楊憑㑹有求間不得時王建莊靖集卷六
