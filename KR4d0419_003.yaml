body:
  text: 莊靖集卷三金李俊民撰五言絶句一字百題示商君祥余年三十有九遭甲戌之變乙亥秋七月南邁時姪謙甫主河南福昌簿迎至西山僑居廳事之東齋小學師商君祥投詩索和頃刻間往回數十紙謙甫曰一鼓作氣未可敵姑堅壘以待姪壻郭鴻漸曰可以單師挫其鋭乃出百字題請賦以酬之遂信筆而書殊無意義付其徒孫男樂山示之三日不報謙甫笑曰五言長城不復敢攻也君祥於是攜酒來乞盟大會所友極歡而罷風汝未聞天籟簸揚箕有神能清常侍暑不動庾公塵月過圓旁死魄過缺哉生明髙賴玉斧手再修然後成雲旱魃將為虐從龍便出山人間三尺雨命駕早知還雨晚有來蘇意憂深望嵗人一犁雖美滿猶恨不當春雪細看花是雨將見麥宜秋度臘無三白梁園誰與遊山功名雙鬢雪心事數重山山下人家好終朝爽氣間泉滚滚勢長往冷冷味自清擬將修水記何况有詩情塵不憂懸榻室可奈汙人風踏破青鞋底猶疑是軟紅春來莫怨春遲去莫怨春忙春不隨人老誰教汝斷腸暑人間三伏暑海內一薰風獨詠微涼句公權似不公寒廣廈千萬間吾廬敝獨寒猶將折絃琴欲和薰風彈晝冬之日何速夏之日何遲山中無厯日遲速兩不知夜令乎日之夕政乎日之朝一尊待君子風雨會良宵晴展盡舒長景銷殘片段雲區區負暄子炙背不忘君隂朝見白雲縱暮見白雲橫不作及時雨何為點太清花惜花不論命看花須努力能得幾時好狂風妬春國蓮碧因圓更展紅向老猶粧鏡裏風流在人言似六郎菊色笑秋光淡香嫌酒力慳東籬在何處客裏見南山梅未報江南信先開雪裏村要看花上月立馬待黃昏松鬱鬱愁無地青青獨有心疑從大夫後傾蓋到如今竹瀟灑能醫俗檀欒看上番我寧負此腹忍使籜龍寃草日沒露易濕日出露易晞人生大都幾王孫胡不歸燕社後來何暮梁間話頗多巢泥愁未穩無面見淘河鴈俄見天邊字徒銷客裏魂一書言不盡為我敘寒溫鷗江靜煙籠雪天晴水浴衣漁歌驚不起物外兩忘機鶴去家丁令威化身徐佐卿不戀乘軒寵九皋堪一鳴蜂弄晴沾落絮帶雨護園花有課常輸蜜無春不到衙蝶元從生處樂肯向死前休花底人間世如何不夢周龜汝殼將自遮汝腸還自刳可憐一底板雖智不如愚魚華亭載月船長安遮日手一網腥城市吾於爾何有蟹食必視本草貴在精物理蔡侯何鹵莽幾為勤學死儒秦坑秦即孤魯戲魯尋削伊誰蹈前軌可謂來髙閣僧貌與松俱瘦心將絮共沾一菴空寂地香火讀楞嚴道自知身是患常謂道無名欲作間中友隨緣論養生仙千載遼東鶴雙飛葉縣鳬應憐塵世裏無地著臞儒禪見桃渾不悟對柏未嘗參虎嘯龍吟子風雷振一龕醫愈風陳有檄止瘧杜能詩雖然醫者意何意亦何醫卜棄置復棄置其然豈其然百錢聊為我更看小行年漁一聲歌欵乃萬頃國煙波鼇蟹中間醉蓑衣拜浪婆樵雲外山將遍人間日易斜不知棊換世柯爛未還家客渺渺亡羊路悠悠化鶴身人間同逆旅誰主復誰賓農賣劒田園計溫家種樹書新年無罪嵗事事有乘除牧蓑底因緣曲腰間觳觫鞭月明歸去晚想見葛洪川射手撚金僕姑身出矍相圃不穿百步楊志在南山虎獵終日無獲禽古人獵在德非德為禽荒獵食吾不食詩裁作牛腰束愁於飯顆山近覺故步窘十債九不還書入室五千卷插架三萬軸何似曬書人坦此便便腹筆不見中書君不聞老成人為君作佳傳繼者皆尖新墨松間老潘谷何處得玄圭速置薔薇露詩仙醉欲題紙殷勤翰林主揮掃驚風雨滴滴是玄珠點破先生楮硯端溪溫潤石價重百車渠一滴玄潭水蠅頭萬卷書畫有意皆堪譜無言總是詩潭潭居相府此譽不妨馳琴隂壑鳴松籟空巖響石泉此聲并此意誰得寄徽絃棋縱橫連井地明暗列星圖兩角觸蠻戰一家瓜葛無劒帶牛移漢俗匣刃出酆城安得治復古器農不器兵香小炷博山鼎半殘心字灰遊蜂何處客應為百花來茶人多愁水厄若箇有詩情靈草還知我平生事不平師絳帳風流逺青襟禮貌驕定須防射羿何必問嘲韶學邑化絃歌地鄰漸俎豆風二三言志子六七詠歸童仕雖有乘桴意能忘出晝情一官百僚底是亦道之行富狼籍胡椒斛破散堆錢屋不見貧者愚求榮是求辱貴鴟得腐鼠嚇犬笑狡兔死唾手功名場不知憂患始貧書生祿有籍造物費亦省顔回一簞食不得盡晚景隱孔負二宜去嵇知七不堪青山休老地佳處是終南智樂在知幾早憂因見道遲遙憐鮑莊子人笑不如葵愚膏以明自煎薰以香自薪善哉栁侯意一字辱溪神夀灰如戀闕心雪似窮經首問年今幾何看飲屠酥酒老尊年鄉飲禮擊壤太平歌甲子君休問光隂得最多名求為天下士所望不亦厚得少失有餘何况在身後友偶因勢貴賤乃見朋得喪嵗寒山隂雪獨有戴可訪身黃卷平生志青山見在緣百年今巳半只合鬬尊前影相對鏡中真相隨月下人我今未忘我身外還見身行水笑杯猶渡山驚錫尚飛垂垂瓶鉢老何處未來歸住俗尚家靈運誰堪社逺公空山雲不出愁殺渡溪風坐一軒容膝安半世行腳債龎家老居士舉似無生話卧一室散天花一榻揚茶煙家風嗣阿誰殘月曉風禪笑和氣須歡伯開顔只孔方世情如苦海件件可鬨堂吟冥搜腸亦苦隻字得之難作者有六義惜哉坐一寒醉愛此真珠滴能於大道通與君同舉白憐我獨潮紅醒暫出陶陶境那禁種種愁舉觴邀明月却帶醉鄉侯飲竹葉杯中醁金叉坐上春淺斟低唱境猶道是粗人舞野鶴聞琴態孤鸞覽鏡妍為君小垂手無地可回旋睡客隨陶令遣齋甚太常嚴儻或非黃嬭那知此黑甜夢物外日月忙人間憂患長休談夢中夢萬古一黃粱歌大音聲自希賞音人亦寡寧可逆汝耳不可廢作者嘯成瑨風生坐孫登月滿臺東臯今寂寞元亮早歸來傲王公輕以道富貴驕以志我見髙尚人蓋有髙尚事間太傅懸車里仙家避世壺老妻為紙局坐隱是功夫懶交有書堪絶師何記可嘲不僧亦不俗似癡還似髙話萬事就庾談一心對芝宇不思炊作麋但見風生麈浴子春恐事敗佟之坐水淫二者過不及何如我洗心歸世路雖多梗吾生豈繫匏西風倦飛翼樂在一枝巢别更盡一杯酒出門行路難送君過南浦忍淚憑欄干愁解使回腸斷能催兩鬢秋天涯未歸客容易上眉頭忍氣留臍可暖唾使面自乾無怨亦無惡此腹如此寬蠶蠶月始條桑匆匆婦姑忙天寒授衣節婦姑無完裳織泛槎驚誤客折齒笑狂鄰不作回文字愁嫌愁殺人舂斷木才脫粟濕薪空爆竹朝餐動及午奈此雷鳴腹炊旅食寄天涯愁如桂玊何莫忘生處樂聽取扊扅歌砧對影無情石關心寄逺衣天涯鎮長客鴈後不懷歸琴此以下四首和籌堂山水有清音琅然出枯木若教俗耳聽絲竹不如肉棊森森戈戰心盡在皮裏著傍有爛柯人點破都是錯書一坑科斗灰難破祖龍惑三兩挾䇿人今誰席肯側畫手與心相應妙處在咫尺筆尖多少鋒揮掃天地窄東郊行四海尚干戈幾人知稼穡青青原上麥忍放征馬食書壁世事紛紛變人生種種愁行年三十九得嵗又平頭避亂雪巖依日暖霜樹弄風悲山似王維畫人如杜甫詩資聖寺壁是誰將壁疥盡可著紗籠今代無詩史何時入國風别陳之綱李得之南子榮時在宋巳兆池魚禍尚多風鷁過寄與遠遊人莫待贐行貨戲髙廣之一飲遇伶婦一飯值邱嫂徒教乞米僧時時送盧老雨後新秋積雨霽涼風吹我衣嵗月不知老乾坤何處歸九日答朱夀之與客登髙處節物傷遲暮不見白衣來三復秋風句竹林初見錦綳脫氣巳傲霜雪天寒十萬夫未聞一死節柏徑嵗晚節自抱足見有心哉遊人從何處帶得春風來槐亭蟻穴功名重或作封侯夢主人心巳間不為黃花動稻塍一水自縱橫厥田無上下居民不佩犢嵗事在秧馬儒世治其術重世亂其術輕太平然後用用然後太平蝶轉首一場夢驚心三月春揚揚枝上蝶不見惜花人熊白所居無禹廟有官升典籖掌亦我所欲二者不可兼十六日夜戲書貪作梅花夢都忘栁絮禪可憐人與月不似夜來圓作臧祚切六言絶句雪菴題錢過庭梅花圖巳把傳神盡譜又看格在詩評月落難尋清夢雲空乃見髙情示姪輩諸阮以富相誇二疏恐財為病濟叔不羡金埒績兄曾有撾命淵明歸去來圖先生從來寄傲肯向小兒鞠躬笑指田園歸去門前五栁春風中秋三百六旬歲周一十二度月圓試問姮娥甲子和閏到今幾年郎文炳心逺齋竊笑濫巾北嶽那能補衲中條自有胸中邱壑不妨隱向市朝伯德仲植張長史帖莫就嚴陵買菜無勞逸少換鵝但得雲煙一紙那在鄴侯書多戲沂公巨川八仙詩裏蘇晉三笑圖中逺公選甚逃禪破戒我師自有家風戲武夫韓公二論功終是獵犬見事不如擒虎我願一識荆州人道莫逢玊汝結栁未送窮車敝衣先入歌院雖得蕭何指蹤難與老子同傳老杜醉歸圖二尋常行處酒債每日江頭醉歸薄暮斜風細雨長安一片花飛百錢街頭酒價蹇驢醉裏風光莫傍鄭公門去恐猶恨在登牀史遂良酒債四都因焚劵家貧親與當爐人賣問得街頭酒價索取江頭酒債酒誥一篇既出離騷亦可不作愧我家無阿堵笑他人飲狂藥滌器不辭親酌過門無奈客惡未嘗解下金龜必能畫得黃鶴從來歡伯氣和何故督郵味惡陶令無錢但賖潘子著水不錯竇子溫江山圖醉裏扁舟煙浪望中幾屐雲山長天秋水一色明月清風兩間貓犬圖狡兔空有三穴首鼠漫持兩端我輩天生健武從渠股栗心寒北忩髙卧圖問字不得兀兀借書不得陶陶誰遣人來送酒枕邊正讀離騷雪谷早行圖積素茫茫縞夜流光耿耿揚輝行人抵死貪路何處家山未歸史正之喪子買得陸郎初見懷橘阿買頗解識字或恐西河喪明忙為東野收淚靈照女留下一重公案有女誰似龎家不試提籃手段若為點破丹霞錦堂四景圖春水滿四澤渺渺舒如羅帶鱗鱗皺似縠紋誰道卧龍不起須臾變化風雲夏雲多竒峰幸得從龍變態尚何出岫無心正苦人間畏日不思天上為霖秋月揚明輝清光一片如洗西去姮娥耐秋可惜廣寒人老誰將玊斧再修冬嶺秀孤松山前傾蓋獨倚雪裏盤根嵗深千年老鶴相伴誰似蒼髯有心莊靖集卷三
